<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#fafaf8; --surface:#f4f3ef; --border:#e2e1db; --text:#1a1917;
            --muted:#6b6963; --accent:#2d5a27; --accent-light:#e8f0e6; --accent-mid:#4a8a42;
            --error:#8b2010; --sidebar-w:240px;
        }
        [data-theme="dark"] {
            --bg:#141412; --surface:#1e1d1b; --border:#2e2d2a; --text:#e8e6e0;
            --muted:#8a8880; --accent:#6ab05f; --accent-light:#1e2e1c; --accent-mid:#4a8a42;
            --error:#e05040;
        }
        *{ margin:0; padding:0; box-sizing:border-box; border:none; outline:none; -webkit-tap-highlight-color:transparent; }
        body{
            background:var(--bg); color:var(--text);
            font-family:'Literata',Georgia,serif; font-weight:300;
            height:100vh; height:100dvh; overflow:hidden;
            display:flex; flex-direction:column; transition:background .3s;
        }

        /* TOP BAR */
        .top-bar{
            height:52px; display:flex; align-items:center;
            padding:0 1.5rem; border-bottom:1px solid var(--border);
            gap:1rem; flex-shrink:0; background:var(--bg); z-index:1001;
        }
        .site-title{
            font-family:'Literata',serif; font-size:1.1rem; font-weight:400;
            letter-spacing:-.02em; color:var(--text);
            display:flex; align-items:center; gap:.5rem; flex:1; cursor:pointer; background:none;
        }
        .site-title span{ color:var(--accent); font-style:italic; }
        .icon-btn{
            background:none; border:1px solid var(--border); color:var(--muted);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            width:32px; height:32px; border-radius:2px; transition:0.2s;
        }

        /* SIDEBAR & OVERLAY */
        #sidebar-overlay{
            position:fixed; inset:0; background:rgba(0,0,0,0.4); 
            z-index:1002; display:none; backdrop-filter:blur(2px);
        }
        #sidebar{
            position:fixed; left:0; top:0; bottom:0; width:280px;
            background:var(--surface); border-right:1px solid var(--border);
            z-index:1003; transform:translateX(-100%);
            transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display:flex; flex-direction:column; visibility: hidden;
        }
        body.sidebar-open #sidebar { transform:translateX(0); visibility: visible; }
        body.sidebar-open #sidebar-overlay { display:block; }

        .sidebar-section{ padding:1.2rem 1rem; border-bottom:1px solid var(--border); }
        .sidebar-label{ font-family:'JetBrains Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; display:block; }
        
        /* FILTERS */
        .filter-bar{
            display:flex; align-items:center; gap:.5rem;
            padding:.3rem 1.5rem; border-bottom:1px solid var(--border);
            overflow-x:auto; scrollbar-width:none; flex-shrink:0;
        }
        .filter-bar::-webkit-scrollbar{ display:none; }
        .cat-chip{
            font-family:'JetBrains Mono',monospace; font-size:.58rem;
            border:1px solid var(--border); color:var(--muted);
            padding:.25rem .6rem; border-radius:2px; cursor:pointer; background:none;
            display:flex; align-items:center; gap:5px; white-space:nowrap;
        }
        .cat-chip.active{ background:var(--accent-light); border-color:var(--accent); color:var(--accent); }

        /* CALENDAR GRID */
        #view{ flex:1; overflow-y:auto; padding:1.5rem; -webkit-overflow-scrolling:touch; }
        .year-sec{ margin-bottom:2.5rem; }
        .year-title{ font-family:'Literata',serif; font-size:1.6rem; color:var(--accent); margin-bottom:1rem; }
        .calendar-grid{ display:grid; grid-template-columns:repeat(12,1fr); gap:6px; }
        @media(max-width:1100px){ .calendar-grid{ grid-template-columns:repeat(6,1fr); } }
        @media(max-width:700px) { .calendar-grid{ grid-template-columns:repeat(3,1fr); } }

        .month-cell{
            background:var(--surface); border-radius:3px; padding:24px 6px 6px;
            border:1px solid var(--border); position:relative; min-height:80px;
        }
        .month-cell.drag-over{ border-color:var(--accent); background:var(--accent-light); }
        .month-cell::before{
            content:attr(data-label); position:absolute; top:7px; left:7px;
            font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted);
        }

        /* ITEM & DRAG */
        .proj{
            padding:4px 6px; border-radius:2px; font-family:'JetBrains Mono',monospace;
            font-size:.58rem; margin-bottom:3px; cursor:pointer;
            display:flex; align-items:flex-start; gap:4px;
            touch-action: none; /* CRITICAL FOR MOBILE DRAG */
            user-select: none;
        }
        .proj.done{ opacity:.4; text-decoration:line-through; }
        
        .drag-ghost{
            position:fixed; pointer-events:none; z-index:9999;
            padding:6px 10px; border-radius:3px; font-family:'JetBrains Mono',monospace;
            font-size:.65rem; box-shadow:0 8px 24px rgba(0,0,0,0.2);
            transform:translate(-50%, -50%); opacity: 0.9;
        }

        /* MODAL */
        .modal{ position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        .modal-card{ background:var(--bg); border:1px solid var(--border); padding:2rem; width:90%; max-width:400px; border-radius:3px; }
        .inp{ width:100%; padding:.6rem; margin-bottom:.8rem; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.75rem; }
        .primary-btn{ width:100%; padding:.7rem; background:var(--accent); color:white; font-family:'JetBrains Mono',monospace; font-size:.6rem; text-transform:uppercase; cursor:pointer; }

        #auth-gate{ position:fixed; inset:0; background:var(--bg); z-index:10000; display:none; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="modal-card">
        <div class="site-title" style="justify-content:center; margin-bottom:2rem; font-size:1.5rem">Scanner<span>Planner</span></div>
        <input type="email" id="email" class="inp" placeholder="Email">
        <input type="password" id="pass" class="inp" placeholder="Password">
        <button onclick="login()" class="primary-btn">Увійти</button>
    </div>
</div>

<header class="top-bar">
    <button class="icon-btn" onclick="toggleMenu()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="site-title" onclick="window.location.reload()">Scanner<span>Planner</span></div>
</header>

<div id="sidebar-overlay" onclick="toggleMenu()"></div>
<aside id="sidebar">
    <div class="sidebar-section">
        <span class="sidebar-label">Рік</span>
        <input type="number" id="start-year" class="inp" value="2026" onchange="render()">
    </div>
    <div class="sidebar-section">
        <button onclick="openModal('proj', null)" class="primary-btn" style="margin-bottom:8px">+ Новий елемент</button>
        <button onclick="openModal('cat', null)" class="primary-btn" style="background:none; color:var(--muted); border:1px solid var(--border)">+ Категорія</button>
    </div>
    <div style="flex:1; overflow-y:auto; padding:1rem;" id="backlog">
        <span class="sidebar-label">Беклог</span>
    </div>
    <div style="padding:1rem; border-top:1px solid var(--border)">
        <button onclick="logout()" style="background:none; color:var(--error); font-size:0.6rem; font-family:'JetBrains Mono',monospace; cursor:pointer">ВИЙТИ</button>
    </div>
</aside>

<div class="filter-bar" id="filter-bar"></div>
<main id="view"></main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-card" id="m-body"></div>
</div>

<script>
const S_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(S_URL,S_KEY);

let projects=[], categories=[];
let activeFilters=new Set();
let activeDate=null, editingId=null;
const mNames=['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

function toggleMenu() { document.body.classList.toggle('sidebar-open'); }
function closeModal() { document.getElementById('modal').style.display='none'; }

// AUTH
async function login(){
    const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
    if(error) alert(error.message);
}
async function logout(){ await sb.auth.signOut(); window.location.reload(); }
sb.auth.onAuthStateChange((ev,sess)=>{
    document.getElementById('auth-gate').style.display=sess?'none':'flex';
    if(sess) sync();
});

async function sync(){
    const[p,c]=await Promise.all([sb.from('projects').select('*'),sb.from('categories').select('*')]);
    projects=p.data||[]; categories=c.data||[];
    render();
}

function render(){
    // Filters
    const bar=document.getElementById('filter-bar'); bar.innerHTML='';
    categories.forEach(c=>{
        const chip=document.createElement('button');
        chip.className='cat-chip'+(activeFilters.has(c.name)?' active':'');
        chip.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${c.color}"></span>${c.name}`;
        chip.onclick=()=>{ activeFilters.has(c.name)?activeFilters.delete(c.name):activeFilters.add(c.name); render(); };
        chip.oncontextmenu=e=>{ e.preventDefault(); openModal('cat',null,c); };
        bar.appendChild(chip);
    });

    // Grid
    const view=document.getElementById('view'), start=parseInt(document.getElementById('start-year').value)||2026;
    view.innerHTML='';
    let list=projects.filter(p=>(!activeFilters.size||activeFilters.has(p.cat)));

    for(let y=start; y<start+3; y++){
        const sec=document.createElement('div'); sec.className='year-sec';
        sec.innerHTML=`<div class="year-title">${y}</div>`;
        const grid=document.createElement('div'); grid.className='calendar-grid';
        for(let m=1; m<=12; m++){
            const code=`${y}-${String(m).padStart(2,'0')}`, cell=document.createElement('div');
            cell.className='month-cell'; cell.dataset.code=code; cell.dataset.label=mNames[m-1];
            cell.onclick=e=>{if(e.target===cell)openModal('proj',code)};
            
            // Desktop Drop
            cell.ondragover=e=>e.preventDefault();
            cell.ondrop=async e=>{
                const id=e.dataTransfer.getData('id');
                await sb.from('projects').update({date:code}).eq('id',id); sync();
            };

            list.filter(p=>p.date===code).forEach(p=>cell.appendChild(createItem(p)));
            grid.appendChild(cell);
        }
        sec.appendChild(grid); view.appendChild(sec);
    }

    // Backlog
    const bl=document.getElementById('backlog');
    bl.querySelectorAll('.proj').forEach(n=>n.remove());
    list.filter(p=>!p.date).forEach(p=>bl.appendChild(createItem(p)));
}

function createItem(p){
    const cat=categories.find(c=>c.name===p.cat), bg=cat?.color||'#ccc';
    const el=document.createElement('div');
    el.className='proj'+(p.done?' done':'');
    el.style.background=bg; el.style.color=getContrast(bg);
    el.innerHTML=`${p.title}`;
    el.onclick=e=>{ e.stopPropagation(); openModal('proj',p.date,p); };
    
    // Drag
    el.draggable=true;
    el.ondragstart=e=>e.dataTransfer.setData('id',p.id);
    initTouchDrag(el,p,bg);
    return el;
}

function initTouchDrag(el, p, bg){
    let touch={active:false, dragging:false, ghost:null, target:null, startX:0, startY:0};

    el.addEventListener('touchstart', e=>{
        const t=e.touches[0];
        touch={active:true, dragging:false, startX:t.clientX, startY:t.clientY};
    }, {passive:true});

    el.addEventListener('touchmove', e=>{
        if(!touch.active) return;
        const t=e.touches[0];
        const dx=t.clientX-touch.startX, dy=t.clientY-touch.startY;

        if(!touch.dragging && Math.sqrt(dx*dx+dy*dy)>10){
            touch.dragging=true;
            touch.ghost=document.createElement('div');
            touch.ghost.className='drag-ghost';
            touch.ghost.textContent=p.title;
            touch.ghost.style.background=bg;
            touch.ghost.style.color=getContrast(bg);
            document.body.appendChild(touch.ghost);
            if(navigator.vibrate) navigator.vibrate(20);
        }

        if(touch.dragging){
            e.preventDefault(); // Blocks scroll
            touch.ghost.style.left=t.clientX+'px';
            touch.ghost.style.top=t.clientY+'px';
            
            const under=document.elementFromPoint(t.clientX, t.clientY);
            const cell=under?.closest('.month-cell') || under?.closest('#backlog');
            
            if(touch.target) touch.target.classList.remove('drag-over');
            touch.target=cell;
            if(touch.target) touch.target.classList.add('drag-over');
        }
    }, {passive:false});

    el.addEventListener('touchend', async ()=>{
        if(touch.ghost) touch.ghost.remove();
        if(touch.target){
            touch.target.classList.remove('drag-over');
            const newDate=touch.target.dataset.code || null;
            await sb.from('projects').update({date:newDate}).eq('id',p.id); sync();
        }
        touch.active=false;
    });
}

function getContrast(hex){
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (r*0.299+g*0.587+b*0.114)>160?'#1a1917':'#fff';
}

function openModal(type,date,item=null){
    activeDate=date; editingId=item?.id||null;
    const body=document.getElementById('m-body');
    document.getElementById('modal').style.display='flex';
    document.body.classList.remove('sidebar-open');

    if(type==='proj'){
        body.innerHTML=`<h3>${item?'Редагувати':'Новий'}</h3><br>
        <input id="f-t" class="inp" value="${item?.title||''}" placeholder="Назва">
        <select id="f-c" class="inp">${categories.map(c=>`<option ${item?.cat===c.name?'selected':''}>${c.name}</option>`).join('')}</select>
        <label style="font-size:0.7rem"><input type="checkbox" id="f-d" ${item?.done?'checked':''}> ВИКОНАНО</label><br><br>
        <button class="primary-btn" onclick="saveProj()">Зберегти</button>
        ${item?`<button onclick="del('projects','${item.id}')" style="background:none; color:var(--error); width:100%; margin-top:10px; cursor:pointer; font-size:0.6rem">ВИДАЛИТИ</button>`:''}`;
    } else {
        body.innerHTML=`<h3>Категорія</h3><br>
        <input id="f-n" class="inp" value="${item?.name||''}" placeholder="Назва">
        <input type="color" id="f-co" class="inp" value="${item?.color||'#2d5a27'}">
        <button class="primary-btn" onclick="saveCat()">Зберегти</button>
        ${item?`<button onclick="del('categories','${item.id}')" style="background:none; color:var(--error); width:100%; margin-top:10px; cursor:pointer; font-size:0.6rem">ВИДАЛИТИ</button>`:''}`;
    }
}

async function saveProj(){
    const u=(await sb.auth.getUser()).data.user;
    const d={title:document.getElementById('f-t').value, cat:document.getElementById('f-c').value, date:activeDate, done:document.getElementById('f-d').checked, user_id:u.id};
    if(editingId) await sb.from('projects').update(d).eq('id',editingId);
    else await sb.from('projects').insert([d]);
    closeModal(); sync();
}
async function saveCat(){
    const u=(await sb.auth.getUser()).data.user;
    const d={name:document.getElementById('f-n').value, color:document.getElementById('f-co').value, user_id:u.id};
    if(editingId) await sb.from('categories').update(d).eq('id',editingId);
    else await sb.from('categories').insert([d]);
    closeModal(); sync();
}
async function del(t,id){ if(confirm('Видалити?')){ await sb.from(t).delete().eq('id',id); closeModal(); sync(); } }
</script>
</body>
</html>
