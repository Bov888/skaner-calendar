<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] { --bg: #121214; --surface: #1e1e21; --border: #2e2e32; --text: #f4f4f5; --muted: #a1a1aa; --accent: #10b981; --sidebar: #121214; }
        :root[data-theme="light"] { --bg: #fafafa; --surface: #ffffff; --border: #e4e4e7; --text: #18181b; --muted: #71717a; --accent: #10b981; --sidebar: #fafafa; }
        * { box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif !important; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .app-layout { display: none; width: 100vw; height: 100vh; overflow: hidden; }
        .logged-in .app-layout { display: flex; }
        .logged-in #auth-screen { display: none; }
        header { height: 64px; display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: 0 20px; justify-content: space-between; flex-shrink: 0; }
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; z-index: 2000; }
        .sidebar-hidden #sidebar { margin-left: -260px; }
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 38px; height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #cat-list { display: flex; gap: 8px; padding: 0 20px; height: 56px; align-items: center; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); white-space: nowrap; }
        .cat-item.active { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .cat-dot { width: 10px; height: 10px; border-radius: 50%; }
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .year-section { margin-bottom: 25px; }
        .year-header { color: var(--accent); font-size: 1.7rem; font-weight: 800; cursor: pointer; margin-bottom: 10px; }
        .year-row { display: flex; gap: 8px; }
        .month-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 8px 8px; position: relative; min-height: 115px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .month-label { font-size: 0.7rem; color: var(--muted); position: absolute; top: 12px; left: 12px; font-weight: 800; }
        .card { padding: 8px; border-radius: 8px; font-size: 0.75rem; cursor: grab; font-weight: 600; border-left: 3px solid rgba(255,255,255,0.4); color: white; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 28px; border-radius: 24px; width: 90%; max-width: 360px; border: 1px solid var(--border); }
        .modern-input { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
        @media (max-width: 768px) { .year-row { display: grid; grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-weight:800;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        <input type="email" id="auth-email" class="modern-input" placeholder="Email">
        <input type="password" id="auth-password" class="modern-input" placeholder="Пароль">
        <button onclick="handleAuth('login')" class="btn-primary">Увійти</button>
        <button onclick="handleAuth('signup')" style="background:none; border:none; color:var(--muted); cursor:pointer; margin-top:15px;">Реєстрація</button>
    </div>
</div>

<div class="app-layout">
    <aside id="sidebar">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); font-weight:800; color:var(--muted);">ВХІДНІ</div>
        <div style="padding: 20px;"><button onclick="openModal(null, null)" class="btn-primary">+ ДОДАТИ</button></div>
        <div id="backlog" style="flex:1; overflow-y:auto; padding: 20px; display:flex; flex-direction:column; gap:10px;"></div>
    </aside>

    <main>
        <header>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn-icon" onclick="toggleMenu()">☰</button>
                <h2 style="margin:0;">ScannerPlanner</h2>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="number" id="yearInput" style="width:70px; background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; text-align:center;" onchange="updateStartYear(this.value)">
                <button class="btn-icon" onclick="toggleTheme()">🌓</button>
                <button class="btn-icon" onclick="logout()" style="color:#ef4444;">🚪</button>
            </div>
        </header>
        <div id="cat-list"></div>
        <div id="calendar-scroll"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <input type="text" id="mTitle" class="modern-input" placeholder="Назва">
        <select id="mCat" class="modern-input"></select>
        <button onclick="saveProject()" class="btn-primary">Зберегти</button>
        <button onclick="deleteProject()" style="background:none; border:none; color:#ef4444; width:100%; margin-top:10px; cursor:pointer;">Видалити проєкт</button>
    </div>
</div>

<div id="catModal" class="modal" onclick="if(event.target==this)closeCatModal()">
    <div class="modal-box">
        <h3>Категорія</h3>
        <input type="text" id="catTitle" class="modern-input">
        <input type="color" id="catColor" style="width:100%; height:40px; border-radius:8px; margin-bottom:15px; border:none; cursor:pointer;">
        <button onclick="saveCategory()" class="btn-primary">Зберегти категорію</button>
        <button onclick="deleteCategory()" style="background:none; border:none; color:#ef4444; width:100%; margin-top:10px; cursor:pointer;">Видалити категорію</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], categories = [], startYear = 2026, activeFilter = null;
    let editingId = null, selectedDate = null, editingCatId = null;

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value, password = document.getElementById('auth-password').value;
        const { error } = (type === 'login') ? await sb.auth.signInWithPassword({ email, password }) : await sb.auth.signUp({ email, password });
        if (error) alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => {
        if (session) { document.body.classList.add('logged-in'); loadData(); }
        else document.body.classList.remove('logged-in');
    });

    async function loadData() {
        // 1. Завантажуємо категорії з хмари
        const { data: cData } = await sb.from('categories').select('*');
        categories = cData || [];
        
        // Якщо категорій немає взагалі - створюємо дефолтні
        if (categories.length === 0) {
            const { data: { user } } = await sb.auth.getUser();
            await sb.from('categories').insert([
                { name: 'Творчість', color: '#a855f7', user_id: user.id },
                { name: 'Бізнес', color: '#10b981', user_id: user.id }
            ]);
            return loadData();
        }

        // 2. Завантажуємо проєкти
        const { data: pData } = await sb.from('projects').select('*');
        projects = pData || [];
        render();
    }

    function render() {
        const clist = document.getElementById('cat-list'), mcat = document.getElementById('mCat');
        clist.innerHTML = `<button onclick="addCategory()" class="cat-item"><b>+</b></button>`;
        mcat.innerHTML = '';
        
        categories.forEach(c => {
            clist.innerHTML += `
                <div class="cat-item ${activeFilter === c.name ? 'active' : ''}" onclick="activeFilter=(activeFilter==='${c.name}'?null:'${c.name}');render()">
                    <div class="cat-dot" style="background:${c.color}" onclick="event.stopPropagation();openCatModal('${c.id}')"></div>
                    ${c.name}
                </div>`;
            mcat.innerHTML += `<option value="${c.name}">${c.name}</option>`;
        });

        const scroll = document.getElementById('calendar-scroll'); scroll.innerHTML = '';
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        const filtered = activeFilter ? projects.filter(p => p.cat === activeFilter) : projects;

        for (let y = 0; y < 6; y++) {
            const year = startYear + y;
            const sec = document.createElement('div'); sec.className = 'year-section';
            sec.innerHTML = `<div class="year-header">${year}</div>`;
            const row = document.createElement('div'); row.className = 'year-row';
            for (let m = 1; m <= 12; m++) {
                const dk = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div'); cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                cell.onclick = (e) => { if(e.target===cell) openModal(null, dk); };
                cell.addEventListener('dragover', e => e.preventDefault());
                cell.addEventListener('drop', e => handleDrop(e, dk));
                filtered.filter(p => p.date === dk).forEach(p => cell.appendChild(createCard(p)));
                row.appendChild(cell);
            }
            sec.appendChild(row); scroll.appendChild(sec);
        }
        const blog = document.getElementById('backlog'); blog.innerHTML = '';
        filtered.filter(p => !p.date).forEach(p => blog.appendChild(createCard(p)));
    }

    function createCard(p) {
        const c = categories.find(cat => cat.name === p.cat) || {color: '#888'};
        const card = document.createElement('div'); card.className = 'card';
        card.style.backgroundColor = c.color; card.innerText = p.title;
        card.draggable = true; card.onclick = (e) => { e.stopPropagation(); openModal(p); };
        card.ondragstart = e => e.dataTransfer.setData('pid', p.id);
        return card;
    }

    async function handleDrop(e, date) {
        const id = e.dataTransfer.getData('pid');
        if (id) { await sb.from('projects').update({ date }).eq('id', id); loadData(); }
    }

    function openModal(p, d) {
        editingId = p?p.id:null; selectedDate = p?p.date:d;
        document.getElementById('mTitle').value = p?p.title:'';
        document.getElementById('mCat').value = p?p.cat:categories[0].name;
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value, cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if (editingId) await sb.from('projects').update({ title, cat }).eq('id', editingId);
        else await sb.from('projects').insert([{ title, cat, date: selectedDate, user_id: user.id }]);
        closeModal(); loadData();
    }

    async function deleteProject() { if(confirm("Видалити?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadData(); } }

    function openCatModal(id) {
        editingCatId = id; const c = categories.find(cat => cat.id === id);
        document.getElementById('catTitle').value = c.name;
        document.getElementById('catColor').value = c.color;
        document.getElementById('catModal').style.display = 'flex';
    }
    function closeCatModal() { document.getElementById('catModal').style.display = 'none'; }

    async function saveCategory() {
        const name = document.getElementById('catTitle').value, color = document.getElementById('catColor').value;
        const oldCat = categories.find(c => c.id === editingCatId);
        // Оновлюємо категорію
        await sb.from('categories').update({ name, color }).eq('id', editingCatId);
        // Оновлюємо всі проєкти, які мали стару назву
        if (oldCat.name !== name) await sb.from('projects').update({ cat: name }).eq('cat', oldCat.name);
        closeCatModal(); loadData();
    }

    async function deleteCategory() {
        if (confirm("Видалити категорію? Проєкти залишаться без неї.")) {
            await sb.from('categories').delete().eq('id', editingCatId);
            closeCatModal(); loadData();
        }
    }

    async function addCategory() {
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('categories').insert([{ name: 'Нова', color: '#10b981', user_id: user.id }]);
        loadData();
    }

    function toggleMenu() { document.body.classList.toggle('sidebar-hidden'); }
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }
    function updateStartYear(v) { startYear = parseInt(v); render(); }
</script>
</body>
</html>
