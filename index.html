<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner Pro - Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #f0f0f0;
            --muted: #737373; --accent: #4a9e42; --sidebar: #0d0d0d; --drop-bg: rgba(74, 158, 66, 0.15);
        }
        :root[data-theme="light"] {
            --bg: #fdfdfd; --surface: #ffffff; --border: #e5e5e5; --text: #171717;
            --muted: #8a8a8a; --accent: #34c759; --sidebar: #f8f8f8; --drop-bg: rgba(52, 199, 89, 0.15);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s ease; }
        #sidebar.collapsed { margin-left: -280px; }

        /* HEADER */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: 'Outfit'; font-size: 1.5rem; font-weight: 600; cursor: default; }
        .logo span { color: var(--accent); }

        .btn-ui { background: none; border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .btn-ui:hover { border-color: var(--accent); transform: translateY(-1px); }

        /* CATEGORIES */
        #cat-list { display: flex; gap: 15px; padding: 12px 2rem; overflow-x: auto; border-bottom: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; scrollbar-width: none; background: var(--surface); }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; transition: 0.2s; opacity: 0.7; }
        .cat-item:hover { opacity: 1; }
        .cat-dot { width: 8px; height: 8px; border-radius: 50%; }

        /* CALENDAR */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 0 2rem 3rem; scroll-behavior: smooth; }
        .year-section { margin-top: 1.5rem; border-radius: 10px; padding: 10px; transition: 0.3s; }
        .year-header { font-family: 'JetBrains Mono'; color: var(--accent); cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .year-header::before { content: '▾'; transition: 0.3s; }
        .year-section.closed .year-header::before { transform: rotate(-90deg); }
        .year-section.closed .year-row { display: none; }

        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; animation: slideDown 0.4s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .month-cell { background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1/1.1; border-radius: 8px; position: relative; padding: 6px; min-height: 85px; transition: 0.2s; }
        .month-cell.drag-over { background: var(--drop-bg); border-color: var(--accent); }
        .month-label { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono'; text-transform: uppercase; }

        /* CARDS */
        .card { 
            background: var(--bg); border: 1px solid var(--border); padding: 8px; border-radius: 6px; 
            font-size: 0.7rem; margin-top: 12px; cursor: grab; font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; transition: 0.2s;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; scale: 0.9; } to { opacity: 1; scale: 1; } }
        .card:hover { transform: scale(1.02); border-color: var(--muted); }
        .card-line { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 6px 0 0 6px; }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px); }
        .modal-box { background: var(--surface); padding: 2rem; border-radius: 16px; width: 340px; border: 1px solid var(--border); animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        .btn-prime { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-bottom: 10px; }
        .btn-danger { width: 100%; background: none; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border);">
        <button onclick="openModal()" class="btn-prime">+ НОВА ІДЕЯ</button>
    </div>
    <div style="padding: 1rem 1.5rem 0.5rem; font-size: 0.7rem; color: var(--muted); font-weight: 600; letter-spacing: 1px;">BACKLOG</div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 1rem;" ondragover="allowDrop(event)" ondrop="drop(event, 'backlog')"></div>
</aside>

<main>
    <header class="top-header">
        <div style="display:flex; gap:12px; align-items:center;">
            <button class="btn-ui" onclick="toggleSidebar()">☰</button>
            <h1 class="logo">Scanner<span>Planner</span></h1>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-ui" onclick="toggleTheme()">🌗</button>
            <button class="btn-ui" style="color:#ff5252;" onclick="sb.auth.signOut().then(()=>location.reload())">Вихід</button>
        </div>
    </header>
    <div id="cat-list"></div>
    <div id="calendar-scroll"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0; font-family:'Outfit'">Новий проєкт</h3>
        <input type="text" id="mTitle" placeholder="Назва вашої ідеї">
        
        <div style="display:flex; gap:8px; margin-bottom:15px;">
            <select id="mCat" style="margin-bottom:0;"></select>
            <button class="btn-ui" onclick="addNewCategory()" style="padding:0 15px;">+</button>
        </div>

        <button class="btn-prime" id="saveBtn" onclick="saveProject()">ЗБЕРЕГТИ</button>
        <button class="btn-danger" id="deleteBtn" style="display:none;" onclick="deleteProject()">ВИДАЛИТИ ПРОЄКТ</button>
        <button class="btn-ui" style="width:100%; border:none; margin-top:10px;" onclick="closeModal()">Скасувати</button>
    </div>
</div>

<script>
    // --- ПІДКЛЮЧЕННЯ ---
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];
    let editingId = null;
    let categories = JSON.parse(localStorage.getItem('sc-cats')) || ['Навчання', 'Подорожі', 'Творчість', 'Кар\'єра'];
    const catColors = JSON.parse(localStorage.getItem('sc-colors')) || {
        'Навчання': '#4a9e42', 'Подорожі': '#e07b39', 'Творчість': '#c45c8a', 'Кар\'єра': '#c9a227'
    };

    // --- ТЕМА ТА СТАТУСИ ---
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');

    // --- КАТЕГОРІЇ ---
    function updateCategoryUI() {
        const list = document.getElementById('cat-list');
        const select = document.getElementById('mCat');
        list.innerHTML = ''; select.innerHTML = '';
        categories.forEach(c => {
            const col = catColors[c] || '#888';
            list.innerHTML += `<div class="cat-item" onclick="render('${c}')"><span class="cat-dot" style="background:${col}"></span>${c}</div>`;
            select.innerHTML += `<option value="${c}">${c}</option>`;
        });
        list.innerHTML += `<div class="cat-item" style="text-decoration:underline" onclick="render()">✕ Скинути</div>`;
    }

    function addNewCategory() {
        const n = prompt("Назва нової категорії:");
        if (n && !categories.includes(n)) {
            categories.push(n);
            catColors[n] = `hsl(${Math.random() * 360}, 70%, 50%)`;
            localStorage.setItem('sc-cats', JSON.stringify(categories));
            localStorage.setItem('sc-colors', JSON.stringify(catColors));
            updateCategoryUI();
        }
    }

    // --- DRAG & DROP ---
    function allowDrop(e) { 
        e.preventDefault(); 
        const cell = e.target.closest('.month-cell') || e.target.closest('#backlog');
        if (cell) cell.classList.add('drag-over');
    }
    document.addEventListener('dragleave', e => {
        const cell = e.target.closest('.month-cell') || e.target.closest('#backlog');
        if (cell) cell.classList.remove('drag-over');
    });

    async function drop(e, dateKey) {
        e.preventDefault();
        const cell = e.target.closest('.month-cell') || e.target.closest('#backlog');
        if (cell) cell.classList.remove('drag-over');
        
        const id = e.dataTransfer.getData("text");
        const newDate = dateKey === 'backlog' ? null : dateKey;
        await sb.from('projects').update({ date: newDate }).eq('id', id);
        loadData();
    }

    // --- ДАНІ ---
    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render(filter = null) {
        updateCategoryUI();
        const cont = document.getElementById('calendar-scroll');
        cont.innerHTML = '';
        const months = ['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];

        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            const sec = document.createElement('div');
            sec.className = 'year-section';
            sec.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('closed')">${year}</div>`;
            
            const row = document.createElement('div');
            row.className = 'year-row';

            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.dataset.date = dKey;
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                cell.ondragover = allowDrop;
                cell.ondrop = (e) => drop(e, dKey);
                
                projects.filter(p => p.date === dKey).forEach(p => {
                    if (!filter || p.cat === filter) cell.appendChild(createCard(p));
                });
                row.appendChild(cell);
            }
            sec.appendChild(row);
            cont.appendChild(sec);
        }

        const bLog = document.getElementById('backlog');
        bLog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            if (!filter || p.cat === filter) bLog.appendChild(createCard(p));
        });
    }

    function createCard(p) {
        const el = document.createElement('div');
        el.className = 'card';
        el.draggable = true;
        el.innerHTML = `<div class="card-line" style="background:${catColors[p.cat] || '#888'}"></div>${p.title}`;
        el.ondragstart = (e) => e.dataTransfer.setData("text", p.id);
        el.onclick = (e) => { e.stopPropagation(); openEditModal(p); };
        return el;
    }

    // --- МОДАЛЬНІ ВІКНА ---
    function openModal() {
        editingId = null;
        document.getElementById('modal-title').innerText = "Нова ідея";
        document.getElementById('mTitle').value = '';
        document.getElementById('deleteBtn').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function openEditModal(p) {
        editingId = p.id;
        document.getElementById('modal-title').innerText = "Редагувати проєкт";
        document.getElementById('mTitle').value = p.title;
        document.getElementById('mCat').value = p.cat;
        document.getElementById('deleteBtn').style.display = 'block';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if(!title) return;

        if (editingId) {
            await sb.from('projects').update({ title, cat }).eq('id', editingId);
        } else {
            await sb.from('projects').insert([{ title, cat, user_id: user.id }]);
        }
        closeModal(); loadData();
    }

    async function deleteProject() {
        if (confirm("Видалити цей проєкт назавжди?")) {
            await sb.from('projects').delete().eq('id', editingId);
            closeModal(); loadData();
        }
    }

    sb.auth.getUser().then(({data}) => {
        if(data.user) loadData();
        else window.location.href = "/";
    });
</script>
</body>
</html>
