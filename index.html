<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Click & Create</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Outfit:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #f0f0f0;
            --muted: #737373; --accent: #4a9e42; --sidebar: #0d0d0d;
        }
        :root[data-theme="light"] {
            --bg: #fdfdfd; --surface: #ffffff; --border: #e5e5e5; --text: #171717;
            --muted: #8a8a8a; --accent: #34c759; --sidebar: #f8f8f8;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* AUTH */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 350px; text-align: center; }
        
        /* SIDEBAR */
        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 2000;
        }
        body.sidebar-hidden #sidebar { transform: translateX(-280px); margin-right: -280px; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-280px); }
            body.sidebar-open #sidebar { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1500; }
            body.sidebar-open .overlay { display: block; }
        }

        main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .top-header { padding: 10px 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        #cat-list { display: flex; gap: 10px; padding: 10px 1.2rem; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 0.7rem; font-weight: 800; padding: 5px 10px; border-radius: 15px; background: rgba(255,255,255,0.05); }

        /* CALENDAR */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 10px 15px 150px; scroll-behavior: smooth; }
        .year-section { margin-top: 30px; }
        .year-header { color: var(--accent); font-size: 1.5rem; margin-bottom: 15px; font-weight: 800; font-family: 'Outfit'; }

        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; }
        @media (max-width: 1024px) { .year-row { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 600px) { .year-row { grid-template-columns: repeat(3, 1fr); } }

        .month-cell { 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 8px; position: relative; padding: 25px 5px 5px; 
            min-height: 80px; transition: 0.2s; cursor: cell;
        }
        .month-cell:hover { border-color: var(--accent); background: rgba(74, 158, 66, 0.05); }
        .month-label { font-size: 0.65rem; color: var(--muted); position: absolute; top: 6px; right: 8px; font-weight: 800; text-transform: uppercase; pointer-events: none; }

        .card { 
            color: #fff; padding: 6px 8px; border-radius: 5px; font-size: 0.65rem; margin-bottom: 4px; 
            cursor: pointer; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-left: 3px solid rgba(255,255,255,0.3); word-break: break-word;
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(5px); }
        .modal-box { background: var(--surface); padding: 1.5rem; border-radius: 15px; width: 100%; max-width: 320px; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-family: inherit; font-weight: 600; box-sizing: border-box; }
        .btn-ui { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 800; width: 100%; margin-bottom: 8px; }
        .btn-accent { background: var(--accent); color: white; border: none; }
    </style>
</head>
<body class="sidebar-hidden">

<div id="auth-screen">
    <div class="auth-box">
        <h2 style="font-family:'Outfit';">Scanner<span style="color:var(--accent)">Planner</span></h2>
        <input type="email" id="auth-email" placeholder="Email">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn-ui btn-accent" onclick="handleAuth('login')">Увійти</button>
        <button class="btn-ui" style="border:none; opacity:0.6;" onclick="handleAuth('signup')">Реєстрація</button>
        <p id="auth-msg" style="color:#ff5252; font-size:0.8rem;"></p>
    </div>
</div>

<div class="overlay" onclick="toggleMenu()"></div>

<aside id="sidebar">
    <div style="padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 800;">BACKLOG</span>
        <button onclick="toggleMenu()" style="background:none; border:none; color:var(--text); font-size:1.2rem;">✕</button>
    </div>
    <div style="padding: 1rem;">
        <button onclick="openModal(null, null)" class="btn-ui btn-accent">+ НОВА ІДЕЯ</button>
    </div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 1rem;"></div>
</aside>

<main>
    <header class="top-header">
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="btn-ui" style="width:auto;" onclick="toggleMenu()">☰</button>
            <h1 style="font-family:'Outfit'; font-size:1.1rem; margin:0;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn-ui" style="width:auto;" onclick="toggleTheme()">🌗</button>
            <button class="btn-ui" style="width:auto; color:#ff5252;" onclick="logout()">⏻</button>
        </div>
    </header>
    <div id="cat-list"></div>
    <div id="calendar-scroll"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0;">Проєкт</h3>
        <input type="text" id="mTitle" placeholder="Назва">
        <div style="display:flex; gap:8px; margin-bottom:12px;">
            <select id="mCat" style="margin:0;"></select>
            <button class="btn-ui" style="width:45px; margin:0;" onclick="openCatModal()">+</button>
        </div>
        <p id="mDateDisplay" style="font-size:0.7rem; color:var(--muted); margin-bottom:10px;"></p>
        <button onclick="saveProject()" class="btn-ui btn-accent">ЗБЕРЕГТИ</button>
        <button id="deleteBtn" onclick="deleteProject()" style="border-color:#ff4d4d; color:#ff4d4d;" class="btn-ui">ВИДАЛИТИ</button>
    </div>
</div>

<div id="cat-modal" class="modal">
    <div class="modal-box">
        <h3>Категорія</h3>
        <input type="text" id="catName" placeholder="Назва">
        <input type="color" id="catColor" value="#4a9e42" style="height:50px;">
        <button onclick="saveCategory()" class="btn-ui btn-accent">ДОДАТИ</button>
        <button onclick="closeCatModal()" class="btn-ui">Скасувати</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];
    let categories = JSON.parse(localStorage.getItem('sc-cats')) || ['Навчання', 'Подорожі', 'Кар\'єра'];
    let catColors = JSON.parse(localStorage.getItem('sc-colors')) || {'Навчання': '#4a9e42', 'Подорожі': '#e07b39', 'Кар\'єра': '#c9a227'};
    let editingId = null;
    let selectedDate = null;

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        const msg = document.getElementById('auth-msg');
        let res = (type === 'signup') ? await sb.auth.signUp({email, password}) : await sb.auth.signInWithPassword({email, password});
        if (res.error) msg.innerText = res.error.message;
    }
    function logout() { sb.auth.signOut(); }

    function toggleMenu() { document.body.classList.toggle('sidebar-open'); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
    }

    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render() {
        // Categories
        const clist = document.getElementById('cat-list');
        const sel = document.getElementById('mCat');
        clist.innerHTML = ''; sel.innerHTML = '';
        categories.forEach(c => {
            const col = catColors[c];
            clist.innerHTML += `<div class="cat-item" onclick="openCatModal('${c}')"><span style="width:8px;height:8px;border-radius:50%;background:${col}"></span>${c}</div>`;
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });

        // Calendar
        const cont = document.getElementById('calendar-scroll');
        cont.innerHTML = '';
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            const sec = document.createElement('div');
            sec.className = 'year-section';
            sec.innerHTML = `<div class="year-header">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';
            
            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                
                // ТУТ МАГІЯ: Клік по місяцю створює проєкт
                cell.onclick = (e) => {
                    if(e.target === cell) openModal(null, dKey);
                };

                projects.filter(p => p.date === dKey).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.backgroundColor = catColors[p.cat] || '#888';
                    card.innerText = p.title;
                    card.onclick = (e) => { e.stopPropagation(); openModal(p); };
                    cell.appendChild(card);
                });
                row.appendChild(cell);
            }
            sec.appendChild(row);
            cont.appendChild(sec);
        }

        // Backlog
        const blog = document.getElementById('backlog');
        blog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundColor = catColors[p.cat] || '#888';
            card.innerText = p.title;
            card.onclick = () => openModal(p);
            blog.appendChild(card);
        });
    }

    function openModal(p, date) {
        editingId = p ? p.id : null;
        selectedDate = p ? p.date : date;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('mCat').value = p ? p.cat : categories[0];
        document.getElementById('mDateDisplay').innerText = selectedDate ? `Планується на: ${selectedDate}` : 'Без дати (Backlog)';
        document.getElementById('deleteBtn').style.display = p ? 'block' : 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        if(!title) return;
        const { data: { user } } = await sb.auth.getUser();
        const payload = { title, cat, date: selectedDate, user_id: user.id };
        
        if(editingId) await sb.from('projects').update(payload).eq('id', editingId);
        else await sb.from('projects').insert([payload]);
        
        closeModal(); loadData();
    }

    async function deleteProject() {
        if(confirm("Видалити?")) {
            await sb.from('projects').delete().eq('id', editingId);
            closeModal(); loadData();
        }
    }

    // CAT LOGIC
    let editingCat = null;
    function openCatModal(name) {
        editingCat = name;
        document.getElementById('catName').value = name || '';
        document.getElementById('catColor').value = catColors[name] || '#4a9e42';
        document.getElementById('cat-modal').style.display = 'flex';
    }
    function closeCatModal() { document.getElementById('cat-modal').style.display = 'none'; }
    function saveCategory() {
        const name = document.getElementById('catName').value.trim();
        const color = document.getElementById('catColor').value;
        if(!name) return;
        if(editingCat && editingCat !== name) {
            categories = categories.map(c => c === editingCat ? name : c);
            delete catColors[editingCat];
        } else if(!categories.includes(name)) {
            categories.push(name);
        }
        catColors[name] = color;
        localStorage.setItem('sc-cats', JSON.stringify(categories));
        localStorage.setItem('sc-colors', JSON.stringify(catColors));
        render(); closeCatModal();
    }

    sb.auth.onAuthStateChange((ev, session) => {
        if (session) { document.getElementById('auth-screen').style.display = 'none'; loadData(); }
        else { document.getElementById('auth-screen').style.display = 'flex'; projects = []; render(); }
    });

    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
