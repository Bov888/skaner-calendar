<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#fafaf8; --surface:#f4f3ef; --border:#e2e1db; --text:#1a1917;
            --muted:#6b6963; --accent:#2d5a27; --accent-light:#e8f0e6; --accent-mid:#4a8a42;
            --error:#8b2010; --sidebar-w:240px;
        }
        [data-theme="dark"] {
            --bg:#141412; --surface:#1e1d1b; --border:#2e2d2a; --text:#e8e6e0;
            --muted:#8a8880; --accent:#6ab05f; --accent-light:#1e2e1c; --accent-mid:#4a8a42;
            --error:#e05040;
        }
        *{ margin:0; padding:0; box-sizing:border-box; border:none; outline:none; }
        html{ font-size:16px; }
        body{
            background:var(--bg); color:var(--text);
            font-family:'Literata',Georgia,serif; font-weight:300;
            height:100vh; height:100dvh; overflow:hidden;
            display:flex; flex-direction:column; transition:background .3s,color .3s;
        }

        /* AUTH */
        #auth-gate{
            position:fixed; inset:0; background:var(--bg); z-index:20000;
            display:none; align-items:center; justify-content:center; padding:1.5rem;
        }
        .auth-card{
            background:var(--surface); padding:2.5rem; border-radius:3px;
            border:1px solid var(--border); width:100%; max-width:360px;
        }
        .auth-logo{ font-family:'Literata',serif; font-size:1.4rem; font-weight:300;
            letter-spacing:-.02em; margin-bottom:2rem; text-align:center; }
        .auth-logo span{ color:var(--accent); font-style:italic; }

        /* TOP BAR */
        .top-bar{
            height:52px; min-height:52px; display:flex; align-items:center;
            padding:0 1.5rem; border-bottom:1px solid var(--border);
            gap:1rem; flex-shrink:0; background:var(--bg); z-index:200;
        }
        .site-title{
            font-family:'Literata',serif; font-size:1.1rem; font-weight:400;
            letter-spacing:-.02em; color:var(--text);
            display:flex; align-items:center; gap:.5rem; flex:1; cursor:pointer; background:none;
        }
        .site-title span{ color:var(--accent); font-style:italic; }
        .icon-btn{
            background:none; border:1px solid var(--border); color:var(--muted);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            width:32px; height:32px; border-radius:2px;
            transition:border-color .2s,color .2s; flex-shrink:0;
        }
        .icon-btn:hover{ border-color:var(--accent); color:var(--accent); }
        .icon-btn svg{ width:16px; height:16px; }
        .icon-btn.danger:hover{ border-color:var(--error); color:var(--error); }
        .theme-toggle{
            background:var(--accent-light); border:1px solid var(--accent); color:var(--accent);
            font-size:.6rem; font-family:'JetBrains Mono',monospace;
            cursor:pointer; padding:.3rem .6rem; border-radius:2px;
            transition:opacity .2s; letter-spacing:.06em; text-transform:uppercase;
            white-space:nowrap; flex-shrink:0;
        }

        /* LAYOUT */
        .app-body{ flex:1; display:flex; overflow:hidden; position:relative; }

        /* SIDEBAR */
        #sidebar{
            width:var(--sidebar-w); min-width:0;
            background:var(--surface); border-right:1px solid var(--border);
            display:flex; flex-direction:column; flex-shrink:0;
            position:relative; overflow:hidden;
        }
        @media(min-width:1025px){
            .sidebar-closed #sidebar{ width:0!important; border-right-width:0; }
        }
        @media(max-width:1024px){
            #sidebar{
                position:absolute; top:0; bottom:0; left:0; z-index:500;
                width:280px!important; transform:translateX(-100%);
                transition:transform .3s cubic-bezier(.4,0,.2,1);
            }
            .sidebar-open #sidebar{ transform:translateX(0); }
            #sidebar-overlay{
                display:none; position:absolute; inset:0;
                background:rgba(0,0,0,.4); z-index:499; backdrop-filter:blur(2px);
            }
            .sidebar-open #sidebar-overlay{ display:block; }
            #sidebar-resizer{ display:none; }
        }
        #sidebar-resizer{
            position:absolute; top:0; right:-5px; width:10px; height:100%;
            cursor:col-resize; z-index:50;
        }
        #sidebar-resizer::after{
            content:''; position:absolute; top:50%; left:4px; transform:translateY(-50%);
            width:2px; height:48px; background:var(--border); border-radius:2px;
        }
        #sidebar-resizer.active::after{ background:var(--accent); }

        .sidebar-section{ padding:1.2rem 1rem; border-bottom:1px solid var(--border); flex-shrink:0; }
        .sidebar-label{
            font-family:'JetBrains Mono',monospace; font-size:.58rem;
            letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
            margin-bottom:.6rem; display:block;
        }
        .year-input{
            width:100%; background:var(--bg); border:1px solid var(--border);
            color:var(--accent); font-family:'JetBrains Mono',monospace;
            font-size:1rem; font-weight:500; border-radius:2px;
            padding:.5rem .8rem; text-align:center;
        }
        .primary-btn{
            width:100%; padding:.6rem 1rem; border-radius:2px; background:var(--accent);
            color:#fff; font-family:'JetBrains Mono',monospace; font-size:.6rem;
            font-weight:500; letter-spacing:.08em; text-transform:uppercase;
            cursor:pointer; text-align:center;
        }
        .secondary-btn{
            width:100%; padding:.6rem 1rem; border-radius:2px; background:none;
            color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:.6rem;
            font-weight:500; letter-spacing:.08em; text-transform:uppercase;
            cursor:pointer; border:1px solid var(--border); text-align:center;
        }

        /* BACKLOG */
        #backlog-wrap{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
        #backlog{
            flex:1; overflow-y:auto; padding:.6rem 1rem 1.5rem;
            transition:background .15s; min-height:80px;
        }
        #backlog.drag-over{ background:var(--accent-light); }
        .backlog-hint{
            font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted);
            text-transform:uppercase; letter-spacing:.06em; text-align:center;
            padding:.75rem; border:1px dashed var(--border); border-radius:2px;
        }
        .backlog-proj{
            padding:6px 8px; border-radius:2px; font-family:'JetBrains Mono',monospace;
            font-size:.6rem; margin-bottom:4px; cursor:pointer;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            display:flex; align-items:center; gap:5px; user-select:none;
        }
        .backlog-proj.done{ opacity:.4; text-decoration:line-through; filter:grayscale(60%); }

        /* MAIN */
        #main-area{ flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
        .filter-bar{
            display:flex; align-items:center; gap:.5rem;
            padding:.3rem 1.5rem; border-bottom:1px solid var(--border);
            overflow-x:auto; scrollbar-width:none; flex-shrink:0; flex-wrap:nowrap; min-height:40px;
        }
        .filter-bar::-webkit-scrollbar{ display:none; }
        .filter-sep{ width:1px; height:20px; background:var(--border); flex-shrink:0; margin:0 .2rem; }
        
        .cat-chip, .kind-chip {
            font-family:'JetBrains Mono',monospace; font-size:.58rem;
            letter-spacing:.06em; text-transform:uppercase;
            border:1px solid var(--border); color:var(--muted);
            padding:.25rem .6rem; border-radius:2px; cursor:pointer; background:none;
            transition:all .2s; white-space:nowrap; display:flex; align-items:center; gap:5px; flex-shrink:0;
        }
        .cat-chip.active, .kind-chip.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        .cat-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }

        /* VIEW */
        #view{ flex:1; overflow-y:auto; padding:1.5rem; -webkit-overflow-scrolling:touch; }
        .year-sec{ margin-bottom:2.5rem; }
        .year-title{
            font-family:'Literata',serif; font-size:1.6rem; font-weight:300;
            letter-spacing:-.02em; color:var(--accent); margin-bottom:1rem;
            cursor:pointer; display:flex; align-items:center; gap:.5rem; user-select:none;
        }
        .year-title::after{ content:'▾'; font-size:.7rem; color:var(--muted); transition:transform .2s; }
        .year-sec.collapsed .year-title::after{ transform:rotate(-90deg); }
        .year-sec.collapsed .calendar-grid{ display:none; }

        .calendar-grid{ display:grid; grid-template-columns:repeat(12,1fr); gap:6px; }
        @media(max-width:1100px){ .calendar-grid{ grid-template-columns:repeat(6,1fr); } }
        @media(max-width:700px) { .calendar-grid{ grid-template-columns:repeat(3,1fr); } }

        .month-cell{
            background:var(--surface); border-radius:3px; padding:24px 6px 6px;
            border:1px solid var(--border); position:relative; min-height:80px;
            cursor:pointer; transition:border-color .2s;
        }
        .month-cell.drag-over{ border-color:var(--accent); background:var(--accent-light); }
        .month-cell::before{
            content:attr(data-label); position:absolute; top:7px; left:7px;
            font-family:'JetBrains Mono',monospace; font-size:.55rem;
            font-weight:500; color:var(--muted); text-transform:uppercase;
        }

        .proj{
            padding:4px 6px; border-radius:2px; font-family:'JetBrains Mono',monospace;
            font-size:.58rem; margin-bottom:3px; cursor:pointer;
            white-space:normal; word-break:break-word; line-height:1.3;
            display:flex; align-items:flex-start; gap:4px; user-select:none;
        }
        .proj.done{ opacity:.4; text-decoration:line-through; filter:grayscale(60%); }
        .proj-kind-icon{ font-size:.6rem; opacity:.8; flex-shrink:0; margin-top:1px; }
        .proj-check{ flex-shrink:0; font-size:.55rem; margin-top:1px; opacity:0; }
        .proj.done .proj-check{ opacity:1; }

        /* MODAL */
        .modal{
            position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:10000;
            display:none; align-items:center; justify-content:center;
            backdrop-filter:blur(4px); padding:1.5rem;
        }
        .modal-card{
            background:var(--bg); border:1px solid var(--border); border-radius:3px;
            padding:2rem; width:100%; max-width:400px; max-height:90dvh; overflow-y:auto;
        }
        .inp{
            width:100%; padding:.6rem .8rem; margin-bottom:.75rem; border-radius:2px;
            background:var(--surface); color:var(--text); border:1px solid var(--border);
            font-family:'JetBrains Mono',monospace; font-size:0.75rem;
        }
        .kind-selector{ display:flex; gap:.5rem; margin-bottom:.75rem; }
        .kind-btn{
            flex:1; padding:.5rem .3rem; border-radius:2px; border:1px solid var(--border);
            background:none; color:var(--muted); font-family:'JetBrains Mono',monospace;
            font-size:.55rem; text-transform:uppercase; cursor:pointer;
            display:flex; flex-direction:column; align-items:center; gap:4px;
        }
        .kind-btn.active{ background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        .done-toggle{ display:flex; align-items:center; gap:.6rem; padding:.6rem 0; cursor:pointer; }
        .done-toggle input{ display:none; }
        .done-toggle-track{ width:32px; height:18px; background:var(--border); border-radius:9px; position:relative; transition:.2s; }
        .done-toggle-track::after{ content:''; position:absolute; top:3px; left:3px; width:12px; height:12px; border-radius:50%; background:#fff; transition:.2s; }
        .done-toggle input:checked + .done-toggle-track{ background:var(--accent); }
        .done-toggle input:checked + .done-toggle-track::after{ transform:translateX(14px); }
        
        .drag-ghost{
            position:fixed; pointer-events:none; z-index:99999; opacity:.9;
            border-radius:3px; padding:6px 10px; font-family:'JetBrains Mono',monospace;
            font-size:.65rem; white-space:nowrap; transform:translate(-50%,-50%);
            box-shadow:0 8px 24px rgba(0,0,0,.3);
        }
    </style>
</head>
<body class="sidebar-closed">

<div id="auth-gate">
    <div class="auth-card">
        <div class="auth-logo">Scanner<span>Planner</span></div>
        <input type="email" id="email" class="inp" placeholder="email@example.com">
        <input type="password" id="pass" class="inp" placeholder="••••••••">
        <button onclick="login()" class="primary-btn">Увійти</button>
        <p id="auth-err" style="color:var(--error); font-size:0.65rem; margin-top:10px; text-align:center"></p>
    </div>
</div>

<header class="top-bar">
    <button class="icon-btn" id="menu-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <button class="site-title" onclick="window.location.reload()">
        <svg width="20" height="20" viewBox="0 0 32 32"><circle cx="16" cy="15" r="4" fill="var(--accent)"/><circle cx="16" cy="15" r="1.2" fill="var(--bg)"/></svg>
        Scanner<span>Planner</span>
    </button>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☾ тема</button>
    <button class="icon-btn danger" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
</header>

<div class="app-body">
    <div id="sidebar-overlay"></div>
    <aside id="sidebar">
        <div id="sidebar-resizer"></div>
        <div class="sidebar-section">
            <span class="sidebar-label">Рік початку</span>
            <input type="number" id="start-year" class="year-input" value="2026" onchange="render()">
        </div>
        <div class="sidebar-section" style="display:flex;flex-direction:column;gap:.5rem;">
            <button onclick="openModal('proj',null)" class="primary-btn">+ Новий елемент</button>
            <button onclick="openModal('cat',null)"  class="secondary-btn">+ Категорія</button>
        </div>
        <div id="backlog-wrap">
            <div id="backlog-header" class="sidebar-section"><span class="sidebar-label">Беклог</span></div>
            <div id="backlog"><div class="backlog-hint" id="backlog-hint">↓ перетягни сюди</div></div>
        </div>
    </aside>

    <div id="main-area">
        <div class="filter-bar" id="filter-bar"></div>
        <div id="view"><p style="text-align:center; padding:2rem; opacity:0.5;">Завантаження...</p></div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-card" id="m-body"></div>
</div>

<script>
const S_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(S_URL,S_KEY);

let projects=[], categories=[];
let activeFilters=new Set(), activeKinds=new Set();
let activeDate=null, editingProjId=null;

const KINDS=[{id:'project',icon:'🎯',label:'Проєкт'},{id:'interest',icon:'✦',label:'Інтерес'},{id:'zone',icon:'◎',label:'Зона'}];
const mNames=['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

function contrast(hex){
    const c=(hex||'#4a8a42').replace('#','');
    const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
    return(.2126*(r/255)+.7152*(g/255)+.0722*(b/255))>.45?'#1a1917':'#ffffff';
}

/* THEME & SIDEBAR */
function initTheme(){
    const t=localStorage.getItem('theme')||'light';
    document.documentElement.setAttribute('data-theme',t);
    document.getElementById('theme-btn').textContent=t==='dark'?'☀ тема':'☾ тема';
}
function toggleTheme(){
    const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',n);
    localStorage.setItem('theme',n);
    document.getElementById('theme-btn').textContent=n==='dark'?'☀ тема':'☾ тема';
}
function toggleSidebar(){
    if(window.innerWidth<=1024)document.body.classList.toggle('sidebar-open');
    else document.body.classList.toggle('sidebar-closed');
}
document.getElementById('menu-btn').onclick=e=>{e.stopPropagation();toggleSidebar();};
document.getElementById('sidebar-overlay').onclick=()=>document.body.classList.remove('sidebar-open');

/* AUTH */
async function login(){
    const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
    if(error)document.getElementById('auth-err').textContent=error.message;
}
async function logout(){await sb.auth.signOut();window.location.reload();}
sb.auth.onAuthStateChange((ev,sess)=>{
    document.getElementById('auth-gate').style.display=sess?'none':'flex';
    if(sess)sync();
    initTheme();
});

/* SYNC & RENDER */
async function sync(){
    const[p,c]=await Promise.all([sb.from('projects').select('*'),sb.from('categories').select('*')]);
    projects=p.data||[]; categories=c.data||[];
    render();
}

function render(){
    const start=parseInt(document.getElementById('start-year').value)||2026;
    let list=projects;
    if(activeFilters.size) list=list.filter(p=>activeFilters.has(p.cat));
    if(activeKinds.size) list=list.filter(p=>activeKinds.has(p.kind||'project'));

    // Filter Bar
    const bar=document.getElementById('filter-bar'); bar.innerHTML='';
    categories.forEach(c=>{
        const chip=document.createElement('button');
        chip.className='cat-chip'+(activeFilters.has(c.name)?' active':'');
        chip.innerHTML=`<span class="cat-dot" style="background:${c.color}"></span>${c.name}`;
        chip.onclick=()=>{activeFilters.has(c.name)?activeFilters.delete(c.name):activeFilters.add(c.name);render();};
        chip.oncontextmenu=e=>{e.preventDefault();openModal('cat',null,c);};
        bar.appendChild(chip);
    });
    if(categories.length) bar.appendChild(Object.assign(document.createElement('div'),{className:'filter-sep'}));
    KINDS.forEach(k=>{
        const chip=document.createElement('button');
        chip.className='kind-chip'+(activeKinds.has(k.id)?' active':'');
        chip.innerHTML=`<span>${k.icon}</span>${k.label}`;
        chip.onclick=()=>{activeKinds.has(k.id)?activeKinds.delete(k.id):activeKinds.add(k.id);render();};
        bar.appendChild(chip);
    });

    // Calendar
    const view=document.getElementById('view'); view.innerHTML='';
    for(let i=0; i<6; i++){
        const y=start+i;
        const sec=document.createElement('div'); sec.className='year-sec';
        const ttl=document.createElement('h2'); ttl.className='year-title'; ttl.textContent=y;
        ttl.onclick=()=>sec.classList.toggle('collapsed');
        sec.appendChild(ttl);
        const grid=document.createElement('div'); grid.className='calendar-grid';
        for(let m=1; m<=12; m++){
            const code=`${y}-${String(m).padStart(2,'0')}`;
            const cell=document.createElement('div');
            cell.className='month-cell'; cell.dataset.code=code; cell.dataset.label=mNames[m-1];
            cell.onclick=e=>{if(e.target===cell)openModal('proj',code);};
            
            // Desktop Drag
            cell.ondragover=e=>e.preventDefault();
            cell.ondrop=async e=>{
                const pid=e.dataTransfer.getData('pid');
                if(pid){await sb.from('projects').update({date:code}).eq('id',pid);sync();}
            };

            list.filter(p=>p.date===code).forEach(p=>{
                const el=buildProjEl(p);
                el.onclick=e=>{e.stopPropagation();openModal('proj',code,p);};
                cell.appendChild(el);
            });
            grid.appendChild(cell);
        }
        sec.appendChild(grid); view.appendChild(sec);
    }

    // Backlog
    const bl=document.getElementById('backlog');
    bl.querySelectorAll('.backlog-proj').forEach(el=>el.remove());
    const hint=document.getElementById('backlog-hint');
    const noDate=list.filter(p=>!p.date);
    hint.style.display=noDate.length?'none':'block';
    noDate.forEach(p=>{
        const el=buildProjEl(p,true);
        el.onclick=()=>openModal('proj',null,p);
        bl.insertBefore(el,hint);
    });
}

function buildProjEl(p,isBacklog=false){
    const cat=categories.find(c=>c.name===p.cat);
    const bg=cat?.color||'#4a8a42', fg=contrast(bg);
    const el=document.createElement('div');
    el.className=(isBacklog?'backlog-proj':'proj')+(p.done?' done':'');
    el.style.background=bg; el.style.color=fg;
    const icon=KINDS.find(k=>k.id===(p.kind||'project'))?.icon||'🎯';
    el.innerHTML=`<span class="proj-kind-icon">${icon}</span><span class="proj-check">✓</span><span>${p.title}</span>`;
    makeDraggable(el,p.id,bg,fg,p.title);
    return el;
}

/* TOUCH DRAG LOGIC */
let td={id:null,ghost:null,target:null,startX:0,startY:0,dragging:false};
function makeDraggable(el,projId,bg,fg,label){
    el.draggable=true;
    el.ondragstart=e=>e.dataTransfer.setData('pid',projId);

    el.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        td={id:projId,ghost:null,target:null,startX:t.clientX,startY:t.clientY,dragging:false,bg,fg,label};
    },{passive:true});

    el.addEventListener('touchmove',e=>{
        if(!td.id)return;
        const t=e.touches[0], dx=t.clientX-td.startX, dy=t.clientY-td.startY;
        if(!td.dragging){
            if(Math.sqrt(dx*dx+dy*dy)<10)return;
            td.dragging=true;
            const ghost=document.createElement('div');
            ghost.className='drag-ghost'; ghost.textContent=td.label;
            ghost.style.background=td.bg; ghost.style.color=td.fg;
            document.body.appendChild(ghost); td.ghost=ghost;
            if(navigator.vibrate)navigator.vibrate(25);
        }
        e.preventDefault();
        td.ghost.style.left=t.clientX+'px'; td.ghost.style.top=t.clientY+'px';
        td.ghost.style.visibility='hidden';
        const under=document.elementFromPoint(t.clientX,t.clientY);
        td.ghost.style.visibility='visible';

        if(td.target)td.target.classList.remove('drag-over');
        td.target=under?.closest('.month-cell')||under?.closest('#backlog');
        if(td.target)td.target.classList.add('drag-over');
    },{passive:false});

    el.addEventListener('touchend',async e=>{
        if(!td.id)return;
        if(td.ghost)td.ghost.remove();
        if(td.target)td.target.classList.remove('drag-over');
        if(td.dragging && td.target){
            const code=td.target.dataset.code||null;
            await sb.from('projects').update({date:code}).eq('id',td.id); sync();
        }
        td={id:null,ghost:null,target:null,dragging:false};
    });
}

/* MODAL */
function openModal(type,date,item=null){
    activeDate=date; editingProjId=item?.id||null;
    document.body.classList.remove('sidebar-open');
    const body=document.getElementById('m-body');
    document.getElementById('modal').style.display='flex';

    if(type==='proj'){
        const curKind=item?.kind||'project';
        body.innerHTML=`<h3>${item?'Редагувати':'Новий'} елемент</h3>
        <div class="kind-selector">${KINDS.map(k=>`<button class="kind-btn ${curKind===k.id?'active':''}" onclick="selectKind('${k.id}',this)"><span>${k.icon}</span>${k.label}</button>`).join('')}</div>
        <input type="hidden" id="f-kind" value="${curKind}">
        <input id="f-t" class="inp" value="${item?.title||''}" placeholder="Назва...">
        <select id="f-c" class="inp">${categories.map(c=>`<option ${item?.cat===c.name?'selected':''}>${c.name}</option>`).join('')}</select>
        <label class="done-toggle"><input type="checkbox" id="f-done" ${item?.done?'checked':''}> <span class="done-toggle-track"></span> <span style="font-size:0.65rem; color:var(--muted)">ВИКОНАНО</span></label>
        <button onclick="saveProj()" class="primary-btn">Зберегти</button>
        ${item?`<button onclick="del('projects','${item.id}')" style="margin-top:10px; color:var(--error); background:none; cursor:pointer; width:100%; font-size:0.6rem;">ВИДАЛИТИ</button>`:''}`;
    } else {
        body.innerHTML=`<h3>${item?'Редагувати':'Нова'} категорія</h3>
        <input id="f-n" class="inp" value="${item?.name||''}" placeholder="Назва">
        <input type="color" id="f-co" class="inp" value="${item?.color||'#2d5a27'}">
        <button onclick="saveCat(${item?.id?`'${item.id}'`:'null'})" class="primary-btn">Зберегти</button>
        ${item?`<button onclick="del('categories','${item.id}')" style="margin-top:10px; color:var(--error); background:none; cursor:pointer; width:100%; font-size:0.6rem;">ВИДАЛИТИ</button>`:''}`;
    }
}
function selectKind(id,btn){
    document.getElementById('f-kind').value=id;
    document.querySelectorAll('.kind-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}
function closeModal(){document.getElementById('modal').style.display='none';}

async function saveProj(){
    const u=(await sb.auth.getUser()).data.user;
    const d={title:document.getElementById('f-t').value, cat:document.getElementById('f-c').value, kind:document.getElementById('f-kind').value, date:activeDate, done:document.getElementById('f-done').checked, user_id:u.id};
    if(editingProjId) await sb.from('projects').update(d).eq('id',editingProjId);
    else await sb.from('projects').insert([d]);
    closeModal(); sync();
}
async function saveCat(id){
    const u=(await sb.auth.getUser()).data.user;
    const d={name:document.getElementById('f-n').value, color:document.getElementById('f-co').value, user_id:u.id};
    if(id) await sb.from('categories').update(d).eq('id',id);
    else await sb.from('categories').insert([d]);
    closeModal(); sync();
}
async function del(t,id){if(confirm('Видалити?')){await sb.from(t).delete().eq('id',id); closeModal(); sync();}}

// Init Resizer
const resizer=document.getElementById('sidebar-resizer'), sidebar=document.getElementById('sidebar');
resizer.onmousedown=e=>{
    e.preventDefault();
    document.onmousemove=ev=>{
        const w=Math.min(400,Math.max(180,ev.clientX));
        sidebar.style.width=w+'px'; document.documentElement.style.setProperty('--sidebar-w',w+'px');
    };
    document.onmouseup=()=>{document.onmousemove=document.onmouseup=null;};
};
</script>
</body>
