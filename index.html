<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Full Edition</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Outfit:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #f0f0f0;
            --muted: #888888; --accent: #4a9e42; --sidebar: #0d0d0d;
        }
        :root[data-theme="light"] {
            --bg: #fdfdfd; --surface: #ffffff; --border: #e5e5e5; --text: #171717;
            --muted: #707070; --accent: #34c759; --sidebar: #f8f8f8;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: margin-left 0.3s ease; z-index: 2000;
        }
        body.sidebar-hidden #sidebar { margin-left: -280px; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; margin-left: -280px; }
            body.sidebar-open #sidebar { margin-left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1500; }
            body.sidebar-open .overlay { display: block; }
        }

        main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        .top-header { padding: 10px 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; min-height: 65px; }
        
        .btn-icon { background: var(--surface); border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
        .btn-exit { border-color: rgba(255, 82, 82, 0.4); color: #ff5252; padding: 0 12px; width: auto; gap: 8px; font-weight: 800; }

        #cat-list { display: flex; gap: 8px; padding: 12px 1rem; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 0.75rem; font-weight: 700; padding: 6px 12px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); transition: 0.2s; }
        .cat-item:hover { border-color: var(--accent); transform: translateY(-1px); }

        #calendar-scroll { flex: 1; overflow-y: auto; padding: 1rem 1rem 120px; }
        .year-header { color: var(--accent); font-size: 1.8rem; margin: 30px 0 15px; font-weight: 800; font-family: 'Outfit'; border-left: 5px solid var(--accent); padding-left: 15px; }

        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (max-width: 1100px) { .year-row { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 600px) { .year-row { grid-template-columns: repeat(3, 1fr); } }

        .month-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; position: relative; padding: 35px 8px 10px; min-height: 110px; cursor: cell; }
        .month-label { font-size: 0.65rem; color: var(--muted); position: absolute; top: 12px; left: 12px; font-weight: 800; text-transform: uppercase; }

        .card { color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 6px; cursor: pointer; font-weight: 700; border-left: 3px solid rgba(255,255,255,0.3); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(10px); }
        .modal-box { background: var(--surface); padding: 2rem; border-radius: 24px; width: 100%; max-width: 350px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; font-family: inherit; font-weight: 600; box-sizing: border-box; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>

<div class="overlay" onclick="toggleMenu()"></div>

<aside id="sidebar">
    <div style="padding: 1.2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;">BACKLOG (ІДЕЇ)</span>
        <button onclick="toggleMenu()" class="btn-icon" style="border:none; background:none;">✕</button>
    </div>
    <div style="padding: 1rem;"><button onclick="openModal(null, null)" class="btn-primary">+ НОВА ІДЕЯ</button></div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 1rem;"></div>
</aside>

<main>
    <header class="top-header">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="btn-icon" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <h1 style="font-family:'Outfit'; font-size:1.2rem; margin:0;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-icon" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg></button>
            <button class="btn-icon btn-exit" onclick="logout()"><span>Вихід</span><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
        </div>
    </header>
    <div id="cat-list"></div>
    <div id="calendar-scroll"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0; font-family:'Outfit';">Проєкт</h3>
        <input type="text" id="mTitle" placeholder="Назва">
        <div style="display:flex; gap:8px;">
            <select id="mCat" style="flex:1;"></select>
            <button class="btn-icon" onclick="openCatModal()" style="height:44px;">+</button>
        </div>
        <p id="mDateDisplay" style="font-size:0.75rem; color:var(--muted); margin: 12px 0;"></p>
        <button onclick="saveProject()" class="btn-primary">ЗБЕРЕГТИ</button>
        <button id="deleteBtn" onclick="deleteProject()" style="background:none; color:#ff5252; border:none; margin-top:15px; cursor:pointer; width:100%; font-weight:800;">Видалити проєкт</button>
    </div>
</div>

<div id="cat-modal" class="modal">
    <div class="modal-box">
        <h3 id="cat-modal-title" style="margin-top:0;">Категорія</h3>
        <input type="text" id="catName" placeholder="Назва">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px; background:var(--bg); padding:10px; border-radius:12px;">
            <span style="font-size:0.8rem;">Колір:</span>
            <input type="color" id="catColor" value="#4a9e42" style="width:60px; height:40px; border:none; background:none;">
        </div>
        <button onclick="saveCategory()" class="btn-primary">ЗБЕРЕГТИ</button>
        <button onclick="closeCatModal()" style="background:none; border:none; color:var(--text); width:100%; margin-top:10px; cursor:pointer; opacity:0.6;">Скасувати</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];
    let categories = JSON.parse(localStorage.getItem('sc-cats')) || ['Творчість', 'Технології', 'Бізнес', 'Особисте'];
    let catColors = JSON.parse(localStorage.getItem('sc-colors')) || {'Творчість': '#a855f7', 'Технології': '#3b82f6', 'Бізнес': '#22c55e', 'Особисте': '#f97316'};
    let editingId = null;
    let selectedDate = null;
    let editingCatName = null;

    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render() {
        const clist = document.getElementById('cat-list');
        const mcat = document.getElementById('mCat');
        clist.innerHTML = ''; mcat.innerHTML = '';
        categories.forEach(c => {
            clist.innerHTML += `<div class="cat-item" onclick="openCatModal('${c}')"><span style="width:8px;height:8px;border-radius:50%;background:${catColors[c]}"></span>${c}</div>`;
            mcat.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const cont = document.getElementById('calendar-scroll');
        cont.innerHTML = '';
        const months = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            cont.innerHTML += `<div class="year-header">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';
            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                cell.onclick = (e) => { if(e.target === cell) openModal(null, dKey); };
                projects.filter(p => p.date === dKey).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.backgroundColor = catColors[p.cat] || '#888';
                    card.innerText = p.title;
                    card.onclick = (e) => { e.stopPropagation(); openModal(p); };
                    cell.appendChild(card);
                });
                row.appendChild(cell);
            }
            cont.appendChild(row);
        }

        const blog = document.getElementById('backlog');
        blog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundColor = catColors[p.cat] || '#888';
            card.innerText = p.title;
            card.onclick = () => openModal(p);
            blog.appendChild(card);
        });
    }

    function openModal(p, date) {
        editingId = p ? p.id : null;
        selectedDate = p ? p.date : date;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('mCat').value = p ? p.cat : categories[0];
        document.getElementById('mDateDisplay').innerText = selectedDate ? `📅 Дата: ${selectedDate}` : '💡 Зберігається в ідеях';
        document.getElementById('deleteBtn').style.display = p ? 'block' : 'none';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function openCatModal(name) {
        editingCatName = name || null;
        document.getElementById('cat-modal-title').innerText = name ? 'Редагувати категорію' : 'Нова категорія';
        document.getElementById('catName').value = name || '';
        document.getElementById('catColor').value = catColors[name] || '#4a9e42';
        document.getElementById('cat-modal').style.display = 'flex';
    }
    function closeCatModal() { document.getElementById('cat-modal').style.display = 'none'; }

    function saveCategory() {
        const newName = document.getElementById('catName').value.trim();
        const newColor = document.getElementById('catColor').value;
        if (!newName) return;

        if (editingCatName) {
            // Оновлюємо існуючу
            const idx = categories.indexOf(editingCatName);
            categories[idx] = newName;
            delete catColors[editingCatName];
        } else if (!categories.includes(newName)) {
            categories.push(newName);
        }
        catColors[newName] = newColor;
        
        localStorage.setItem('sc-cats', JSON.stringify(categories));
        localStorage.setItem('sc-colors', JSON.stringify(catColors));
        render(); closeCatModal();
    }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if(editingId) await sb.from('projects').update({title, cat, date: selectedDate}).eq('id', editingId);
        else await sb.from('projects').insert([{title, cat, date: selectedDate, user_id: user.id}]);
        closeModal(); loadData();
    }

    async function deleteProject() {
        if(confirm("Видалити?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadData(); }
    }

    function toggleMenu() {
        if (window.innerWidth <= 768) document.body.classList.toggle('sidebar-open');
        else document.body.classList.toggle('sidebar-hidden');
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
    }

    function logout() { sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => { if (session) loadData(); });
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
