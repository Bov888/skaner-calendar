<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* АДАПТИВНІ КОЛЬОРИ */
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #111111; --border: #1a1a1a; --text: #e0e0e0;
            --muted: #444444; --accent: #4a9e42; --card: #1a1a1a;
        }
        :root[data-theme="light"] {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; --text: #1d1d1f;
            --muted: #86868b; --accent: #34c759; --card: #f2f2f7;
        }

        /* КАТЕГОРІЇ (лишаються кольоровими в обох темах) */
        :root {
            --cat-learning: #4a9e42; --cat-travel: #e07b39; --cat-sport: #5b8dd9;
            --cat-creative: #c45c8a; --cat-career: #c9a227; --cat-personal: #6b8f71;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; transition: background 0.3s; }

        /* AUTH SCREEN */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 2.5rem; border-radius: 15px; width: 320px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; }

        /* UI ELEMENTS */
        #sidebar { width: 280px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; }
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { padding: 2rem 3rem; position: relative; }
        .theme-toggle { position: absolute; top: 2rem; right: 3rem; cursor: pointer; font-size: 1.5rem; background: none; border: none; color: var(--text); }
        
        .year-header { cursor: pointer; padding: 15px 0; font-family: 'JetBrains Mono'; color: var(--accent); font-weight: bold; }
        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 8px; margin-bottom: 2rem; }
        
        .month-cell { background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1/1; padding: 6px; position: relative; min-height: 80px; border-radius: 4px; }
        .month-name { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; position: absolute; top: 4px; right: 6px; }

        .project-card { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 0.7rem; cursor: grab; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-tag { position: absolute; bottom: 6px; right: 6px; width: 6px; height: 6px; border-radius: 50%; }

        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
    </style>
</head>
<body data-theme="dark">

<div id="auth-overlay">
    <div class="auth-card">
        <h2 style="color:var(--accent); font-family:'Outfit'">Scanner Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" onclick="handleAuth('login')">Увійти</button>
        <button class="btn" style="background:none; color:var(--muted); font-size:0.8rem; margin-top:10px;" onclick="handleAuth('signup')">Реєстрація</button>
        <p id="auth-msg" style="font-size: 0.7rem; margin-top: 15px; color: var(--muted);"></p>
    </div>
</div>

<aside id="sidebar">
    <div style="padding: 2rem; border-bottom: 1px solid var(--border);">
        <button class="btn btn-primary" onclick="openModal()">+ Нова ідея</button>
    </div>
    <div id="backlog" style="flex: 1; padding: 1rem; overflow-y: auto;" ondrop="drop(event, 'backlog')" ondragover="e=>e.preventDefault()"></div>
</aside>

<main>
    <header class="header">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
        <h1 style="font-family:'Outfit'; font-size:2.5rem; margin:0;">Календар <span>Сканера</span></h1>
        <div style="font-family:'JetBrains Mono'; font-size:0.7rem; color:var(--muted); margin-top:5px;">6 РОКІВ • LIGHT & DARK MODE</div>
    </header>

    <div id="calendar-scroll" style="flex:1; overflow-y:auto; padding: 0 3rem 3rem;"></div>
</main>

<div id="modal" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:20000;">
    <div style="background:var(--surface); padding:2rem; border-radius:15px; width:320px; border:1px solid var(--border);">
        <input type="text" id="mTitle" placeholder="Назва">
        <select id="mCat">
            <option value="learning">Навчання</option>
            <option value="travel">Подорожі</option>
            <option value="sport">Спорт</option>
            <option value="creative">Творчість</option>
        </select>
        <button class="btn btn-primary" onclick="saveProject()">Зберегти</button>
        <button class="btn" onclick="closeModal()" style="background:none; color:var(--muted); margin-top:5px;">Скасувати</button>
    </div>
</div>

<script>
    // --- SUPABASE SETUP ---
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co"; // Твій URL зі скріншоту
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; // Твій ключ
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];
    let editingId = null;

    // --- THEME LOGIC ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        document.getElementById('themeBtn').innerText = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('scanner-theme', next);
    }

    // Завантаження теми при старті
    const savedTheme = localStorage.getItem('scanner-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);
    document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '☀️' : '🌙';

    // --- AUTH ---
    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('auth-msg');

        if(type === 'login') {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) msg.innerText = error.message;
            else checkUser();
        } else {
            const { error } = await sb.auth.signUp({ email, password });
            if (error) msg.innerText = error.message;
            else msg.innerText = "Реєстрація успішна! Спробуйте увійти.";
        }
    }

    async function checkUser() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            document.getElementById('auth-overlay').style.display = 'none';
            loadData();
        }
    }

    // --- DATA & RENDER ---
    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render() {
        const container = document.getElementById('calendar-scroll');
        container.innerHTML = '';
        const months = ['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];
        
        for (let i = 0; i < 6; i++) {
            const year = 2026 + i;
            const block = document.createElement('div');
            block.innerHTML = `<div class="year-header">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';

            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.dataset.date = dKey;
                cell.innerHTML = `<div class="month-name">${months[m-1]}</div>`;
                cell.ondragover = e => e.preventDefault();
                cell.ondrop = e => drop(e, dKey);
                row.appendChild(cell);
            }
            block.appendChild(row);
            container.appendChild(block);
        }

        document.getElementById('backlog').innerHTML = '';
        projects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.draggable = true;
            card.innerHTML = `${p.title} <span class="card-tag" style="background:var(--cat-${p.cat})"></span>`;
            card.ondragstart = e => e.dataTransfer.setData("text", p.id);
            card.onclick = () => openModal(p.id);

            if (p.date) {
                const cell = document.querySelector(`[data-date="${p.date}"]`);
                if (cell) cell.appendChild(card);
            } else {
                document.getElementById('backlog').appendChild(card);
            }
        });
    }

    async function drop(e, date) {
        const id = e.dataTransfer.getData("text");
        const newDate = date === 'backlog' ? null : date;
        await sb.from('projects').update({ date: newDate }).eq('id', id);
        loadData();
    }

    function openModal(id = null) {
        editingId = id;
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if (editingId) await sb.from('projects').update({ title, cat }).eq('id', editingId);
        else await sb.from('projects').insert([{ title, cat, user_id: user.id }]);
        closeModal(); loadData();
    }

    checkUser();
</script>
</body>
</html>
