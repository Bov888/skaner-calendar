<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Elite 6Y</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0b; --surface: #141416; --border: #242427; --text: #ffffff;
            --muted: #71717a; --accent: #10b981; --error: #f43f5e;
        }
        :root[data-theme="light"] {
            --bg: #ffffff; --surface: #f4f4f5; --border: #e4e4e7; --text: #09090b;
            --muted: #71717a; --accent: #10b981; --error: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; border: none; outline: none; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* AUTH LAYER */
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 40px; border-radius: 32px; box-shadow: 0 0 0 1px var(--border); width: 90%; max-width: 380px; text-align: center; }

        /* LAYOUT */
        #sidebar { 
            width: 300px; background: var(--bg); flex-shrink: 0; box-shadow: 1px 0 0 0 var(--border);
            display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        .sidebar-closed #sidebar { transform: translateX(-300px); margin-right: -300px; }
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

        /* NAV BARS */
        .bar { height: 64px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 1px 0 0 var(--border); gap: 12px; flex-shrink: 0; }
        .icon-btn { 
            width: 44px; height: 44px; border-radius: 12px; background: var(--surface); 
            box-shadow: 0 0 0 1px var(--border); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .icon-btn:hover { box-shadow: 0 0 0 1px var(--accent); color: var(--accent); }
        .icon-btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        /* CATEGORIES */
        #cat-strip { padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 10px; overflow-x: auto; scrollbar-width: none; box-shadow: 0 1px 0 0 var(--border); }
        .cat-chip { 
            padding: 8px 16px; border-radius: 10px; background: var(--surface); font-size: 13px; font-weight: 700;
            box-shadow: 0 0 0 1px var(--border); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }

        /* GRID 4x3 SYSTEM */
        #calendar-view { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .year-group { margin-bottom: 24px; }
        .year-toggle { 
            background: var(--surface); padding: 16px 20px; border-radius: 16px; 
            box-shadow: 0 0 0 1px var(--border); cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .year-toggle h2 { font-size: 24px; font-weight: 900; color: var(--accent); letter-spacing: -1px; }

        .grid-4x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .year-group.collapsed .grid-4x3 { display: none; }

        .month-cell {
            background: var(--surface); border-radius: 16px; padding: 35px 10px 10px;
            box-shadow: 0 0 0 1px var(--border); position: relative; min-height: 110px; cursor: pointer;
        }
        .month-cell::before {
            content: attr(data-label); position: absolute; top: 12px; left: 12px;
            font-size: 10px; font-weight: 900; color: var(--muted); text-transform: uppercase;
        }

        .proj-pill {
            padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
            color: #fff; margin-bottom: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border-left: 3px solid rgba(255,255,255,0.4);
        }

        /* MODALS & FORMS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .input-ui { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; background: var(--bg); color: var(--text); box-shadow: 0 0 0 1px var(--border); font-size: 16px; }
        .primary-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        @media (max-width: 600px) {
            .grid-4x3 { grid-template-columns: repeat(3, 1fr); } /* Залишаємо 3 колонки для квартального вигляду */
            .month-cell { min-height: 90px; }
        }
    </style>
</head>
<body class="sidebar-closed">

<div id="auth-gate">
    <div class="auth-card">
        <h1 style="margin-bottom: 8px; font-weight: 900;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        <p style="color:var(--muted); margin-bottom: 30px; font-size: 14px;">Авторизація</p>
        <input type="email" id="auth-email" class="input-ui" placeholder="Email">
        <input type="password" id="auth-pass" class="input-ui" placeholder="Пароль">
        <button onclick="handleLogin()" class="primary-btn">Увійти</button>
        <div id="auth-err" style="color:var(--error); margin-top: 15px; font-size: 12px; font-weight: 700;"></div>
    </div>
</div>

<aside id="sidebar">
    <div class="bar" style="justify-content: space-between;">
        <span style="font-weight: 900; color: var(--muted); font-size: 12px; letter-spacing: 1px;">BACKLOG</span>
        <div class="icon-btn" onclick="toggleSidebar()" style="box-shadow: none;"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></div>
    </div>
    <div style="padding: 20px;">
        <button onclick="openModal('proj')" class="primary-btn">+ ПРОЄКТ</button>
        <button onclick="openModal('cat')" class="primary-btn" style="background:var(--surface); color:var(--text); margin-top:10px; box-shadow: 0 0 0 1px var(--border);">+ КАТЕГОРІЯ</button>
    </div>
    <div id="backlog-items" style="flex:1; overflow-y:auto; padding: 0 20px;"></div>
</aside>

<main>
    <header class="bar">
        <div class="icon-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
        <h2 style="flex:1; font-weight: 900; font-size: 20px; letter-spacing: -1px;">Scanner<span style="color:var(--accent)">Planner</span></h2>
        
        <div class="icon-btn" onclick="toggleTheme()">
            <svg id="theme-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.02 0l-.707-.707M6.343 6.343l-.707-.707"/></svg>
        </div>
        
        <div class="icon-btn" onclick="handleLogout()" style="color: var(--error);">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </div>
    </header>

    <div id="cat-strip"></div>
    <div id="calendar-view"></div>
</main>

<div id="main-modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="auth-card" id="modal-body" style="text-align: left;"></div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], categories = [], activeDate = null;

    function toggleSidebar() { document.body.classList.toggle('sidebar-closed'); }
    
    function toggleTheme() {
        const d = document.documentElement;
        const isDark = d.getAttribute('data-theme') === 'dark';
        d.setAttribute('data-theme', isDark ? 'light' : 'dark');
    }

    async function handleLogin() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) document.getElementById('auth-err').innerText = error.message;
    }

    async function handleLogout() { await sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, sess) => {
        if (sess) { document.getElementById('auth-gate').style.display='none'; sync(); }
        else { document.getElementById('auth-gate').style.display='flex'; }
    });

    async function sync() {
        const [p, c] = await Promise.all([sb.from('projects').select('*'), sb.from('categories').select('*')]);
        projects = p.data || []; categories = c.data || [];
        render();
    }

    function render() {
        // Render Categories
        const strip = document.getElementById('cat-strip');
        strip.innerHTML = '';
        categories.forEach(c => {
            const el = document.createElement('div'); el.className = 'cat-chip';
            el.innerHTML = `<div style="width:8px; height:8px; border-radius:50%; background:${c.color}"></div> ${c.name}`;
            el.onclick = () => openModal('cat', null, c);
            strip.appendChild(el);
        });

        // Render Calendar
        const view = document.getElementById('calendar-view');
        view.innerHTML = '';
        const mNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        const startY = 2026;

        for (let i = 0; i < 6; i++) {
            const y = startY + i;
            const group = document.createElement('div'); group.className = 'year-group';
            group.innerHTML = `<div class="year-toggle" onclick="this.parentElement.classList.toggle('collapsed')"><h2>${y}</h2><span>▼</span></div>`;
            
            const grid = document.createElement('div'); grid.className = 'grid-4x3';
            for (let m = 1; m <= 12; m++) {
                const code = `${y}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div'); cell.className = 'month-cell';
                cell.setAttribute('data-label', mNames[m-1]);
                cell.onclick = (e) => { if(e.target === cell) openModal('proj', code); };

                projects.filter(p => p.date === code).forEach(p => {
                    const c = categories.find(cat => cat.name === p.cat);
                    const pill = document.createElement('div'); pill.className = 'proj-pill';
                    pill.style.background = c?.color || '#444'; pill.innerText = p.title;
                    pill.onclick = (e) => { e.stopPropagation(); openModal('proj', code, p); };
                    cell.appendChild(pill);
                });
                grid.appendChild(cell);
            }
            group.appendChild(grid); view.appendChild(group);
        }

        // Render Backlog
        const bl = document.getElementById('backlog-items'); bl.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            const c = categories.find(cat => cat.name === p.cat);
            const pill = document.createElement('div'); pill.className = 'proj-pill';
            pill.style.background = c?.color || '#444'; pill.innerText = p.title;
            pill.onclick = () => openModal('proj', null, p);
            bl.appendChild(pill);
        });
    }

    function openModal(type, date, item = null) {
        activeDate = date;
        const body = document.getElementById('modal-body');
        document.getElementById('main-modal').style.display = 'flex';

        if (type === 'proj') {
            body.innerHTML = `<h3>${item ? 'Редагувати' : 'Новий'} проєкт</h3>
                <input id="f-title" class="input-ui" value="${item?.title || ''}" placeholder="Назва...">
                <select id="f-cat" class="input-ui">${categories.map(c => `<option ${item?.cat === c.name ? 'selected' : ''}>${c.name}</option>`).join('')}</select>
                <button onclick="saveProj('${item?.id || ''}')" class="primary-btn">Зберегти</button>
                ${item ? `<button onclick="delItem('projects', '${item.id}')" style="background:none; color:var(--error); margin-top:10px; width:100%; font-weight:700;">Видалити</button>` : ''}`;
        } else {
            body.innerHTML = `<h3>${item ? 'Редагувати' : 'Нова'} категорія</h3>
                <input id="f-name" class="input-ui" value="${item?.name || ''}" placeholder="Назва...">
                <input id="f-color" type="color" class="input-ui" style="height:50px;" value="${item?.color || '#10b981'}">
                <button onclick="saveCat('${item?.id || ''}')" class="primary-btn">Зберегти</button>
                ${item ? `<button onclick="delItem('categories', '${item.id}')" style="background:none; color:var(--error); margin-top:10px; width:100%; font-weight:700;">Видалити</button>` : ''}`;
        }
    }

    async function saveProj(id) {
        const title = document.getElementById('f-title').value, cat = document.getElementById('f-cat').value;
        const user = (await sb.auth.getUser()).data.user;
        const data = { title, cat, date: activeDate, user_id: user.id };
        if (id) await sb.from('projects').update(data).eq('id', id);
        else await sb.from('projects').insert([data]);
        closeModal(); sync();
    }

    async function saveCat(id) {
        const name = document.getElementById('f-name').value, color = document.getElementById('f-color').value;
        const user = (await sb.auth.getUser()).data.user;
        const data = { name, color, user_id: user.id };
        if (id) await sb.from('categories').update(data).eq('id', id);
        else await sb.from('categories').insert([data]);
        closeModal(); sync();
    }

    async function delItem(tbl, id) { if(confirm('Видалити?')) { await sb.from(tbl).delete().eq('id', id); closeModal(); sync(); } }
    function closeModal() { document.getElementById('main-modal').style.display = 'none'; }
</script>
</body>
</html>
