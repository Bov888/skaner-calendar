<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#fafaf8; --surface:#f4f3ef; --border:#e2e1db; --text:#1a1917;
            --muted:#6b6963; --accent:#2d5a27; --accent-light:#e8f0e6; --accent-mid:#4a8a42;
            --error:#8b2010; --sidebar-w:240px;
        }
        [data-theme="dark"] {
            --bg:#141412; --surface:#1e1d1b; --border:#2e2d2a; --text:#e8e6e0;
            --muted:#8a8880; --accent:#6ab05f; --accent-light:#1e2e1c; --accent-mid:#4a8a42;
            --error:#e05040;
        }
        *{ margin:0; padding:0; box-sizing:border-box; border:none; outline:none; }
        body{
            background:var(--bg); color:var(--text);
            font-family:'Literata',Georgia,serif; font-weight:300;
            height:100vh; height:100dvh; overflow:hidden;
            display:flex; flex-direction:column;
        }

        /* AUTH */
        #auth-gate{ position:fixed; inset:0; background:var(--bg); z-index:20000; display:none; align-items:center; justify-content:center; padding:1.5rem; }
        .auth-card{ background:var(--surface); padding:2.5rem; border-radius:3px; border:1px solid var(--border); width:100%; max-width:360px; }
        .auth-logo{ font-family:'Literata',serif; font-size:1.4rem; font-weight:300; letter-spacing:-.02em; margin-bottom:2rem; text-align:center; }
        .auth-logo span{ color:var(--accent); font-style:italic; }

        /* TOP BAR */
        .top-bar{ height:52px; display:flex; align-items:center; padding:0 1.5rem; border-bottom:1px solid var(--border); gap:1rem; z-index:200; background:var(--bg); }
        .site-title{ font-family:'Literata',serif; font-size:1.1rem; color:var(--text); display:flex; align-items:center; gap:.5rem; flex:1; cursor:pointer; background:none; }
        .site-title span{ color:var(--accent); font-style:italic; }
        .icon-btn{ background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; width:32px; height:32px; border-radius:2px; display:flex; align-items:center; justify-content:center; }
        .icon-btn:hover{ border-color:var(--accent); color:var(--accent); }

        /* LAYOUT */
        .app-body{ flex:1; display:flex; overflow:hidden; position:relative; }
        #sidebar{ width:var(--sidebar-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:relative; transition: width .2s; }
        @media(max-width:1024px){
            #sidebar{ position:absolute; left:0; top:0; bottom:0; z-index:500; width:280px!important; transform:translateX(-100%); transition: transform .3s; }
            .sidebar-open #sidebar{ transform:translateX(0); }
            #sidebar-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; z-index:499; }
            .sidebar-open #sidebar-overlay{ display:block; }
        }

        .sidebar-section{ padding:1.2rem 1rem; border-bottom:1px solid var(--border); }
        .sidebar-label{ font-family:'JetBrains Mono',monospace; font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; display:block; }
        .primary-btn, .secondary-btn{ width:100%; padding:.6rem; border-radius:2px; font-family:'JetBrains Mono',monospace; font-size:.6rem; text-transform:uppercase; cursor:pointer; }
        .primary-btn{ background:var(--accent); color:#fff; }
        .secondary-btn{ border:1px solid var(--border); background:none; color:var(--muted); }

        /* BACKLOG */
        #backlog-wrap{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
        #backlog{ flex:1; overflow-y:auto; padding:1rem; min-height:100px; }
        #backlog.drag-over{ background:var(--accent-light); }
        .backlog-proj{ padding:8px; border-radius:2px; font-family:'JetBrains Mono',monospace; font-size:.6rem; margin-bottom:4px; display:flex; align-items:center; gap:5px; border:1px solid rgba(0,0,0,0.05); }

        /* FILTERS - TWO ROWS */
        #filter-panel{ border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
        .filter-row{ display:flex; align-items:center; gap:.5rem; padding:.4rem 1rem; overflow-x:auto; scrollbar-width:none; }
        .filter-row:first-child{ border-bottom:1px solid var(--border); }
        .filter-row::-webkit-scrollbar{ display:none; }
        .filter-label{ font-family:'JetBrains Mono',monospace; font-size:.5rem; text-transform:uppercase; color:var(--muted); flex-shrink:0; margin-right:.4rem; }

        .chip{ font-family:'JetBrains Mono',monospace; font-size:.58rem; border:1px solid var(--border); color:var(--muted); padding:.3rem .6rem; border-radius:2px; cursor:pointer; background:none; white-space:nowrap; display:flex; align-items:center; gap:5px; transition: .2s; }
        .chip.active{ background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        .reset-btn{ color:var(--error); border-color:var(--error); margin-left:auto; }

        /* VIEW */
        #view{ flex:1; overflow-y:auto; padding:1rem; -webkit-overflow-scrolling:touch; }
        .year-sec{ margin-bottom:2rem; }
        .year-title{ font-family:'Literata',serif; font-size:1.4rem; color:var(--accent); margin-bottom:1rem; cursor:pointer; }
        .calendar-grid{ display:grid; grid-template-columns:repeat(12,1fr); gap:6px; }
        @media(max-width:1100px){ .calendar-grid{ grid-template-columns:repeat(6,1fr); } }
        @media(max-width:700px) { .calendar-grid{ grid-template-columns:repeat(3,1fr); } }

        .month-cell{ background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:22px 5px 5px; position:relative; min-height:80px; }
        .month-cell.drag-over{ border-color:var(--accent); background:var(--accent-light); }
        .month-cell::before{ content:attr(data-label); position:absolute; top:6px; left:6px; font-family:'JetBrains Mono',monospace; font-size:.5rem; color:var(--muted); text-transform:uppercase; }

        .proj{ padding:4px 6px; border-radius:2px; font-family:'JetBrains Mono',monospace; font-size:.58rem; margin-bottom:3px; line-height:1.2; display:flex; align-items:flex-start; gap:4px; }
        .proj.done{ opacity:.4; text-decoration:line-through; }

        /* DRAG GHOST */
        .drag-ghost{ position:fixed; pointer-events:none; z-index:99999; border-radius:3px; padding:6px 10px; font-family:'JetBrains Mono',monospace; font-size:.65rem; transform:translate(-50%,-50%); box-shadow:0 8px 24px rgba(0,0,0,0.2); }

        /* MODAL */
        .modal{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:10000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); padding:1rem; }
        .modal-card{ background:var(--bg); border:1px solid var(--border); padding:1.5rem; width:100%; max-width:380px; border-radius:4px; }
        .inp{ width:100%; padding:.7rem; margin-bottom:.8rem; background:var(--surface); color:var(--text); border:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:.75rem; border-radius:2px; }
    </style>
</head>
<body>

<div id="auth-gate">
    <div class="auth-card">
        <div class="auth-logo">Scanner<span>Planner</span></div>
        <input type="email" id="email" class="inp" placeholder="email@example.com">
        <input type="password" id="pass" class="inp" placeholder="••••••••">
        <button onclick="login()" class="primary-btn">Увійти</button>
        <p id="auth-err" style="color:var(--error); font-size:0.6rem; margin-top:10px; text-align:center"></p>
    </div>
</div>

<header class="top-bar">
    <button class="icon-btn" onclick="document.body.classList.toggle('sidebar-open')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="site-title" onclick="window.location.reload()">Scanner<span>Planner</span></div>
    <button class="icon-btn danger" onclick="logout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
</header>

<div class="app-body">
    <div id="sidebar-overlay"></div>
    <aside id="sidebar">
        <div class="sidebar-section">
            <span class="sidebar-label">Рік старту</span>
            <input type="number" id="start-year" class="inp" value="2026" onchange="render()" style="text-align:center; margin-bottom:0;">
        </div>
        <div class="sidebar-section" style="display:flex; gap:10px;">
            <button onclick="openModal('proj', null)" class="primary-btn">+ Елемент</button>
            <button onclick="openModal('cat', null)" class="secondary-btn">+ Кат</button>
        </div>
        <div id="backlog-wrap">
            <div id="backlog"></div>
        </div>
    </aside>

    <main id="main-area" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div id="filter-panel">
            <div class="filter-row" id="cats-row"><span class="filter-label">Категорії</span></div>
            <div class="filter-row" id="kinds-row">
                <span class="filter-label">Типи</span>
                <button class="chip reset-btn" onclick="clearFilters()">✕ Скинути</button>
            </div>
        </div>
        <div id="view"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-card" id="m-body"></div>
</div>

<script>
const S_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(S_URL,S_KEY);

let projects=[], categories=[];
let activeFilters=new Set(), activeKinds=new Set();
let activeDate=null, editingId=null;
const KINDS=[{id:'project',icon:'🎯',label:'Проєкт'},{id:'interest',icon:'✦',label:'Інтерес'},{id:'zone',icon:'◎',label:'Зона'}];
const mNames=['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

/* AUTH */
async function login(){
    const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
    if(error)document.getElementById('auth-err').textContent=error.message;
}
async function logout(){await sb.auth.signOut();window.location.reload();}
sb.auth.onAuthStateChange((ev,sess)=>{
    document.getElementById('auth-gate').style.display=sess?'none':'flex';
    if(sess)sync();
});

/* SYNC */
async function sync(){
    const[p,c]=await Promise.all([sb.from('projects').select('*'),sb.from('categories').select('*')]);
    projects=p.data||[]; categories=c.data||[];
    render();
}

function clearFilters(){ activeFilters.clear(); activeKinds.clear(); render(); }

function render(){
    // Filter Row 1: Categories
    const cr=document.getElementById('cats-row'); cr.innerHTML='<span class="filter-label">Категорії</span>';
    categories.forEach(c=>{
        const btn=document.createElement('button');
        btn.className='chip'+(activeFilters.has(c.name)?' active':'');
        btn.innerHTML=`<span style="width:6px;height:6px;border-radius:50%;background:${c.color}"></span>${c.name}`;
        
        // Long Press Logic for Mobile
        let timer;
        btn.addEventListener('touchstart',()=>timer=setTimeout(()=>openModal('cat',null,c),600));
        btn.addEventListener('touchend',()=>clearTimeout(timer));
        btn.onclick=()=>{ if(!timer || (Date.now()-timer < 600)){ activeFilters.has(c.name)?activeFilters.delete(c.name):activeFilters.add(c.name); render(); }};
        btn.oncontextmenu=e=>{e.preventDefault(); openModal('cat',null,c);};
        cr.appendChild(btn);
    });

    // Filter Row 2: Kinds
    const kr=document.getElementById('kinds-row');
    kr.querySelectorAll('.kind-chip').forEach(n=>n.remove());
    KINDS.forEach(k=>{
        const btn=document.createElement('button');
        btn.className='chip kind-chip'+(activeKinds.has(k.id)?' active':'');
        btn.innerHTML=`<span>${k.icon}</span>${k.label}`;
        btn.onclick=()=>{ activeKinds.has(k.id)?activeKinds.delete(k.id):activeKinds.add(k.id); render(); };
        kr.insertBefore(btn, kr.lastElementChild);
    });

    // Grid Rendering
    const view=document.getElementById('view'), startY=parseInt(document.getElementById('start-year').value)||2026;
    view.innerHTML='';
    let list=projects.filter(p=>(!activeFilters.size||activeFilters.has(p.cat)) && (!activeKinds.size||activeKinds.has(p.kind||'project')));

    for(let y=startY; y<startY+3; y++){
        const sec=document.createElement('div'); sec.className='year-sec';
        sec.innerHTML=`<div class="year-title">${y}</div>`;
        const grid=document.createElement('div'); grid.className='calendar-grid';
        for(let m=1; m<=12; m++){
            const code=`${y}-${String(m).padStart(2,'0')}`, cell=document.createElement('div');
            cell.className='month-cell'; cell.dataset.code=code; cell.dataset.label=mNames[m-1];
            cell.onclick=e=>{if(e.target===cell)openModal('proj',code)};
            cell.ondragover=e=>e.preventDefault();
            cell.ondrop=async e=>{
                const pid=e.dataTransfer.getData('pid');
                if(pid){await sb.from('projects').update({date:code}).eq('id',pid); sync();}
            };
            list.filter(p=>p.date===code).forEach(p=>cell.appendChild(createProjEl(p)));
            grid.appendChild(cell);
        }
        sec.appendChild(grid); view.appendChild(sec);
    }

    // Backlog
    const bl=document.getElementById('backlog'); bl.innerHTML='';
    bl.ondragover=e=>e.preventDefault();
    bl.ondrop=async e=>{
        const pid=e.dataTransfer.getData('pid');
        if(pid){await sb.from('projects').update({date:null}).eq('id',pid); sync();}
    };
    list.filter(p=>!p.date).forEach(p=>bl.appendChild(createProjEl(p,true)));
}

function createProjEl(p,isBl=false){
    const cat=categories.find(c=>c.name===p.cat), bg=cat?.color||'#ccc';
    const el=document.createElement('div'); el.className='proj'+(p.done?' done':'');
    el.style.background=bg; el.style.color=getContrast(bg);
    el.innerHTML=`<span>${KINDS.find(k=>k.id===(p.kind||'project'))?.icon}</span> ${p.title}`;
    el.onclick=e=>{e.stopPropagation(); openModal('proj',p.date,p)};
    
    // Drag Setup
    el.draggable=true;
    el.ondragstart=e=>e.dataTransfer.setData('pid',p.id);
    attachTouchDrag(el,p);
    return el;
}

/* IMPROVED TOUCH DRAG */
function attachTouchDrag(el,p){
    let td={active:false,dragging:false,ghost:null,target:null,startX:0,startY:0};
    const cat=categories.find(c=>c.name===p.cat), bg=cat?.color||'#ccc';

    el.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        td={active:true,dragging:false,startX:t.clientX,startY:t.clientY,bg,fg:getContrast(bg),label:p.title};
    },{passive:true});

    el.addEventListener('touchmove',e=>{
        if(!td.active)return;
        const t=e.touches[0], dx=t.clientX-td.startX, dy=t.clientY-td.startY;
        if(!td.dragging && Math.sqrt(dx*dx+dy*dy)>10){
            td.dragging=true;
            td.ghost=document.createElement('div');
            td.ghost.className='drag-ghost'; td.ghost.textContent=td.label;
            td.ghost.style.background=td.bg; td.ghost.style.color=td.fg;
            document.body.appendChild(td.ghost);
            if(navigator.vibrate)navigator.vibrate(25);
        }
        if(td.dragging){
            if(e.cancelable) e.preventDefault();
            td.ghost.style.left=t.clientX+'px'; td.ghost.style.top=t.clientY+'px';
            td.ghost.style.visibility='hidden';
            const under=document.elementFromPoint(t.clientX,t.clientY);
            td.ghost.style.visibility='visible';
            const newTgt=under?.closest('.month-cell')||under?.closest('#backlog');
            if(td.target)td.target.classList.remove('drag-over');
            td.target=newTgt;
            if(td.target)td.target.classList.add('drag-over');
        }
    },{passive:false});

    el.addEventListener('touchend',async ()=>{
        if(td.ghost)td.ghost.remove();
        if(td.target){
            td.target.classList.remove('drag-over');
            const newDate=td.target.dataset.code||null;
            await sb.from('projects').update({date:newDate}).eq('id',p.id); sync();
        }
        td.active=false;
    });
}

function getContrast(hex){
    const c=hex.replace('#','');
    const r=parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
    return (r*0.299+g*0.587+b*0.114)>150?'#1a1917':'#fff';
}

/* MODALS */
function openModal(type,date,item=null){
    activeDate=date; editingId=item?.id||null;
    const body=document.getElementById('m-body');
    document.getElementById('modal').style.display='flex';
    document.body.classList.remove('sidebar-open');

    if(type==='proj'){
        body.innerHTML=`<h3 style="margin-bottom:1rem">${item?'Редагувати':'Новий'}</h3>
        <input id="f-t" class="inp" value="${item?.title||''}" placeholder="Назва...">
        <select id="f-c" class="inp">${categories.map(c=>`<option ${item?.cat===c.name?'selected':''}>${c.name}</option>`).join('')}</select>
        <select id="f-k" class="inp">${KINDS.map(k=>`<option value="${k.id}" ${item?.kind===k.id?'selected':''}>${k.icon} ${k.label}</option>`).join('')}</select>
        <label style="display:flex;align-items:center;gap:10px;font-size:.7rem;margin-bottom:1rem"><input type="checkbox" id="f-d" ${item?.done?'checked':''}> ВИКОНАНО</label>
        <button onclick="saveProj()" class="primary-btn">Зберегти</button>
        ${item?`<button onclick="del('projects','${item.id}')" style="margin-top:10px;color:var(--error);background:none;width:100%;font-size:.6rem;cursor:pointer">ВИДАЛИТИ</button>`:''}`;
    } else {
        body.innerHTML=`<h3 style="margin-bottom:1rem">Категорія</h3>
        <input id="f-n" class="inp" value="${item?.name||''}" placeholder="Назва">
        <input type="color" id="f-co" class="inp" value="${item?.color||'#2d5a27'}">
        <button onclick="saveCat()" class="primary-btn">Зберегти</button>
        ${item?`<button onclick="del('categories','${item.id}')" style="margin-top:10px;color:var(--error);background:none;width:100%;font-size:.6rem;cursor:pointer">ВИДАЛИТИ</button>`:''}`;
    }
}
function closeModal(){document.getElementById('modal').style.display='none';}

async function saveProj(){
    const u=(await sb.auth.getUser()).data.user;
    const d={title:document.getElementById('f-t').value, cat:document.getElementById('f-c').value, kind:document.getElementById('f-k').value, date:activeDate, done:document.getElementById('f-d').checked, user_id:u.id};
    if(editingId) await sb.from('projects').update(d).eq('id',editingId);
    else await sb.from('projects').insert([d]);
    closeModal(); sync();
}
async function saveCat(){
    const u=(await sb.auth.getUser()).data.user;
    const d={name:document.getElementById('f-n').value, color:document.getElementById('f-co').value, user_id:u.id};
    if(editingId) await sb.from('categories').update(d).eq('id',editingId);
    else await sb.from('categories').insert([d]);
    closeModal(); sync();
}
async function del(t,id){if(confirm('Видалити?')){await sb.from(t).delete().eq('id',id); closeModal(); sync();}}
</script>
</body>
</html>
