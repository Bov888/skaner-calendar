<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner - Final Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Outfit:wght@700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #121212; --border: #222; --text: #ffffff;
            --muted: #888; --accent: #4a9e42; --sidebar: #0a0a0a;
        }
        :root[data-theme="light"] {
            --bg: #f8f9fa; --surface: #ffffff; --border: #dcdcdc; --text: #1a1a1a;
            --muted: #6c757d; --accent: #388e3c; --sidebar: #f1f3f4;
        }
        :root {
            --cat-learning: #4caf50; --cat-travel: #ff9800; --cat-sport: #2196f3;
            --cat-creative: #e91e63; --cat-career: #ffc107;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.2s; }

        /* SIDEBAR */
        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.collapsed { margin-left: -280px; }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { padding: 1.2rem 2.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg); }
        
        .header-title { font-family: 'Outfit'; font-size: 1.8rem; margin: 0; letter-spacing: -0.5px; }
        .header-title span { color: var(--accent); }

        .icon-btn { 
            background: var(--surface); border: 1.5px solid var(--border); color: var(--text); 
            padding: 10px 18px; border-radius: 25px; cursor: pointer; font-weight: 700;
            display: flex; align-items: center; gap: 10px; font-size: 0.9rem; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); background: var(--bg); }

        /* CATEGORIES NAV */
        .categories-nav { display: flex; gap: 20px; padding: 12px 2.5rem; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--surface); }
        .cat-tag { cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 0.85rem; font-weight: 700; color: var(--muted); transition: 0.2s; }
        .cat-tag:hover { color: var(--text); }

        /* CALENDAR ACCORDION */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 1rem 2.5rem; scroll-behavior: smooth; }
        
        .year-section { margin-bottom: 10px; border-bottom: 1px solid var(--border); }
        .year-header { 
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; padding: 20px 0; font-family: 'JetBrains Mono'; 
            color: var(--accent); font-size: 1.3rem; font-weight: 800;
        }
        .year-header::after { content: '▼'; font-size: 0.8rem; transition: 0.3s; opacity: 0.5; }
        .year-section.closed .year-header::after { transform: rotate(-90deg); }
        .year-section.closed .year-content { display: none; }

        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 12px; padding-bottom: 30px; }
        @media (max-width: 1200px) { .year-row { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 768px) { .year-row { grid-template-columns: repeat(4, 1fr); } }

        .month-cell { 
            background: var(--surface); border: 1.5px solid var(--border); aspect-ratio: 1/1.1; 
            border-radius: 8px; position: relative; padding: 8px; transition: 0.2s;
        }
        .month-cell:hover { border-color: var(--muted); }
        .month-label { font-size: 0.75rem; font-weight: 800; color: var(--muted); font-family: 'JetBrains Mono'; text-transform: uppercase; }

        /* CARDS */
        .card { 
            background: var(--accent); color: white; padding: 6px 10px; border-radius: 6px; 
            font-size: 0.75rem; margin-top: 10px; font-weight: 700; line-height: 1.2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1);
        }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--surface); padding: 2.5rem; border-radius: 20px; width: 350px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-content h3 { font-family: 'Outfit'; margin-top: 0; font-size: 1.5rem; }
        
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg); 
            border: 1.5px solid var(--border); color: var(--text); border-radius: 10px; font-weight: 600;
        }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 800; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="padding: 2rem; border-bottom: 1px solid var(--border);">
        <button onclick="openModal()" class="btn-main">+ НОВИЙ ПРОЄКТ</button>
    </div>
    <div style="padding: 1.5rem 2rem 0.5rem; font-size: 0.8rem; font-family: 'JetBrains Mono'; color: var(--accent); font-weight: 800;">ЧЕРГА ІДЕЙ</div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 1rem;"></div>
</aside>

<main>
    <header class="top-header">
        <div style="display:flex; gap:20px; align-items:center;">
            <button class="icon-btn" onclick="toggleSidebar()">☰ МЕНЮ</button>
            <h2 class="header-title">Planner<span>Scanner</span></h2>
        </div>
        <div style="display:flex; gap:12px;">
            <button class="icon-btn" onclick="toggleTheme()">🌗 ТЕМА</button>
            <button class="icon-btn" style="color:#ff5252; border-color:#ff5252;" onclick="sb.auth.signOut().then(()=>location.reload())">ВИХІД</button>
        </div>
    </header>

    <div class="categories-nav">
        <div class="cat-tag" onclick="render('learning')"><span style="color:var(--cat-learning)">●</span> НАВЧАННЯ</div>
        <div class="cat-tag" onclick="render('travel')"><span style="color:var(--cat-travel)">●</span> ПОДОРОЖІ</div>
        <div class="cat-tag" onclick="render('creative')"><span style="color:var(--cat-creative)">●</span> ТВОРЧІСТЬ</div>
        <div class="cat-tag" onclick="render()">✕ СКИНУТИ</div>
    </div>

    <div id="calendar-scroll"></div>
</main>

<div id="modal">
    <div class="modal-content">
        <h3>Новий проєкт</h3>
        <input type="text" id="mTitle" placeholder="Що плануєте?">
        <select id="mCat">
            <option value="learning">Навчання</option>
            <option value="travel">Подорожі</option>
            <option value="creative">Творчість</option>
            <option value="career">Кар'єра</option>
        </select>
        <button class="btn-main" onclick="saveProject()">ЗБЕРЕГТИ В ХМАРУ</button>
        <button onclick="closeModal()" style="width: 100%; background: none; border: none; color: var(--muted); margin-top: 15px; cursor: pointer; font-weight: 700;">СКАСУВАТИ</button>
    </div>
</div>

<script>
    // --- ПІДКЛЮЧЕННЯ ---
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];

    // --- ЛОГІКА ІНТЕРФЕЙСУ ---
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');

    // --- РОБОТА З КАЛЕНДАРЕМ ---
    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render(filter = null) {
        const cont = document.getElementById('calendar-scroll');
        cont.innerHTML = '';
        const months = ['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];

        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            const yearSection = document.createElement('div');
            yearSection.className = 'year-section';
            yearSection.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('closed')">${year}</div>`;
            
            const content = document.createElement('div');
            content.className = 'year-content';
            const row = document.createElement('div');
            row.className = 'year-row';

            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                
                const p = projects.find(x => x.date === dKey);
                if (p && (!filter || p.cat === filter)) {
                    cell.innerHTML += `<div class="card" style="background:var(--cat-${p.cat})">${p.title}</div>`;
                }
                row.appendChild(cell);
            }
            content.appendChild(row);
            yearSection.appendChild(content);
            cont.appendChild(yearSection);
        }

        const bLog = document.getElementById('backlog');
        bLog.innerHTML = '';
        projects.filter(x => !x.date).forEach(p => {
            bLog.innerHTML += `<div class="card" style="background:var(--cat-${p.cat}); margin-bottom:12px; padding:12px;">${p.title}</div>`;
        });
    }

    // МОДАЛКА
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if(!title) return;
        await sb.from('projects').insert([{ title, cat, user_id: user.id }]);
        closeModal(); document.getElementById('mTitle').value = ''; loadData();
    }

    // СТАРТ
    sb.auth.getUser().then(({data}) => {
        if(data.user) loadData();
        else window.location.href = "/";
    });
</script>
</body>
</html>
