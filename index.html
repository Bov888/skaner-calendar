<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#fafaf8;--surface:#f4f3ef;--border:#e2e1db;--text:#1a1917;
            --muted:#6b6963;--accent:#2d5a27;--accent-light:#e8f0e6;--accent-mid:#4a8a42;
            --error:#8b2010;--sidebar-w:240px;
        }
        [data-theme="dark"]{
            --bg:#141412;--surface:#1e1d1b;--border:#2e2d2a;--text:#e8e6e0;
            --muted:#8a8880;--accent:#6ab05f;--accent-light:#1e2e1c;--accent-mid:#4a8a42;
            --error:#e05040;
        }
        *{margin:0;padding:0;box-sizing:border-box;border:none;outline:none;}
        html{font-size:16px;}
        body{
            background:var(--bg);color:var(--text);
            font-family:'Literata',Georgia,serif;font-weight:300;
            height:100vh;height:100dvh;overflow:hidden;
            display:flex;flex-direction:column;transition:background .3s,color .3s;
        }

        /* AUTH */
        #auth-gate{
            position:fixed;inset:0;background:var(--bg);z-index:20000;
            display:none;align-items:center;justify-content:center;padding:1.5rem;
        }
        .auth-card{
            background:var(--surface);padding:2.5rem;border-radius:3px;
            border:1px solid var(--border);width:100%;max-width:360px;
        }
        .auth-logo{font-family:'Literata',serif;font-size:1.4rem;font-weight:300;
            letter-spacing:-.02em;margin-bottom:2rem;text-align:center;}
        .auth-logo span{color:var(--accent);font-style:italic;}

        /* TOP BAR */
        .top-bar{
            height:52px;min-height:52px;display:flex;align-items:center;
            padding:0 1.5rem;border-bottom:1px solid var(--border);
            gap:1rem;flex-shrink:0;background:var(--bg);z-index:200;
        }
        .site-title{
            font-family:'Literata',serif;font-size:1.1rem;font-weight:400;
            letter-spacing:-.02em;color:var(--text);
            display:flex;align-items:center;gap:.5rem;flex:1;cursor:pointer;background:none;
        }
        .site-title span{color:var(--accent);font-style:italic;}
        .icon-btn{
            background:none;border:1px solid var(--border);color:var(--muted);
            cursor:pointer;display:flex;align-items:center;justify-content:center;
            width:32px;height:32px;border-radius:2px;
            transition:border-color .2s,color .2s;flex-shrink:0;
        }
        .icon-btn:hover{border-color:var(--accent);color:var(--accent);}
        .icon-btn svg{width:16px;height:16px;}
        .icon-btn.danger:hover{border-color:var(--error);color:var(--error);}
        .theme-toggle{
            background:var(--accent-light);border:1px solid var(--accent);color:var(--accent);
            font-size:.6rem;font-family:'JetBrains Mono',monospace;
            cursor:pointer;padding:.3rem .6rem;border-radius:2px;
            transition:opacity .2s;letter-spacing:.06em;text-transform:uppercase;
            white-space:nowrap;flex-shrink:0;
        }

        /* LAYOUT */
        .app-body{flex:1;display:flex;overflow:hidden;position:relative;}

        /* SIDEBAR */
        #sidebar{
            width:var(--sidebar-w);min-width:0;
            background:var(--surface);border-right:1px solid var(--border);
            display:flex;flex-direction:column;flex-shrink:0;
            position:relative;overflow:hidden;
        }
        @media(min-width:1025px){
            .sidebar-closed #sidebar{width:0!important;border-right-width:0;}
        }
        @media(max-width:1024px){
            #sidebar{
                position:absolute;top:0;bottom:0;left:0;z-index:500;
                width:280px!important;
                transform:translateX(-280px);
                transition:transform .3s cubic-bezier(.4,0,.2,1);
            }
            #sidebar.open{transform:translateX(0);}
            #sidebar-overlay{
                position:absolute;inset:0;background:rgba(0,0,0,.45);
                z-index:499;backdrop-filter:blur(2px);
                opacity:0;pointer-events:none;
                transition:opacity .3s;
            }
            #sidebar-overlay.visible{opacity:1;pointer-events:auto;}
        }

        #sidebar-resizer{
            position:absolute;top:0;right:-5px;width:10px;height:100%;
            cursor:col-resize;z-index:50;
        }
        #sidebar-resizer::after{
            content:'';position:absolute;top:50%;left:4px;transform:translateY(-50%);
            width:2px;height:48px;background:var(--border);border-radius:2px;
        }

        .sidebar-section{padding:1.2rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0;}
        .sidebar-label{
            font-family:'JetBrains Mono',monospace;font-size:.58rem;
            letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
            margin-bottom:.6rem;display:block;
        }
        .year-input{
            width:100%;background:var(--bg);border:1px solid var(--border);
            color:var(--accent);font-family:'JetBrains Mono',monospace;
            font-size:1rem;font-weight:500;border-radius:2px;
            padding:.5rem .8rem;text-align:center;
        }
        .primary-btn{
            width:100%;padding:.6rem 1rem;border-radius:2px;background:var(--accent);
            color:#fff;font-family:'JetBrains Mono',monospace;font-size:.6rem;
            font-weight:500;letter-spacing:.08em;text-transform:uppercase;
            cursor:pointer;text-align:center;
        }
        .secondary-btn{
            width:100%;padding:.6rem 1rem;border-radius:2px;background:none;
            color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:.6rem;
            font-weight:500;letter-spacing:.08em;text-transform:uppercase;
            cursor:pointer;border:1px solid var(--border);text-align:center;
        }

        /* BACKLOG */
        #backlog-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
        #backlog{
            flex:1;overflow-y:auto;padding:.6rem 1rem 1.5rem;
            transition:background .15s;min-height:80px;
        }
        #backlog.drag-over{background:var(--accent-light);}
        .backlog-hint{
            font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--muted);
            text-transform:uppercase;letter-spacing:.06em;text-align:center;
            padding:.75rem;border:1px dashed var(--border);border-radius:2px;
        }
        .backlog-proj{
            padding:6px 8px;border-radius:2px;font-family:'JetBrains Mono',monospace;
            font-size:.6rem;margin-bottom:4px;cursor:pointer;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            display:flex;align-items:center;gap:5px;user-select:none;
            background: var(--bg); border: 1px solid var(--border);
        }

        /* MAIN */
        #main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;}

        #filter-panel{border-bottom:1px solid var(--border);flex-shrink:0;}
        .filter-row{
            display:flex;align-items:center;gap:.5rem;
            padding:.35rem 1.5rem;overflow-x:auto;scrollbar-width:none;
        }
        .filter-row:first-child{border-bottom:1px solid var(--border);}
        .filter-row-label{
            font-family:'JetBrains Mono',monospace;font-size:.5rem;
            letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
            white-space:nowrap;flex-shrink:0;margin-right:.2rem;
        }
        .cat-chip, .kind-chip{
            font-family:'JetBrains Mono',monospace;font-size:.58rem;
            letter-spacing:0.06em;text-transform:uppercase;
            border:1px solid var(--border);color:var(--muted);
            padding:.22rem .6rem;border-radius:2px;cursor:pointer;background:none;
            display:flex;align-items:center;gap:5px;flex-shrink:0;
        }
        .cat-chip.active, .kind-chip.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

        /* VIEW */
        #view{flex:1;overflow-y:auto;padding:1.5rem;-webkit-overflow-scrolling:touch;}
        .calendar-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;}
        @media(max-width:1100px){.calendar-grid{grid-template-columns:repeat(6,1fr);}}
        @media(max-width:700px) {.calendar-grid{grid-template-columns:repeat(3,1fr);}}
        
        .month-cell{
            background:var(--surface);border-radius:3px;padding:24px 6px 6px;
            border:1px solid var(--border);position:relative;min-height:100px;
            cursor:pointer;
        }
        .month-cell.drag-over{border-color:var(--accent);background:var(--accent-light);}
        .month-cell::before{
            content:attr(data-label);position:absolute;top:7px;left:7px;
            font-family:'JetBrains Mono',monospace;font-size:.55rem;
            font-weight:500;color:var(--muted);text-transform:uppercase;
        }

        .proj{
            padding:4px 6px;border-radius:2px;font-family:'JetBrains Mono',monospace;
            font-size:.58rem;margin-bottom:3px;cursor:pointer;
            white-space:normal;word-break:break-word;line-height:1.3;
            display:flex;align-items:flex-start;gap:4px;user-select:none;
        }
        .proj.done{opacity:.4;text-decoration:line-through;}

        /* MODAL */
        .modal{
            position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;
            display:none;align-items:center;justify-content:center;
            backdrop-filter:blur(4px);padding:1.5rem;
        }
        .modal-card{
            background:var(--bg);border:1px solid var(--border);border-radius:3px;
            padding:2rem;width:100%;max-width:400px;max-height:90dvh;overflow-y:auto;
        }
        .inp{
            width:100%;padding:.6rem .8rem;margin-bottom:.75rem;border-radius:2px;
            background:var(--surface);color:var(--text);border:1px solid var(--border);
            font-family:'JetBrains Mono',monospace;font-size:.75rem;
        }
        .drag-ghost{
            position:fixed;pointer-events:none;z-index:99999;opacity:.9;
            border-radius:3px;padding:6px 10px;font-family:'JetBrains Mono',monospace;
            font-size:.65rem;white-space:nowrap;transform:translate(-50%,-50%);
            box-shadow:0 8px 24px rgba(0,0,0,.3);
        }
    </style>
</head>
<body class="sidebar-closed">

<div id="auth-gate">
    <div class="auth-card">
        <div class="auth-logo">Scanner<span>Planner</span></div>
        <input type="email" id="email" class="inp" placeholder="email@example.com">
        <input type="password" id="pass" class="inp" placeholder="••••••••">
        <button onclick="login()" class="primary-btn">Увійти</button>
        <p id="auth-err" style="color:var(--error); font-size:0.7rem; margin-top:10px; text-align:center"></p>
    </div>
</div>

<header class="top-bar">
    <button class="icon-btn" id="menu-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <button class="site-title" onclick="window.location.reload()">
        <svg width="20" height="20" viewBox="0 0 32 32"><circle cx="16" cy="15" r="4" fill="var(--accent)"/></svg>
        Scanner<span>Planner</span>
    </button>
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">☾ тема</button>
    <button class="icon-btn danger" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
</header>

<div class="app-body">
    <aside id="sidebar">
        <div id="sidebar-resizer"></div>
        <div class="sidebar-section">
            <span class="sidebar-label">Рік початку</span>
            <input type="number" id="start-year" class="year-input" value="2026" onchange="render()">
        </div>
        <div class="sidebar-section" style="display:flex;flex-direction:column;gap:.5rem;">
            <button id="btn-new-proj" class="primary-btn" onclick="openModal('proj')">+ Новий елемент</button>
            <button id="btn-new-cat"  class="secondary-btn" onclick="openModal('cat')">+ Категорія</button>
        </div>
        <div id="backlog-wrap">
            <div id="backlog-header" class="sidebar-section"><span class="sidebar-label">Беклог</span></div>
            <div id="backlog"><div class="backlog-hint" id="backlog-hint">↓ перетягни сюди</div></div>
        </div>
    </aside>
    <div id="sidebar-overlay"></div>
    <div id="main-area">
        <div id="filter-panel">
            <div class="filter-row" id="row-cats"><span class="filter-row-label">Категорія</span></div>
            <div id="row-kinds" class="filter-row"><span class="filter-row-label">Тип</span></div>
        </div>
        <div id="view"></div>
    </div>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-card" id="m-body"></div>
</div>

<script>
const S_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(S_URL,S_KEY);

let projects=[], categories=[];
let activeFilters=new Set(), activeKinds=new Set();
const KINDS=[{id:'project',icon:'🎯',label:'Проєкт'},{id:'interest',icon:'✦',label:'Інтерес'},{id:'zone',icon:'◎',label:'Зона'}];
const MONTHS=["Січ","Лют","Бер","Квіт","Трав","Черв","Лип","Серп","Вер","Жовт","Лист","Груд"];

function contrast(hex){
    const c=(hex||'#4a8a42').replace('#','');
    const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
    return(.2126*(r/255)+.7152*(g/255)+.0722*(b/255))>.45?'#1a1917':'#ffffff';
}

/* AUTH & THEME */
function initTheme(){
    const t=localStorage.getItem('theme')||'light';
    document.documentElement.setAttribute('data-theme',t);
}
function toggleTheme(){
    const n=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',n);
    localStorage.setItem('theme',n);
}
async function login(){
    const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
    if(error)document.getElementById('auth-err').textContent=error.message;
}
async function logout(){await sb.auth.signOut();window.location.reload();}

sb.auth.onAuthStateChange((ev,sess)=>{
    document.getElementById('auth-gate').style.display=sess?'none':'flex';
    if(sess)sync();
    initTheme();
});

/* SIDEBAR */
const sidebarEl=document.getElementById('sidebar'), overlayEl=document.getElementById('sidebar-overlay');
function toggleSidebar(){
    if(window.innerWidth<=1024){
        sidebarEl.classList.toggle('open');
        overlayEl.classList.toggle('visible');
    }else document.body.classList.toggle('sidebar-closed');
}
document.getElementById('menu-btn').onclick=e=>{e.stopPropagation();toggleSidebar();};
overlayEl.onclick=()=>toggleSidebar();

/* SYNC & RENDER */
async function sync(){
    const{data:p}=await sb.from('projects').select('*');
    const{data:c}=await sb.from('categories').select('*');
    projects=p||[]; categories=c||[];
    renderFilters();
    render();
}

function renderFilters(){
    const rCats=document.getElementById('row-cats');
    rCats.innerHTML='<span class="filter-row-label">Категорія</span>';
    categories.forEach(c=>{
        const btn=document.createElement('button');
        btn.className=`cat-chip ${activeFilters.has(c.id)?'active':''}`;
        btn.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c.color}"></span>${c.name}`;
        btn.onclick=()=>{ activeFilters.has(c.id)?activeFilters.delete(c.id):activeFilters.add(c.id); render(); renderFilters(); };
        rCats.appendChild(btn);
    });
}

function render(){
    const view=document.getElementById('view'), startY=parseInt(document.getElementById('start-year').value);
    view.innerHTML='';
    const grid=document.createElement('div'); grid.className='calendar-grid';
    
    for(let i=0; i<12; i++){
        const mCode=`${startY}-${String(i+1).padStart(2,'0')}`;
        const cell=document.createElement('div');
        cell.className='month-cell'; cell.dataset.code=mCode; cell.dataset.label=MONTHS[i];
        
        // Desktop Drag
        cell.ondragover=e=>e.preventDefault();
        cell.ondrop=async e=>{
            const pid=e.dataTransfer.getData('pid');
            await sb.from('projects').update({date:mCode}).eq('id',pid); sync();
        };

        projects.filter(p=>p.date===mCode).forEach(p=>{
            if(activeFilters.size && !activeFilters.has(p.category_id)) return;
            cell.appendChild(createProjEl(p));
        });
        grid.appendChild(cell);
    }
    view.appendChild(grid);
    renderBacklog();
}

function renderBacklog(){
    const bl=document.getElementById('backlog');
    bl.querySelectorAll('.backlog-proj').forEach(n=>n.remove());
    projects.filter(p=>!p.date).forEach(p=>{
        const el=createProjEl(p, true);
        bl.appendChild(el);
    });
}

function createProjEl(p, isBacklog=false){
    const cat=categories.find(c=>c.id===p.category_id);
    const el=document.createElement('div');
    el.className=`proj ${p.done?'done':''} ${isBacklog?'backlog-proj':''}`;
    el.style.background=cat?cat.color:'var(--border)';
    el.style.color=contrast(cat?cat.color:'#ccc');
    el.textContent=p.title;
    el.onclick=()=>openModal('proj', p);
    makeDraggable(el, p.id, cat?cat.color:'#ccc', contrast(cat?cat.color:'#ccc'), p.title);
    return el;
}

/* TOUCH DRAG LOGIC */
let td={active:false,dragging:false,id:null,ghost:null,dropTarget:null,startX:0,startY:0,bg:'',fg:'',label:''};

function makeDraggable(el,projId,bg,fg,label){
    el.draggable=true;
    el.ondragstart=e=>e.dataTransfer.setData('pid',projId);

    el.addEventListener('touchstart',e=>{
        if(td.ghost)td.ghost.remove();
        const t=e.touches[0];
        td={active:true,dragging:false,id:projId,ghost:null,dropTarget:null,startX:t.clientX,startY:t.clientY,bg,fg,label};
    },{passive:false});

    el.addEventListener('touchmove',e=>{
        if(!td.active)return;
        const t=e.touches[0], dx=t.clientX-td.startX, dy=t.clientY-td.startY, dist=Math.sqrt(dx*dx+dy*dy);
        if(!td.dragging){
            if(dist<12)return;
            if(Math.abs(dy)>Math.abs(dx)*2 && dist<30){td.active=false; return;}
            td.dragging=true; e.preventDefault();
            const g=document.createElement('div'); g.className='drag-ghost';
            g.textContent=td.label; g.style.background=td.bg; g.style.color=td.fg;
            document.body.appendChild(g); td.ghost=g;
            if(navigator.vibrate)navigator.vibrate(25);
        }
        e.preventDefault();
        td.ghost.style.left=t.clientX+'px'; td.ghost.style.top=t.clientY+'px';
        td.ghost.style.visibility='hidden';
        const under=document.elementFromPoint(t.clientX,t.clientY);
        td.ghost.style.visibility='visible';
        const newTgt=under?.closest('.month-cell')||under?.closest('#backlog');
        if(td.dropTarget!==newTgt){
            if(td.dropTarget)td.dropTarget.classList.remove('drag-over');
            if(newTgt)newTgt.classList.add('drag-over');
            td.dropTarget=newTgt;
        }
    },{passive:false});

    el.addEventListener('touchend',async e=>{
        if(!td.active)return;
        if(td.ghost)td.ghost.remove();
        if(td.dropTarget)td.dropTarget.classList.remove('drag-over');
        if(td.dragging && td.dropTarget){
            const code=td.dropTarget.dataset.code||null;
            await sb.from('projects').update({date:code}).eq('id',td.id); sync();
        }
        td.active=false;
    });
}

/* MODALS */
function openModal(type, data=null){
    const m=document.getElementById('modal'), b=document.getElementById('m-body');
    m.style.display='flex';
    if(type==='cat'){
        b.innerHTML=`<h3>${data?'Редагувати':'Нова'} категорія</h3>
        <input id="cat-name" class="inp" value="${data?.name||''}" placeholder="Назва">
        <input type="color" id="cat-col" class="inp" value="${data?.color||'#2d5a27'}">
        <button onclick="saveCat(${data?.id||null})" class="primary-btn">Зберегти</button>`;
    } else {
        b.innerHTML=`<h3>${data?'Редагувати':'Новий'} елемент</h3>
        <input id="p-title" class="inp" value="${data?.title||''}" placeholder="Що плануємо?">
        <select id="p-cat" class="inp">${categories.map(c=>`<option value="${c.id}" ${data?.category_id===c.id?'selected':''}>${c.name}</option>`).join('')}</select>
        <div style="display:flex;gap:10px;margin-bottom:15px">
            <label><input type="checkbox" id="p-done" ${data?.done?'checked':''}> Виконано</label>
        </div>
        <button onclick="saveProj(${data?.id||null})" class="primary-btn">Зберегти</button>
        ${data?`<button onclick="delProj(${data.id})" class="secondary-btn" style="margin-top:10px;color:var(--error)">Видалити</button>`:''}`;
    }
}
function closeModal(){document.getElementById('modal').style.display='none';}

async function saveCat(id){
    const n=document.getElementById('cat-name').value, c=document.getElementById('cat-col').value;
    if(id) await sb.from('categories').update({name:n,color:c}).eq('id',id);
    else await sb.from('categories').insert({name:n,color:c});
    closeModal(); sync();
}
async function saveProj(id){
    const t=document.getElementById('p-title').value, ci=document.getElementById('p-cat').value, d=document.getElementById('p-done').checked;
    const payload={title:t, category_id:ci, done:d};
    if(id) await sb.from('projects').update(payload).eq('id',id);
    else await sb.from('projects').insert(payload);
    closeModal(); sync();
}
async function delProj(id){ if(confirm('Видалити?')){await sb.from('projects').delete().eq('id',id); closeModal(); sync();}}
</script>
</body>
</html>
