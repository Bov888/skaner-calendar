<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #111111; --border: #1a1a1a; --text: #e0e0e0;
            --muted: #666; --accent: #4a9e42; --sidebar: #0d0d0d;
        }
        :root[data-theme="light"] {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; --text: #1d1d1f;
            --muted: #86868b; --accent: #34c759; --sidebar: #fbfbfd;
        }
        :root {
            --cat-learning: #4a9e42; --cat-travel: #e07b39; --cat-sport: #5b8dd9;
            --cat-creative: #c45c8a; --cat-career: #c9a227;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR (Адаптивний) */
        #sidebar { 
            width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 2000; transition: transform 0.3s ease;
        }
        
        /* ТЕЛЕФОНИ: Sidebar стає оверлеєм */
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        }

        /* MAIN UI */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-header { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .menu-btn { display: block; } }

        /* КАТЕГОРІЇ (Горизонтальна прокрутка на мобілці) */
        .nav-categories { 
            display: flex; gap: 12px; overflow-x: auto; padding: 10px 1.5rem; 
            font-size: 0.75rem; border-bottom: 1px solid var(--border); scrollbar-width: none;
        }
        .nav-categories::-webkit-scrollbar { display: none; }
        .cat-item { white-space: nowrap; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* ГРІД КАЛЕНДАРЯ */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 1rem; }
        .year-title { font-family: 'JetBrains Mono'; color: var(--accent); font-weight: bold; margin: 1.5rem 0 0.5rem; }
        
        .year-row { 
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 5px; 
        }
        
        /* Адаптація сітки: на дуже малих екранах 6 місяців в ряд */
        @media (max-width: 600px) {
            .year-row { grid-template-columns: repeat(4, 1fr); gap: 4px; }
        }

        .month-cell { 
            background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1/1; 
            border-radius: 4px; position: relative; min-height: 60px;
        }
        .month-name { font-size: 0.55rem; color: var(--muted); position: absolute; top: 2px; right: 4px; pointer-events: none; }

        /* КАРТКИ */
        .project-card { 
            background: var(--accent); color: white; padding: 4px; border-radius: 3px; 
            font-size: 0.6rem; margin-top: 12px; overflow: hidden; text-overflow: ellipsis;
        }

        /* КНОПКИ */
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--accent); color: white; width: calc(100% - 2rem); margin: 1rem; }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
        .modal-box { background: var(--surface); padding: 1.5rem; border-radius: 12px; width: 100%; max-width: 320px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    </style>
</head>
<body>

<aside id="sidebar">
    <div style="padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-family:'Outfit'">Backlog</span>
        <button class="menu-btn" onclick="toggleMenu()">✕</button>
    </div>
    <button class="btn btn-add" onclick="openModal()">+ Додати ідею</button>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 1rem;"></div>
    <div style="padding: 1rem;">
        <button onclick="sb.auth.signOut().then(()=>location.reload())" style="color:#ff4d4d; background:none; border:none; cursor:pointer;">Вийти</button>
    </div>
</aside>

<main>
    <header class="top-header">
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h2 style="font-family:'Outfit'; margin:0; font-size:1.2rem;">Planner<span>Scanner</span></h2>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🌗</button>
    </header>

    <div class="nav-categories">
        <div class="cat-item" onclick="render('learning')"><span style="color:var(--cat-learning)">●</span> Навчання</div>
        <div class="cat-item" onclick="render('travel')"><span style="color:var(--cat-travel)">●</span> Подорожі</div>
        <div class="cat-item" onclick="render('creative')"><span style="color:var(--cat-creative)">●</span> Творчість</div>
        <div class="cat-item" onclick="render()">✕ Скинути</div>
    </div>

    <div id="calendar-scroll"></div>
</main>

<div id="modal">
    <div class="modal-box">
        <h3>Нова ідея</h3>
        <input type="text" id="mTitle" placeholder="Назва...">
        <select id="mCat">
            <option value="learning">Навчання</option>
            <option value="travel">Подорожі</option>
            <option value="creative">Творчість</option>
        </select>
        <button class="btn btn-add" style="margin: 10px 0 0" onclick="saveProject()">Зберегти</button>
        <button class="btn" style="background:none; color:var(--muted); width:100%" onclick="closeModal()">Закрити</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];

    // Мобільне меню
    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    // Тема
    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
    }

    // Дані
    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render(filter = null) {
        const cont = document.getElementById('calendar-scroll');
        cont.innerHTML = '';
        const months = ['01','02','03','04','05','06','07','08','09','10','11','12'];

        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            cont.innerHTML += `<div class="year-title">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';

            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-name">${months[m-1]}</div>`;
                
                const p = projects.find(x => x.date === dKey);
                if (p && (!filter || p.cat === filter)) {
                    cell.innerHTML += `<div class="project-card" style="background:var(--cat-${p.cat})">${p.title}</div>`;
                }
                row.appendChild(cell);
            }
            cont.appendChild(row);
        }

        // Backlog
        const bLog = document.getElementById('backlog');
        bLog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            bLog.innerHTML += `<div class="project-card" style="background:var(--cat-${p.cat}); margin-bottom:8px; padding:10px;">${p.title}</div>`;
        });
    }

    // Модалка та збереження
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();

        await sb.from('projects').insert([{ title, cat, user_id: user.id }]);
        closeModal(); loadData();
    }

    // Перевірка входу
    sb.auth.getUser().then(({data}) => {
        if(data.user) loadData();
        else window.location.href = "/";
    });
</script>
</body>
</html>
