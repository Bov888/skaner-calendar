<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlanner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#fafaf8; --surface:#f4f3ef; --border:#e2e1db; --text:#1a1917;
            --muted:#6b6963; --accent:#2d5a27; --accent-light:#e8f0e6;
            --error:#8b2010; --sidebar-w:260px;
        }
        [data-theme="dark"] {
            --bg:#141412; --surface:#1e1d1b; --border:#2e2d2a; --text:#e8e6e0;
            --muted:#8a8880; --accent:#6ab05f; --accent-light:#1e2e1c;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { 
            background:var(--bg); color:var(--text); font-family:'Literata',serif; 
            height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column;
        }

        /* HEADER */
        .header { 
            height:56px; display:flex; align-items:center; padding:0 1rem; 
            border-bottom:1px solid var(--border); background:var(--bg); z-index:1000;
        }
        .brand { font-size:1.2rem; font-weight:400; flex:1; cursor:pointer; }
        .brand span { color:var(--accent); font-style:italic; }
        
        /* SIDEBAR & OVERLAY */
        #overlay { 
            position:fixed; inset:0; background:rgba(0,0,0,0.4); 
            display:none; z-index:1100; backdrop-filter:blur(2px);
        }
        #sidebar { 
            position:fixed; left:0; top:0; bottom:0; width:var(--sidebar-w); 
            background:var(--surface); border-right:1px solid var(--border); 
            z-index:1200; transform:translateX(-100%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
            display:flex; flex-direction:column;
        }
        body.menu-open #sidebar { transform:translateX(0); }
        body.menu-open #overlay { display:block; }

        .sb-content { padding:1.5rem; flex:1; overflow-y:auto; }
        .sb-label { font-family:'JetBrains Mono',monospace; font-size:0.6rem; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; display:block; }
        
        /* BUTTONS */
        .btn { 
            width:100%; padding:0.8rem; border-radius:4px; font-family:'JetBrains Mono',monospace; 
            font-size:0.7rem; text-transform:uppercase; cursor:pointer; border:1px solid var(--border);
            background:var(--bg); color:var(--text); transition:0.2s; margin-bottom:0.5rem;
        }
        .btn-primary { background:var(--accent); color:white; border-color:var(--accent); }

        /* FILTERS */
        .filter-bar { 
            display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; 
            border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none;
        }
        .filter-bar::-webkit-scrollbar { display:none; }
        .chip { 
            padding:0.4rem 0.7rem; border-radius:100px; border:1px solid var(--border);
            font-family:'JetBrains Mono',monospace; font-size:0.65rem; white-space:nowrap;
            cursor:pointer; display:flex; align-items:center; gap:6px; background:var(--surface);
        }
        .chip.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }
        .reset-link { color:var(--error); font-family:'JetBrains Mono',monospace; font-size:0.6rem; cursor:pointer; margin-left:auto; padding-left:1rem; }

        /* GRID */
        #view { flex:1; overflow-y:auto; padding:1rem; -webkit-overflow-scrolling:touch; }
        .year-block { margin-bottom:2rem; }
        .year-h { font-size:1.5rem; color:var(--accent); margin-bottom:1rem; border-bottom:1px solid var(--border); padding-bottom:0.5rem; }
        
        .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:8px; }
        @media(max-width:1024px){ .grid { grid-template-columns:repeat(4,1fr); } }
        @media(max-width:600px){ .grid { grid-template-columns:repeat(2,1fr); } }

        .cell { 
            background:var(--surface); border:1px solid var(--border); border-radius:4px;
            min-height:90px; padding:20px 4px 4px; position:relative;
        }
        .cell::before { 
            content:attr(data-m); position:absolute; top:4px; left:6px; 
            font-family:'JetBrains Mono',monospace; font-size:0.55rem; color:var(--muted);
        }
        .cell.drag-over { border-color:var(--accent); background:var(--accent-light); }

        /* ITEMS */
        .p-item { 
            padding:4px 6px; border-radius:2px; font-family:'JetBrains Mono',monospace; 
            font-size:0.6rem; margin-bottom:3px; cursor:pointer; line-height:1.2;
            display:flex; gap:4px; align-items:flex-start;
        }
        .p-item.done { opacity:0.3; text-decoration:line-through; }

        /* DRAG GHOST */
        .ghost { 
            position:fixed; pointer-events:none; z-index:10000; padding:6px 12px;
            border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:0.7rem;
            box-shadow:0 10px 30px rgba(0,0,0,0.2); transform:translate(-50%,-50%);
        }

        /* MODAL */
        .modal { 
            position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:2000; 
            display:none; align-items:center; justify-content:center; padding:1rem;
        }
        .modal-c { background:var(--bg); padding:1.5rem; border-radius:8px; width:100%; max-width:380px; }
        .inp { 
            width:100%; padding:0.8rem; margin-bottom:1rem; background:var(--surface);
            border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; border-radius:4px;
        }

        /* AUTH GATE */
        #auth-gate { position:fixed; inset:0; background:var(--bg); z-index:5000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="auth-gate" style="display:none">
    <div class="modal-c" style="border:1px solid var(--border)">
        <h2 style="margin-bottom:1.5rem; text-align:center">Scanner<span>Planner</span></h2>
        <input type="email" id="email" class="inp" placeholder="Email">
        <input type="password" id="pass" class="inp" placeholder="Password">
        <button onclick="login()" class="btn btn-primary">Увійти</button>
    </div>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<aside id="sidebar">
    <div class="sb-content">
        <span class="sb-label">Налаштування</span>
        <input type="number" id="start-year" class="inp" value="2026" onchange="render()">
        
        <span class="sb-label">Дії</span>
        <button class="btn btn-primary" onclick="openModal('proj', null)">+ Елемент</button>
        <button class="btn" onclick="openModal('cat', null)">+ Категорія</button>

        <div style="margin-top:2rem">
            <span class="sb-label">Беклог</span>
            <div id="backlog" style="min-height:100px; border:1px dashed var(--border); padding:0.5rem; border-radius:4px;"></div>
        </div>
    </div>
    <div style="padding:1rem; border-top:1px solid var(--border)">
        <button class="btn" style="color:var(--error); border-color:var(--error)" onclick="logout()">Вийти</button>
    </div>
</aside>

<header class="header">
    <button onclick="toggleMenu()" style="background:none; margin-right:1rem; cursor:pointer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="brand" onclick="window.location.reload()">Scanner<span>Planner</span></div>
</header>

<div class="filter-bar" id="filters"></div>

<main id="view"></main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-c" id="m-content"></div>
</div>

<script>
const S_URL="https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb=supabase.createClient(S_URL,S_KEY);

let projects=[], categories=[];
let activeCats=new Set(), activeKinds=new Set();
let editingId=null, activeDate=null;

const KINDS=[{id:'project',i:'🎯',l:'Проєкт'},{id:'interest',i:'✦',l:'Інтерес'},{id:'zone',i:'◎',l:'Зона'}];
const mNames=['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

// UI TOGGLES
function toggleMenu() { document.body.classList.toggle('menu-open'); }
function closeModal() { document.getElementById('modal').style.display='none'; }

// AUTH
async function login(){
    const{error}=await sb.auth.signInWithPassword({email:email.value,password:pass.value});
    if(error) alert(error.message);
}
async function logout(){ await sb.auth.signOut(); window.location.reload(); }
sb.auth.onAuthStateChange((ev,sess)=>{
    document.getElementById('auth-gate').style.display=sess?'none':'flex';
    if(sess) sync();
});

// DATA
async function sync(){
    const[p,c]=await Promise.all([sb.from('projects').select('*'),sb.from('categories').select('*')]);
    projects=p.data||[]; categories=c.data||[];
    render();
}

function render(){
    const f=document.getElementById('filters');
    f.innerHTML='';
    
    // Cats in filters
    categories.forEach(c=>{
        const chip=document.createElement('div');
        chip.className='chip'+(activeCats.has(c.name)?' active':'');
        chip.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${c.color}"></span>${c.name}`;
        chip.onclick=()=> { activeCats.has(c.name)?activeCats.delete(c.name):activeCats.add(c.name); render(); };
        chip.oncontextmenu=(e)=>{ e.preventDefault(); openModal('cat',null,c); };
        f.appendChild(chip);
    });

    const reset=document.createElement('div');
    reset.className='reset-link'; reset.textContent='✕ Скинути';
    reset.onclick=()=>{ activeCats.clear(); activeKinds.clear(); render(); };
    f.appendChild(reset);

    // View
    const view=document.getElementById('view'), start=parseInt(document.getElementById('start-year').value)||2026;
    view.innerHTML='';
    let list=projects.filter(p=>(!activeCats.size||activeCats.has(p.cat)));

    for(let y=start; y<start+3; y++){
        const block=document.createElement('div'); block.className='year-block';
        block.innerHTML=`<div class="year-h">${y}</div>`;
        const grid=document.createElement('div'); grid.className='grid';
        
        for(let m=1; m<=12; m++){
            const code=`${y}-${String(m).padStart(2,'0')}`, cell=document.createElement('div');
            cell.className='cell'; cell.dataset.code=code; cell.dataset.m=mNames[m-1];
            cell.onclick=e=>{ if(e.target===cell) openModal('proj',code); };
            
            // Drag support
            cell.ondragover=e=>e.preventDefault();
            cell.ondrop=async e=>{
                const id=e.dataTransfer.getData('id');
                await sb.from('projects').update({date:code}).eq('id',id); sync();
            };

            list.filter(p=>p.date===code).forEach(p=>cell.appendChild(createItem(p)));
            grid.appendChild(cell);
        }
        block.appendChild(grid); view.appendChild(block);
    }

    // Backlog
    const bl=document.getElementById('backlog'); bl.innerHTML='';
    list.filter(p=>!p.date).forEach(p=>bl.appendChild(createItem(p)));
}

function createItem(p){
    const cat=categories.find(c=>c.name===p.cat), bg=cat?.color||'#ccc';
    const el=document.createElement('div');
    el.className='p-item'+(p.done?' done':'');
    el.style.background=bg; el.style.color=getContrast(bg);
    el.innerHTML=`<span>${KINDS.find(k=>k.id===(p.kind||'project'))?.i}</span>${p.title}`;
    el.onclick=e=>{ e.stopPropagation(); openModal('proj',p.date,p); };
    
    // Drag
    el.draggable=true;
    el.ondragstart=e=>e.dataTransfer.setData('id',p.id);
    initTouch(el,p,bg);
    return el;
}

// THE TOUCH DRAG FIX
function initTouch(el, p, bg){
    let touch={active:false, dragging:false, ghost:null, target:null, x:0, y:0};

    el.addEventListener('touchstart',e=>{
        const t=e.touches[0];
        touch={active:true, dragging:false, x:t.clientX, y:t.clientY, label:p.title};
    },{passive:true});

    el.addEventListener('touchmove',e=>{
        if(!touch.active) return;
        const t=e.touches[0], dx=t.clientX-touch.x, dy=t.clientY-touch.y;
        
        if(!touch.dragging && Math.sqrt(dx*dx+dy*dy)>10){
            touch.dragging=true;
            touch.ghost=document.createElement('div');
            touch.ghost.className='ghost'; touch.ghost.textContent=touch.label;
            touch.ghost.style.background=bg; touch.ghost.style.color=getContrast(bg);
            document.body.appendChild(touch.ghost);
            if(navigator.vibrate) navigator.vibrate(20);
        }

        if(touch.dragging){
            e.preventDefault();
            touch.ghost.style.left=t.clientX+'px'; touch.ghost.style.top=t.clientY+'px';
            
            // Critical: make ghost invisible for point check
            touch.ghost.style.pointerEvents='none'; 
            const under=document.elementFromPoint(t.clientX, t.clientY);
            const cell=under?.closest('.cell') || under?.closest('#backlog');
            
            if(touch.target) touch.target.classList.remove('drag-over');
            touch.target=cell;
            if(touch.target) touch.target.classList.add('drag-over');
        }
    },{passive:false});

    el.addEventListener('touchend',async ()=>{
        if(touch.ghost) touch.ghost.remove();
        if(touch.target){
            touch.target.classList.remove('drag-over');
            const date=touch.target.dataset.code || null;
            await sb.from('projects').update({date:date}).eq('id',p.id); sync();
        }
        touch.active=false;
    });
}

function getContrast(hex){
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (r*0.299+g*0.587+b*0.114)>160?'#000':'#fff';
}

// MODALS
function openModal(type,date,item=null){
    activeDate=date; editingId=item?.id||null;
    const m=document.getElementById('modal'), c=document.getElementById('m-content');
    m.style.display='flex';
    document.body.classList.remove('menu-open');

    if(type==='proj'){
        c.innerHTML=`<h3>${item?'Змінити':'Новий'} елемент</h3><br>
        <input id="f-t" class="inp" value="${item?.title||''}" placeholder="Назва">
        <select id="f-c" class="inp">${categories.map(cat=>`<option ${item?.cat===cat.name?'selected':''}>${cat.name}</option>`).join('')}</select>
        <select id="f-k" class="inp">${KINDS.map(k=>`<option value="${k.id}" ${item?.kind===k.id?'selected':''}>${k.i} ${k.l}</option>`).join('')}</select>
        <label style="font-size:0.7rem"><input type="checkbox" id="f-d" ${item?.done?'checked':''}> ВИКОНАНО</label><br><br>
        <button class="btn btn-primary" onclick="saveProj()">Зберегти</button>
        ${item?`<button class="btn" style="color:var(--error)" onclick="del('projects','${item.id}')">Видалити</button>`:''}`;
    } else {
        c.innerHTML=`<h3>Категорія</h3><br>
        <input id="f-n" class="inp" value="${item?.name||''}" placeholder="Назва">
        <input type="color" id="f-co" class="inp" value="${item?.color||'#2d5a27'}">
        <button class="btn btn-primary" onclick="saveCat()">Зберегти</button>
        ${item?`<button class="btn" style="color:var(--error)" onclick="del('categories','${item.id}')">Видалити</button>`:''}`;
    }
}

async function saveProj(){
    const u=(await sb.auth.getUser()).data.user;
    const d={title:document.getElementById('f-t').value, cat:document.getElementById('f-c').value, kind:document.getElementById('f-k').value, date:activeDate, done:document.getElementById('f-d').checked, user_id:u.id};
    if(editingId) await sb.from('projects').update(d).eq('id',editingId);
    else await sb.from('projects').insert([d]);
    closeModal(); sync();
}
async function saveCat(){
    const u=(await sb.auth.getUser()).data.user;
    const d={name:document.getElementById('f-n').value, color:document.getElementById('f-co').value, user_id:u.id};
    if(editingId) await sb.from('categories').update(d).eq('id',editingId);
    else await sb.from('categories').insert([d]);
    closeModal(); sync();
}
async function del(t,id){ if(confirm('Видалити?')){ await sb.from(t).delete().eq('id',id); closeModal(); sync(); } }
</script>
</body>
</html>
