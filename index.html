<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - High Contrast</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Outfit:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #f0f0f0;
            --muted: #8a8a8a; --accent: #4a9e42; --sidebar: #0d0d0d;
        }
        :root[data-theme="light"] {
            --bg: #fdfdfd; --surface: #ffffff; --border: #e5e5e5; --text: #171717;
            --muted: #707070; --accent: #34c759; --sidebar: #f8f8f8;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* HEADER & BUTTONS */
        .top-header { 
            padding: 10px 1rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: var(--bg); 
            min-height: 65px;
        }

        .btn-icon {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text); /* Автоматично підлаштовується під тему */
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        
        /* Виділяємо кнопку виходу кольором, але залишаємо її контрастною */
        .btn-exit {
            border-color: rgba(255, 82, 82, 0.4);
            color: #ff5252;
            font-weight: 800;
            padding: 0 16px;
            width: auto;
            gap: 10px;
        }
        
        .btn-icon svg, .btn-exit svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor; /* Це важливо для видимості на чорному */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .btn-icon:hover { background: var(--border); border-color: var(--muted); }
        .btn-icon:active { transform: scale(0.95); opacity: 0.8; }

        /* SIDEBAR & CALENDAR (Решта стилів без змін) */
        #sidebar { width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: margin-left 0.3s ease; z-index: 2000; }
        body.sidebar-hidden #sidebar { margin-left: -280px; }
        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; margin-left: -280px; }
            body.sidebar-open #sidebar { margin-left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        }
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 1rem 1rem 120px; }
        .year-header { color: var(--accent); font-size: 1.6rem; margin: 25px 0 15px; font-weight: 800; font-family: 'Outfit'; }
        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; }
        @media (max-width: 1100px) { .year-row { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 600px) { .year-row { grid-template-columns: repeat(3, 1fr); } }
        .month-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; position: relative; padding: 32px 8px 10px; min-height: 90px; cursor: cell; }
        .month-label { font-size: 0.65rem; color: var(--muted); position: absolute; top: 10px; left: 12px; font-weight: 800; text-transform: uppercase; }
        .card { color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 6px; cursor: pointer; font-weight: 700; border-left: 3px solid rgba(255,255,255,0.3); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 2rem; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid var(--border); }
    </style>
</head>
<body class="sidebar-show">

<header class="top-header">
    <div style="display:flex; align-items:center; gap:12px;">
        <button class="btn-icon" onclick="toggleMenu()">
            <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1 style="font-family:'Outfit'; font-size:1.2rem; margin:0; letter-spacing:-0.5px;">Scanner<span style="color:var(--accent)">Planner</span></h1>
    </div>
    
    <div style="display:flex; align-items:center; gap:10px;">
        <button class="btn-icon" onclick="toggleTheme()">
            <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="btn-icon btn-exit" onclick="logout()">
            <span style="font-size: 0.85rem;">Вихід</span>
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
    </div>
</header>

<script>
    // Весь JS код залишається таким самим, як у попередній версії.
    // Тільки переконайся, що функція logout() викликає sb.auth.signOut().
    
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [];
    let categories = JSON.parse(localStorage.getItem('sc-cats')) || ['Навчання', 'Подорожі', 'Кар\'єра'];
    let catColors = JSON.parse(localStorage.getItem('sc-colors')) || {'Навчання': '#4a9e42', 'Подорожі': '#e07b39', 'Кар\'єра': '#c9a227'};
    let editingId = null;
    let selectedDate = null;

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        let res = (type === 'signup') ? await sb.auth.signUp({email, password}) : await sb.auth.signInWithPassword({email, password});
        if (res.error) alert(res.error.message);
    }
    function logout() { sb.auth.signOut(); window.location.reload(); }

    function toggleMenu() {
        if (window.innerWidth <= 768) document.body.classList.toggle('sidebar-open');
        else document.body.classList.toggle('sidebar-hidden');
    }

    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render() {
        const blog = document.getElementById('backlog');
        const cont = document.getElementById('calendar-scroll');
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        
        cont.innerHTML = '';
        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            cont.innerHTML += `<div class="year-header">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';
            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                cell.onclick = (e) => { if(e.target === cell) openModal(null, dKey); };
                projects.filter(p => p.date === dKey).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.backgroundColor = catColors[p.cat];
                    card.innerText = p.title;
                    card.onclick = (e) => { e.stopPropagation(); openModal(p); };
                    cell.appendChild(card);
                });
                row.appendChild(cell);
            }
            cont.appendChild(row);
        }
        
        blog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.backgroundColor = catColors[p.cat];
            card.innerText = p.title;
            card.onclick = () => openModal(p);
            blog.appendChild(card);
        });
    }

    function openModal(p, date) {
        editingId = p ? p.id : null;
        selectedDate = p ? p.date : date;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function saveProject() {
        const title = document.getElementById('mTitle').value;
        const { data: { user } } = await sb.auth.getUser();
        if(editingId) await sb.from('projects').update({title, date: selectedDate}).eq('id', editingId);
        else await sb.from('projects').insert([{title, cat: categories[0], date: selectedDate, user_id: user.id}]);
        closeModal(); loadData();
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
    }

    sb.auth.onAuthStateChange((ev, session) => {
        if (session) loadData();
    });
</script>
</body>
</html>
