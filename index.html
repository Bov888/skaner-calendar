<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner - Strategic View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfdfc; }
        .month-card { min-height: 100px; transition: all 0.2s ease; }
        /* Плавне розгортання року */
        .year-content { transition: max-height 0.4s ease-out, opacity 0.3s ease; overflow: hidden; }
        .year-content.collapsed { max-height: 0; opacity: 0; pointer-events: none; }
        .year-content.expanded { max-height: 1000px; opacity: 1; }
        /* Стиль скролбару Windows 11 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 bg-white border-r border-gray-100 flex flex-col shadow-sm z-10">
        <div class="p-5 flex justify-between items-center">
            <h2 class="text-[11px] font-black uppercase tracking-[0.2em] text-gray-400">Меню</h2>
            <button class="w-8 h-8 flex items-center justify-center bg-gray-50 rounded-lg text-gray-400 hover:bg-gray-100 transition-colors">✕</button>
        </div>

        <div class="px-5 space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-2">Рік початку планування</label>
                <div class="w-full py-3 bg-white border border-gray-200 rounded-xl text-center text-emerald-600 font-bold text-lg shadow-sm">
                    2026
                </div>
            </div>

            <button class="w-full py-4 bg-[#0fa470] hover:bg-[#0d8c60] text-white font-bold rounded-2xl shadow-lg shadow-emerald-100 transition-all uppercase text-xs tracking-wider flex items-center justify-center gap-2">
                <span class="text-xl">+</span> Новий проєкт
            </button>

            <div class="w-full h-12 border border-gray-200 rounded-xl bg-gray-50/50"></div>

            <div class="h-px bg-gray-100"></div>

            <div>
                <h3 class="text-[10px] font-bold uppercase text-gray-400 mb-3 tracking-widest">Беклог</h3>
                <div class="space-y-2">
                    <div class="p-3 bg-gray-50 rounded-xl border border-dashed border-gray-200 text-[11px] text-center text-gray-400">
                        Немає проєктів у черзі
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-[#f9fafb]">
        
        <header class="h-16 bg-white border-b border-gray-100 flex items-center px-8 gap-4 overflow-x-auto no-scrollbar">
            <div class="flex items-center gap-2 px-3 py-1.5 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold border border-blue-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full"></span> ТЕХНОЛОГІЇ
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 rounded-full text-[10px] font-bold border border-red-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full"></span> РОБОТА
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-orange-50 text-orange-600 rounded-full text-[10px] font-bold border border-orange-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-orange-500 rounded-full"></span> МАРИНЦЯ
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-cyan-50 text-cyan-600 rounded-full text-[10px] font-bold border border-cyan-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full"></span> ДОЛИНА
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-yellow-50 text-yellow-600 rounded-full text-[10px] font-bold border border-yellow-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-yellow-400 rounded-full"></span> ДОДАТКОВИЙ ДОХІД
            </div>
            <div class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-bold border border-emerald-100 whitespace-nowrap">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span> ДІМ
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-6">

            <section class="year-wrapper">
                <div class="flex items-center gap-3 mb-4 cursor-pointer" onclick="toggleYear('2026')">
                    <h2 class="text-4xl font-black text-[#2d4a22] opacity-80 tracking-tighter">2026</h2>
                    <span id="arrow-2026" class="text-gray-300 transition-transform rotate-90">▶</span>
                </div>
                
                <div id="content-2026" class="year-content expanded grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 xl:grid-cols-12 gap-3">
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">січ</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">лют</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">бер</div>
                    
                    <div class="month-card bg-white rounded-xl border border-emerald-100 p-2 relative flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-300 uppercase">кві</span>
                        <div class="bg-[#a30b2c] text-white text-[9px] font-bold p-2 rounded-lg text-center leading-tight">найти роботу</div>
                    </div>

                    <div class="month-card bg-white rounded-xl border border-emerald-100 p-2 relative flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-300 uppercase">тра</span>
                        <div class="bg-[#10b981] text-white text-[9px] font-bold p-2 rounded-lg text-center leading-tight">Розбір авто</div>
                    </div>

                    <div class="month-card bg-white rounded-xl border border-emerald-100 p-2 relative flex flex-col justify-between">
                        <span class="text-[10px] font-bold text-gray-300 uppercase">чер</span>
                        <div class="bg-[#10b981] text-white text-[9px] font-bold p-2 rounded-lg text-center leading-tight">Навіс</div>
                    </div>

                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">лип</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">сер</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">вер</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">жов</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">лис</div>
                    <div class="month-card bg-white rounded-xl border border-gray-100 p-2 text-[10px] font-bold text-gray-300 uppercase">гру</div>
                </div>
            </section>

            <div class="space-y-2">
                
                <div class="group bg-white hover:bg-emerald-50/20 border border-gray-100 p-3 rounded-2xl flex items-center gap-6 cursor-pointer transition-all" onclick="toggleYear('2027')">
                    <div class="flex items-center gap-3 min-w-[90px]">
                        <span id="arrow-2027" class="text-gray-200 text-xs transition-transform">▶</span>
                        <span class="text-xl font-bold text-gray-700 opacity-60 group-hover:opacity-100 transition-opacity">2027</span>
                    </div>

                    <div class="flex-1 max-w-sm">
                        <div class="flex justify-between text-[8px] uppercase text-gray-300 mb-1 px-1">
                            <span>січ</span><span>гру</span>
                        </div>
                        <div class="grid grid-cols-12 gap-1 h-2">
                            <div class="bg-gray-100 rounded-full"></div>
                            <div class="bg-emerald-200 rounded-full"></div>
                            <div class="bg-emerald-500 rounded-full shadow-[0_0_8px_rgba(16,185,129,0.2)]"></div>
                            <div class="bg-gray-100 rounded-full"></div>
                            <div class="bg-emerald-300 rounded-full"></div>
                            <div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div>
                        </div>
                    </div>

                    <div class="hidden lg:block min-w-[120px] text-right">
                        <div class="text-[9px] text-gray-400 uppercase font-bold mb-1">Наповнення</div>
                        <div class="h-1 bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-400 w-1/3"></div>
                        </div>
                    </div>

                    <div class="min-w-[80px] text-right">
                        <span class="text-[10px] font-black text-emerald-600 py-1 px-2 bg-emerald-50 rounded-md">3 ПРОЄКТИ</span>
                    </div>
                </div>

                <div class="group bg-white hover:bg-emerald-50/20 border border-gray-100 p-3 rounded-2xl flex items-center gap-6 cursor-pointer opacity-50 hover:opacity-100 transition-all" onclick="toggleYear('2028')">
                    <div class="flex items-center gap-3 min-w-[90px]">
                        <span id="arrow-2028" class="text-gray-200 text-xs transition-transform">▶</span>
                        <span class="text-xl font-bold text-gray-700">2028</span>
                    </div>
                    <div class="flex-1 max-w-sm">
                        <div class="grid grid-cols-12 gap-1 h-2">
                            <div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-emerald-400 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div><div class="bg-gray-100 rounded-full"></div>
                        </div>
                    </div>
                    <div class="min-w-[80px] text-right">
                        <span class="text-[10px] font-black text-gray-400 py-1 px-2 bg-gray-50 rounded-md uppercase">1 проєкт</span>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        function toggleYear(yearId) {
            const content = document.getElementById('content-' + yearId);
            const arrow = document.getElementById('arrow-' + yearId);
            
            if (!content) {
                // Якщо це майбутній рік без контенту, просто демонструємо поворот стрілки
                const arrowFuture = document.getElementById('arrow-' + yearId);
                arrowFuture.classList.toggle('rotate-90');
                return;
            }

            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                content.classList.add('expanded');
                arrow.classList.add('rotate-90');
            } else {
                content.classList.remove('expanded');
                content.classList.add('collapsed');
                arrow.classList.remove('rotate-90');
            }
        }
    </script>
</body>
</html>
