<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Final Refined</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root[data-theme="dark"] {
            --bg: #121214; --surface: #1e1e21; --border: #2e2e32; --text: #f4f4f5;
            --muted: #a1a1aa; --accent: #10b981; --accent-hover: #059669; --sidebar: #121214;
        }
        :root[data-theme="light"] {
            --bg: #fafafa; --surface: #ffffff; --border: #e4e4e7; --text: #18181b;
            --muted: #71717a; --accent: #10b981; --accent-hover: #059669; --sidebar: #fafafa;
        }

        * { box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif !important; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; -webkit-font-smoothing: antialiased; }
        
        .app-layout { display: flex; width: 100vw; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { 
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; flex-shrink: 0;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        .sidebar-hidden #sidebar { margin-left: -260px; }

        @media (max-width: 768px) {
            #sidebar { position: fixed; height: 100%; left: 0; transform: translateX(-100%); margin-left: 0; transition: transform 0.3s ease; }
            .sidebar-open #sidebar { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 1500; }
            .sidebar-open .overlay { display: block; }
        }

        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-header { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .header-controls { display: flex; align-items: center; gap: 8px; }

        .btn-icon, .input-year { 
            background: var(--surface); border: 1px solid var(--border); color: var(--text); 
            height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s; 
        }
        .btn-icon { width: 38px; min-width: 38px; padding: 0; }
        .btn-icon:hover { border-color: var(--muted); background: var(--border); }
        .input-year { width: 75px; text-align: center; font-weight: 800; font-size: 0.95rem; }
        .btn-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* CALENDAR */
        #calendar-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 20px; scroll-behavior: smooth; }
        .year-section { margin-bottom: 25px; width: 100%; }
        .year-header { 
            color: var(--accent); font-size: 1.7rem; margin-bottom: 10px; font-weight: 800; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none;
        }
        .year-header span.arrow { font-size: 1rem; color: var(--muted); transition: transform 0.2s; }
        .year-collapsed .arrow { transform: rotate(-90deg); }
        
        .year-row { display: flex; gap: 8px; width: 100%; }
        .month-cell { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            padding: 30px 8px 8px; position: relative; min-height: 110px; flex: 1 1 0; min-width: 0;
            display: flex; flex-direction: column; gap: 6px; transition: 0.2s;
        }
        .month-cell.drag-over { border-color: var(--accent); background: rgba(16, 185, 129, 0.08); }
        .month-label { font-size: 0.7rem; color: var(--muted); position: absolute; top: 10px; left: 10px; font-weight: 800; text-transform: uppercase; pointer-events: none; }

        @media (max-width: 768px) {
            .year-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .month-cell { flex: none; min-height: 100px; }
        }

        .card { 
            color: #fff; padding: 8px; border-radius: 8px; font-size: 0.75rem; cursor: grab; font-weight: 600; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 3px solid rgba(255,255,255,0.4);
            user-select: none; word-wrap: break-word; line-height: 1.2;
        }

        /* CATEGORIES */
        #cat-list { display: flex; gap: 8px; padding: 12px 20px; overflow-x: auto; border-bottom: 1px solid var(--border); flex-shrink: 0; scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 0.8rem; font-weight: 600; padding: 8px 14px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); transition: 0.2s; }
        .cat-item:hover { border-color: var(--accent); }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 28px; border-radius: 24px; width: 90%; max-width: 360px; border: 1px solid var(--border); }
        .modern-input { width: 100%; padding: 14px 16px; margin-bottom: 14px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 0.95rem; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; font-size: 0.95rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body class="sidebar-open">

<div class="app-layout">
    <div class="overlay" onclick="toggleMenu()"></div>

    <aside id="sidebar" ondragover="event.preventDefault()" ondrop="handleDrop(event, null)">
        <div style="padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; font-size: 0.8rem; color: var(--muted); letter-spacing: 1px;">ВХІДНІ</span>
            <button onclick="toggleMenu()" class="btn-icon" style="border:none; background:none;"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div style="padding: 20px;"><button onclick="openModal(null, null)" class="btn-primary">+ ДОДАТИ</button></div>
        <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 20px 20px; display:flex; flex-direction:column; gap:10px;"></div>
    </aside>

    <main>
        <header class="top-header">
            <div class="header-controls">
                <button class="btn-icon" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <h1 style="font-size:1.3rem; margin:0; font-weight:800; letter-spacing: -0.5px;">Scanner<span style="color:var(--accent)">Planner</span></h1>
            </div>
            <div class="header-controls">
                <input type="number" id="yearInput" class="input-year" onchange="updateStartYear(this.value)">
                <button class="btn-icon" onclick="toggleTheme()" id="themeBtn"></button>
                <button class="btn-icon" style="color:#ef4444;" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </header>
        <div id="cat-list"></div>
        <div id="calendar-scroll"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0; font-weight:800; font-size:1.4rem;">Проєкт</h3>
        <input type="text" id="mTitle" class="modern-input" placeholder="Назва">
        <select id="mCat" class="modern-input" style="font-weight:600;"></select>
        <p id="mDateDisplay" style="font-size:0.85rem; color:var(--muted); margin-bottom: 20px;"></p>
        <button onclick="saveProject()" class="btn-primary">Зберегти</button>
        <button id="deleteBtn" onclick="deleteProject()" style="background:none; color:#ef4444; border:none; margin-top:16px; cursor:pointer; width:100%; font-weight:600;">Видалити</button>
    </div>
</div>

<div id="catModal" class="modal" onclick="if(event.target==this)closeCatModal()">
    <div class="modal-box">
        <h3 style="margin-top:0; font-weight:800; font-size:1.4rem;">Категорія</h3>
        <input type="text" id="catTitle" class="modern-input" placeholder="Назва">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
            <span>Колір:</span>
            <input type="color" id="catColor" style="border:2px solid var(--border); width:48px; height:48px; background:none; cursor:pointer; border-radius:12px;">
        </div>
        <button onclick="saveCategory()" class="btn-primary">Оновити</button>
        <button onclick="addCategory()" style="background:none; color:var(--accent); border:none; margin-top:16px; cursor:pointer; width:100%; font-weight:600;">+ Створити нову</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], startYear = parseInt(localStorage.getItem('sc-start-year')) || 2026;
    let categories = JSON.parse(localStorage.getItem('sc-cats-list')) || ['Творчість', 'Технології', 'Бізнес', 'Особисте'];
    let catColors = JSON.parse(localStorage.getItem('sc-cats-colors')) || {'Творчість': '#a855f7', 'Технології': '#3b82f6', 'Бізнес': '#10b981', 'Особисте': '#f97316'};
    let collapsedYears = JSON.parse(localStorage.getItem('sc-collapsed-years')) || [];
    let editingId = null, selectedDate = null, editingCatName = null;

    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function toggleYear(year) {
        if (collapsedYears.includes(year)) {
            collapsedYears = collapsedYears.filter(y => y !== year);
        } else {
            collapsedYears.push(year);
        }
        localStorage.setItem('sc-collapsed-years', JSON.stringify(collapsedYears));
        render();
    }

    function render() {
        document.getElementById('yearInput').value = startYear;
        updateThemeIcon();
        
        const clist = document.getElementById('cat-list'), mcat = document.getElementById('mCat');
        clist.innerHTML = ''; mcat.innerHTML = '';
        categories.forEach(c => {
            clist.innerHTML += `<div class="cat-item" onclick="openCatModal('${c}')"><span style="width:10px;height:10px;border-radius:50%;background:${catColors[c]}"></span>${c}</div>`;
            mcat.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const cont = document.getElementById('calendar-scroll'); cont.innerHTML = '';
        const monthsNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

        for (let y = 0; y < 6; y++) {
            const year = startYear + y;
            const isCollapsed = collapsedYears.includes(year);
            const section = document.createElement('div'); 
            section.className = 'year-section' + (isCollapsed ? ' year-collapsed' : '');
            
            const header = document.createElement('div');
            header.className = 'year-header';
            header.innerHTML = `<span>${year}</span><span class="arrow">▼</span>`;
            header.onclick = () => toggleYear(year);
            section.appendChild(header);

            if (!isCollapsed) {
                const row = document.createElement('div'); row.className = 'year-row';
                for (let m = 1; m <= 12; m++) {
                    const dKey = `${year}-${String(m).padStart(2,'0')}`;
                    const cell = document.createElement('div'); cell.className = 'month-cell';
                    cell.innerHTML = `<div class="month-label">${monthsNames[m-1]}</div>`;
                    cell.onclick = (e) => { if(e.target === cell) openModal(null, dKey); };
                    cell.addEventListener('dragover', (e) => { e.preventDefault(); cell.classList.add('drag-over'); });
                    cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                    cell.addEventListener('drop', (e) => handleDrop(e, dKey));
                    projects.filter(p => p.date === dKey).forEach(p => cell.appendChild(createCard(p)));
                    row.appendChild(cell);
                }
                section.appendChild(row);
            }
            cont.appendChild(section);
        }
        const blog = document.getElementById('backlog'); blog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => blog.appendChild(createCard(p)));
    }

    function createCard(p) {
        const card = document.createElement('div'); card.className = 'card'; card.draggable = true;
        card.style.backgroundColor = catColors[p.cat] || '#888'; card.innerText = p.title;
        card.onclick = (e) => { e.stopPropagation(); openModal(p); };
        card.ondragstart = (e) => { e.dataTransfer.setData('projectId', p.id); };
        return card;
    }

    async function handleDrop(e, date) {
        e.preventDefault(); const id = e.dataTransfer.getData('projectId');
        document.querySelectorAll('.month-cell').forEach(c => c.classList.remove('drag-over'));
        if (id) { await sb.from('projects').update({ date: date }).eq('id', id); loadData(); }
    }

    function updateThemeIcon() {
        const theme = document.documentElement.getAttribute('data-theme');
        const btn = document.getElementById('themeBtn');
        btn.innerHTML = theme === 'dark' 
            ? `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`
            : `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>`;
    }

    function openCatModal(name) {
        editingCatName = name; document.getElementById('catTitle').value = name;
        document.getElementById('catColor').value = catColors[name];
        document.getElementById('catModal').style.display = 'flex';
    }
    function closeCatModal() { document.getElementById('catModal').style.display = 'none'; }

    function saveCategory() {
        const newName = document.getElementById('catTitle').value;
        const newColor = document.getElementById('catColor').value;
        if (!newName) return;
        categories = categories.map(c => c === editingCatName ? newName : c);
        delete catColors[editingCatName]; catColors[newName] = newColor;
        localStorage.setItem('sc-cats-list', JSON.stringify(categories));
        localStorage.setItem('sc-cats-colors', JSON.stringify(catColors));
        closeCatModal(); render();
    }

    function addCategory() {
        const name = "Нова Категорія";
        if (!categories.includes(name)) {
            categories.push(name); catColors[name] = "#10b981";
            localStorage.setItem('sc-cats-list', JSON.stringify(categories));
            localStorage.setItem('sc-cats-colors', JSON.stringify(catColors));
            render(); openCatModal(name);
        }
    }

    function openModal(p, date) {
        editingId = p ? p.id : null; selectedDate = p ? p.date : date;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('mCat').value = p ? p.cat : categories[0];
        document.getElementById('mDateDisplay').innerText = selectedDate || 'В беклозі';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value, cat = document.getElementById('mCat').value;
        if(!title) return;
        const { data: { user } } = await sb.auth.getUser();
        if(editingId) await sb.from('projects').update({title, cat, date: selectedDate}).eq('id', editingId);
        else await sb.from('projects').insert([{title, cat, date: selectedDate, user_id: user.id}]);
        closeModal(); loadData();
    }

    async function deleteProject() { if(confirm("Видалити проєкт?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadData(); } }
    function updateStartYear(val) { startYear = parseInt(val); localStorage.setItem('sc-start-year', startYear); render(); }
    function toggleMenu() { document.body.classList.toggle('sidebar-hidden'); document.body.classList.toggle('sidebar-open'); }
    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next); updateThemeIcon();
    }
    function logout() { sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => { if (session) loadData(); });
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
    if(window.innerWidth <= 768) document.body.className = 'sidebar-hidden';
</script>
</body>
</html>
