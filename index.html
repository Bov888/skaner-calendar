<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Fixed Layout & Drag</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&family=Outfit:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #141414; --border: #262626; --text: #f0f0f0;
            --muted: #888888; --accent: #4a9e42; --sidebar: #0d0d0d;
        }
        :root[data-theme="light"] {
            --bg: #fdfdfd; --surface: #ffffff; --border: #e5e5e5; --text: #171717;
            --muted: #707070; --accent: #34c759; --sidebar: #f8f8f8;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* SIDEBAR */
        #sidebar { width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 2000; }
        body.sidebar-hidden #sidebar { transform: translateX(-280px); margin-right: -280px; }

        @media (max-width: 1024px) {
            #sidebar { position: fixed; height: 100%; transform: translateX(-100%); margin-right: 0; }
            body.sidebar-open #sidebar { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
        }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; width: 100%; background: var(--bg); }
        .top-header { padding: 10px 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .header-controls { display: flex; align-items: center; gap: 8px; }

        .btn-icon, .input-year { background: var(--surface); border: 1px solid var(--border); color: var(--text); height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .btn-icon { width: 40px; min-width: 40px; }
        .input-year { width: 75px; text-align: center; font-weight: 800; font-size: 0.9rem; }
        .btn-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* CALENDAR - ПОВЕРНЕННЯ В ОДИН РЯДОК */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 2rem; width: 100%; box-sizing: border-box; }
        .year-section { width: 100%; margin-bottom: 40px; }
        .year-header { color: var(--accent); font-size: 1.8rem; margin-bottom: 15px; font-weight: 800; font-family: 'Outfit'; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .year-row { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); /* 12 місяців в один рядок */
            gap: 10px; 
            min-width: 1200px; /* Мінімальна ширина для збереження рядка */
        }

        /* Контейнер для скролу рядка, якщо екран малий */
        .row-wrapper { overflow-x: auto; padding-bottom: 15px; scrollbar-width: thin; }

        .month-cell { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px; 
            position: relative; padding: 35px 8px 10px; min-height: 120px; transition: 0.2s;
        }
        .month-cell.drag-over { border-color: var(--accent); background: rgba(74, 158, 66, 0.1); }
        .month-label { font-size: 0.65rem; color: var(--muted); position: absolute; top: 10px; left: 10px; font-weight: 800; text-transform: uppercase; pointer-events: none; }

        .card { 
            color: #fff; padding: 8px; border-radius: 8px; font-size: 0.75rem; margin-bottom: 6px; 
            cursor: grab; font-weight: 700; border-left: 3px solid rgba(255,255,255,0.3);
            user-select: none;
        }
        .card:active { cursor: grabbing; }

        /* CATEGORIES */
        #cat-list { display: flex; gap: 8px; padding: 12px 1rem; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 0.75rem; font-weight: 700; padding: 6px 14px; border-radius: 20px; background: var(--bg); border: 1px solid var(--border); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 2rem; border-radius: 24px; width: 90%; max-width: 360px; border: 1px solid var(--border); }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body class="sidebar-show">

<div class="overlay" onclick="toggleMenu()"></div>

<aside id="sidebar" ondragover="event.preventDefault()" ondrop="handleDrop(event, null)">
    <div style="padding: 1.2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
        <span style="font-weight: 800; font-size: 0.8rem;">BACKLOG</span>
        <button onclick="toggleMenu()" class="btn-icon" style="border:none; background:none;">✕</button>
    </div>
    <div style="padding: 1rem;"><button onclick="openModal(null, null)" class="btn-primary">+ НОВА ІДЕЯ</button></div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 1rem;"></div>
</aside>

<main>
    <header class="top-header">
        <div class="header-controls">
            <button class="btn-icon" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <h1 style="font-family:'Outfit'; font-size:1.1rem; margin:0;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        </div>
        <div class="header-controls">
            <input type="number" id="yearInput" class="input-year" oninput="updateStartYear(this.value)">
            <button class="btn-icon" onclick="toggleTheme()" id="themeBtn"></button>
            <button class="btn-icon" style="color:#ff5252" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></button>
        </div>
    </header>
    <div id="cat-list"></div>
    <div id="calendar-scroll"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 id="modal-title" style="margin-top:0;">Проєкт</h3>
        <input type="text" id="mTitle" placeholder="Що плануємо?" style="width:100%; padding:12px; margin-bottom:12px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:10px; box-sizing:border-box;">
        <select id="mCat" style="width:100%; padding:12px; margin-bottom:12px; background:var(--bg); border:1px solid var(--border); color:var(--text); border-radius:10px;"></select>
        <p id="mDateDisplay" style="font-size:0.75rem; color:var(--muted); margin-bottom:15px;"></p>
        <button onclick="saveProject()" class="btn-primary">ЗБЕРЕГТИ</button>
        <button id="deleteBtn" onclick="deleteProject()" style="background:none; color:#ff5252; border:none; margin-top:15px; cursor:pointer; width:100%; font-weight:800;">Видалити</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], startYear = parseInt(localStorage.getItem('sc-start-year')) || 2026;
    let categories = JSON.parse(localStorage.getItem('sc-cats')) || ['Творчість', 'Технології', 'Бізнес', 'Особисте'];
    let catColors = JSON.parse(localStorage.getItem('sc-colors')) || {'Творчість': '#a855f7', 'Технології': '#3b82f6', 'Бізнес': '#22c55e', 'Особисте': '#f97316'};
    let collapsedYears = JSON.parse(localStorage.getItem('sc-collapsed')) || [];
    let editingId = null, selectedDate = null;

    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        projects = data || [];
        render();
    }

    function render() {
        document.getElementById('yearInput').value = startYear;
        updateThemeIcon();
        const clist = document.getElementById('cat-list'), mcat = document.getElementById('mCat');
        clist.innerHTML = ''; mcat.innerHTML = '';
        categories.forEach(c => {
            clist.innerHTML += `<div class="cat-item"><span style="width:8px;height:8px;border-radius:50%;background:${catColors[c]}"></span>${c}</div>`;
            mcat.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const cont = document.getElementById('calendar-scroll'); cont.innerHTML = '';
        const monthsNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

        for (let y = 0; y < 6; y++) {
            const year = startYear + y;
            const isCollapsed = collapsedYears.includes(year);
            const section = document.createElement('div'); section.className = `year-section ${isCollapsed ? 'collapsed' : ''}`;
            
            const header = document.createElement('div');
            header.className = 'year-header';
            header.innerHTML = `${year} <span style="font-size:0.8rem; opacity:0.3;">${isCollapsed ? '▶' : '▼'}</span>`;
            header.onclick = () => { collapsedYears = isCollapsed ? collapsedYears.filter(v => v !== year) : [...collapsedYears, year]; localStorage.setItem('sc-collapsed', JSON.stringify(collapsedYears)); render(); };
            
            const wrapper = document.createElement('div'); wrapper.className = 'row-wrapper';
            const row = document.createElement('div'); row.className = 'year-row';
            
            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div'); cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-label">${monthsNames[m-1]}</div>`;
                
                // Клік для створення проєкту
                cell.addEventListener('click', (e) => { if(e.target === cell) openModal(null, dKey); });
                
                // Drag & Drop події
                cell.addEventListener('dragover', (e) => { e.preventDefault(); cell.classList.add('drag-over'); });
                cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
                cell.addEventListener('drop', (e) => handleDrop(e, dKey));

                projects.filter(p => p.date === dKey).forEach(p => {
                    const card = createCard(p);
                    cell.appendChild(card);
                });
                row.appendChild(cell);
            }
            wrapper.appendChild(row);
            section.appendChild(header);
            section.appendChild(wrapper);
            cont.appendChild(section);
        }

        const blog = document.getElementById('backlog'); blog.innerHTML = '';
        projects.filter(p => !p.date).forEach(p => blog.appendChild(createCard(p)));
    }

    function createCard(p) {
        const card = document.createElement('div');
        card.className = 'card'; card.draggable = true;
        card.style.backgroundColor = catColors[p.cat] || '#888';
        card.innerText = p.title;
        card.onclick = (e) => { e.stopPropagation(); openModal(p); };
        card.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('projectId', p.id);
            card.style.opacity = '0.4';
        });
        card.addEventListener('dragend', () => card.style.opacity = '1');
        return card;
    }

    async function handleDrop(e, date) {
        e.preventDefault();
        const id = e.dataTransfer.getData('projectId');
        document.querySelectorAll('.month-cell').forEach(c => c.classList.remove('drag-over'));
        if (id) {
            await sb.from('projects').update({ date: date }).eq('id', id);
            loadData();
        }
    }

    function updateStartYear(val) { if (val.length === 4) { startYear = parseInt(val); localStorage.setItem('sc-start-year', startYear); render(); } }

    function updateThemeIcon() {
        const theme = document.documentElement.getAttribute('data-theme');
        document.getElementById('themeBtn').innerHTML = theme === 'dark' 
            ? '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>'
            : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>';
    }

    function toggleTheme() {
        const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('sc-theme', next);
        updateThemeIcon();
    }

    function openModal(p, date) {
        editingId = p ? p.id : null; selectedDate = p ? p.date : date;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('mCat').value = p ? p.cat : categories[0];
        document.getElementById('mDateDisplay').innerText = selectedDate || 'Backlog';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const title = document.getElementById('mTitle').value, cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if(editingId) await sb.from('projects').update({title, cat, date: selectedDate}).eq('id', editingId);
        else await sb.from('projects').insert([{title, cat, date: selectedDate, user_id: user.id}]);
        closeModal(); loadData();
    }

    async function deleteProject() { if(confirm("Видалити?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadData(); } }
    function toggleMenu() { document.body.classList.toggle('sidebar-open'); document.body.classList.toggle('sidebar-hidden'); }
    function logout() { sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => { if (session) loadData(); });
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
