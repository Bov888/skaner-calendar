<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner Final</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0a0a0a; --surface: #111111; --border: #1a1a1a; --text: #e0e0e0;
            --muted: #444444; --accent: #4a9e42; --card: #1a1a1a;
        }
        :root[data-theme="light"] {
            --bg: #f5f5f7; --surface: #ffffff; --border: #e0e0e0; --text: #1d1d1f;
            --muted: #86868b; --accent: #34c759; --card: #f2f2f7;
        }
        :root {
            --cat-learning: #4a9e42; --cat-travel: #e07b39; --cat-sport: #5b8dd9;
            --cat-creative: #c45c8a; --cat-career: #c9a227; --cat-personal: #6b8f71;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; transition: 0.3s; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--surface); padding: 2.5rem; border-radius: 15px; width: 340px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .auth-card h2 { color: var(--accent); font-family: 'Outfit'; margin-bottom: 2rem; font-size: 1.8rem; }
        
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 1rem; }
        
        .btn { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; margin-top: 10px; }
        .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
        .btn-text { background: none; color: var(--muted); margin-top: 15px; font-size: 0.85rem; text-decoration: underline; }

        #main-app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        header { padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; }
        
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 0 3rem 3rem; }
        .year-header { font-family: 'JetBrains Mono'; color: var(--accent); font-weight: bold; margin: 2rem 0 1rem; font-size: 1.2rem; }
        .year-row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; }
        .month-cell { background: var(--surface); border: 1px solid var(--border); aspect-ratio: 1/1; padding: 8px; border-radius: 6px; position: relative; min-height: 90px; }
        .month-name { font-size: 0.65rem; color: var(--muted); position: absolute; top: 6px; right: 8px; text-transform: uppercase; }
        
        .project-card { background: var(--card); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-size: 0.75rem; margin-top: 18px; cursor: pointer; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-card">
        <h2>Scanner Planner</h2>
        <input type="email" id="email" placeholder="Ваш Email">
        <input type="password" id="password" placeholder="Пароль">
        
        <button class="btn btn-primary" id="loginBtn" onclick="handleAuth('login')">Увійти</button>
        <button class="btn btn-text" id="signupBtn" onclick="handleAuth('signup')">Немає акаунту? Реєстрація</button>
        
        <p id="auth-msg" style="font-size: 0.8rem; color: #ff4d4d; margin-top: 15px; min-height: 1.2em; line-height: 1.4;"></p>
    </div>
</div>

<div id="main-app">
    <header>
        <div>
            <h1 style="font-family:'Outfit'; font-size:2.2rem; margin:0;">Календар <span>Сканера</span></h1>
            <div style="font-family:'JetBrains Mono'; font-size:0.75rem; color:var(--muted); letter-spacing: 1px;">SYSTEM ACTIVE • 6 YEARS PLAN</div>
        </div>
        <div style="display:flex; gap:15px;">
            <button onclick="toggleTheme()" style="background:none; border:1px solid var(--border); color:var(--text); cursor:pointer; padding:8px 15px; border-radius:20px;">Тема 🌗</button>
            <button onclick="sb.auth.signOut().then(()=>location.reload())" style="background:none; border:1px solid #ff4d4d; color:#ff4d4d; cursor:pointer; padding:8px 15px; border-radius:20px;">Вийти</button>
        </div>
    </header>
    <div id="calendar-scroll"></div>
</div>

<script>
    // --- 1. ПІДКЛЮЧЕННЯ (Встав свій anon ключ тут) ---
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    const msgEl = document.getElementById('auth-msg');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');

    // --- 2. АВТОРИЗАЦІЯ (Виправлена) ---
    async function handleAuth(type) {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!email || !password) {
            msgEl.innerText = "Будь ласка, заповніть усі поля.";
            return;
        }

        // Блокуємо кнопки під час запиту
        loginBtn.disabled = true;
        signupBtn.disabled = true;
        msgEl.style.color = "var(--muted)";
        msgEl.innerText = type === 'login' ? "Входимо..." : "Створюємо профіль...";

        try {
            const { data, error } = (type === 'login') 
                ? await sb.auth.signInWithPassword({ email, password })
                : await sb.auth.signUp({ email, password });

            if (error) throw error;

            if (type === 'signup' && !data.session) {
                msgEl.style.color = "var(--accent)";
                msgEl.innerText = "Акаунт створено! Перевірте пошту для підтвердження.";
            } else {
                checkUser();
            }
        } catch (err) {
            msgEl.style.color = "#ff4d4d";
            msgEl.innerText = err.message;
        } finally {
            loginBtn.disabled = false;
            signupBtn.disabled = false;
        }
    }

    // Перевірка сесії
    async function checkUser() {
        const { data: { user } } = await sb.auth.getUser();
        if (user) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            loadData();
        }
    }

    // --- 3. ТЕМА ---
    function toggleTheme() {
        const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', theme);
        localStorage.setItem('sc-theme', theme);
    }
    const savedTheme = localStorage.getItem('sc-theme') || 'dark';
    document.body.setAttribute('data-theme', savedTheme);

    // --- 4. ДАНІ ТА КАЛЕНДАР ---
    async function loadData() {
        const { data } = await sb.from('projects').select('*');
        render(data || []);
    }

    function render(projects) {
        const container = document.getElementById('calendar-scroll');
        container.innerHTML = '';
        const months = ['січ','лют','бер','кві','тра','чер','лип','сер','вер','жов','лис','гру'];
        
        for (let y = 0; y < 6; y++) {
            const year = 2026 + y;
            container.innerHTML += `<div class="year-header">${year}</div>`;
            const row = document.createElement('div');
            row.className = 'year-row';
            
            for (let m = 1; m <= 12; m++) {
                const dKey = `${year}-${String(m).padStart(2,'0')}`;
                const cell = document.createElement('div');
                cell.className = 'month-cell';
                cell.innerHTML = `<div class="month-name">${months[m-1]}</div>`;
                
                const proj = projects.find(p => p.date === dKey);
                if(proj) {
                    cell.innerHTML += `<div class="project-card">${proj.title}</div>`;
                }
                row.appendChild(cell);
            }
            container.appendChild(row);
        }
    }

    checkUser();
</script>
</body>
</html>
