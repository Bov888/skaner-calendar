<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scanner Planner FIXED</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--bg:#09090b;--surface:#121214;--border:#222225;--text:#e4e4e7;
--muted:#71717a;--accent:#10b981;--error:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
background:var(--bg);
color:var(--text);
display:flex;
height:100dvh;
overflow:hidden;
}

#auth-gate{
position:fixed;inset:0;
display:none;
align-items:center;
justify-content:center;
background:var(--bg);
z-index:9999;
}

.card{
background:var(--surface);
padding:20px;
border-radius:12px;
border:1px solid var(--border);
width:300px;
display:flex;
flex-direction:column;
gap:10px;
}

input{
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:var(--bg);
color:var(--text);
}

button{
padding:10px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
cursor:pointer;
}

#sidebar{
width:240px;
background:var(--surface);
border-right:1px solid var(--border);
overflow:auto;
}

#view{
flex:1;
overflow:auto;
padding:16px;
}

.month{
border:1px solid var(--border);
padding:8px;
margin-bottom:8px;
cursor:pointer;
}

.proj{
background:var(--accent);
margin:4px 0;
padding:4px;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="auth-gate">
<div class="card">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button id="login-btn">Увійти</button>
<div id="auth-error" style="color:var(--error);font-size:12px;"></div>
</div>
</div>

<div id="sidebar">
<button id="add-btn">+ Проєкт</button>
</div>

<div id="view">Loading...</div>

<script>
const S_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(S_URL, S_KEY);

let state = {
user:null,
projects:[],
loading:false
};

async function init(){
const {data:{session}} = await sb.auth.getSession();

if(!session){
showAuth();
return;
}

state.user = session.user;
await sync();
}

function showAuth(){
document.getElementById('auth-gate').style.display='flex';
}

function hideAuth(){
document.getElementById('auth-gate').style.display='none';
}

document.getElementById('login-btn').onclick = async ()=>{
const email = document.getElementById('email').value;
const password = document.getElementById('pass').value;

const {error} = await sb.auth.signInWithPassword({email,password});

if(error){
document.getElementById('auth-error').innerText = error.message;
return;
}

location.reload();
};

async function sync(){
setLoading(true);

const {data,error} = await sb.from('projects').select('*');

if(error){
alert("Помилка завантаження");
console.error(error);
setLoading(false);
return;
}

state.projects = data || [];
setLoading(false);
render();
}

function setLoading(v){
state.loading = v;
if(v){
document.getElementById('view').innerHTML = "Loading...";
}
}

function render(){
const view = document.getElementById('view');
view.innerHTML = "";

for(let m=1;m<=12;m++){
const div = document.createElement('div');
div.className='month';
div.innerText = "Місяць "+m;

div.onclick = ()=>createProject(m);

state.projects
.filter(p=>p.month===m)
.forEach(p=>{
const el = document.createElement('div');
el.className='proj';
el.innerText = p.title;

el.onclick = (e)=>{
e.stopPropagation();
editProject(p);
};

div.appendChild(el);
});

view.appendChild(div);
}
}

async function createProject(month){
const title = prompt("Назва проєкту");
if(!title) return;

const {error} = await sb.from('projects').insert([{
title,
month,
user_id: state.user.id
}]);

if(error){
alert(error.message);
return;
}

sync();
}

async function editProject(p){
const title = prompt("Редагувати", p.title);
if(!title) return;

const {error} = await sb.from('projects')
.update({title})
.eq('id',p.id);

if(error){
alert(error.message);
return;
}

sync();
}

init();
</script>

</body>
</html>
