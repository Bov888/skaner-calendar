<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Planner | Tech Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch-polyfill@1.5.0/DragDropTouch.min.js"></script>

    <style>
        :root {
            --bg: #fdfdfd;
            --surface: #ffffff;
            --surface-sub: #f8f9fa;
            --border: #e9ecef;
            --border-dark: #dee2e6;
            --text: #1a1d23;
            --text-dim: #6c757d;
            --accent: #000000; /* Мінімалістичний чорний акцент */
            --accent-soft: #f1f3f5;
            --sidebar-w: 280px;
            --radius: 8px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        [data-theme="dark"] {
            --bg: #0b0e11;
            --surface: #15191d;
            --surface-sub: #1c2126;
            --border: #2d3339;
            --border-dark: #3e444b;
            --text: #e6edf3;
            --text-dim: #7d8590;
            --accent: #ffffff;
            --accent-soft: #21262d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            font-size: 14px;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s;
        }

        /* ── SIDEBAR ── */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }
        #sidebar.collapsed { margin-left: calc(var(--sidebar-w) * -1); }

        .sb-header {
            padding: 1.25rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px; }
        .logo span { color: var(--text-dim); font-weight: 400; }

        .btn-add {
            margin: 1.25rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px;
            border-radius: var(--radius);
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font-main);
        }

        #backlog-container {
            flex: 1; overflow-y: auto; padding: 0 1.25rem 1.25rem;
        }
        .section-label {
            font-family: var(--font-mono);
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin: 1rem 0;
            display: flex; justify-content: space-between;
        }

        /* ── MAIN CONTENT ── */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        .top-nav {
            height: 56px;
            padding: 0 1.25rem;
            display: flex; align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            gap: 1rem;
        }

        .icon-btn {
            background: none; border: 1px solid var(--border);
            color: var(--text); width: 32px; height: 32px;
            border-radius: 6px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .icon-btn:hover { background: var(--surface-sub); }

        .filter-bar {
            padding: 0.75rem 1.25rem;
            display: flex; gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
        }
        .pill {
            padding: 6px 12px; border-radius: 20px;
            background: var(--surface-sub); border: 1px solid var(--border);
            font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap;
        }
        .pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

        /* ── CALENDAR GRID ── */
        #viewport {
            flex: 1; overflow-y: auto; padding: 1.5rem;
        }

        .year-section { margin-bottom: 3rem; }
        .year-label {
            font-size: 1.5rem; font-weight: 700; margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 10px;
        }
        .year-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .month-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            min-height: 140px;
            padding: 32px 12px 12px;
            position: relative;
            transition: all 0.2s;
        }
        .month-card.today { border: 2px solid var(--accent); }
        .month-card.drag-over { border-style: dashed; background: var(--accent-soft); }
        
        .month-name {
            position: absolute; top: 10px; left: 12px;
            font-family: var(--font-mono); font-size: 10px;
            font-weight: 500; color: var(--text-dim); text-transform: uppercase;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface-sub);
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            cursor: grab;
            transition: transform 0.1s;
        }
        .card:hover { transform: scale(1.02); background: var(--surface); }
        .card.dragging { opacity: 0.4; }
        .card-cat {
            font-size: 9px; font-family: var(--font-mono);
            color: var(--text-dim); margin-top: 4px; display: block;
        }

        /* ── OVERLAY / MODAL ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .overlay.active { display: flex; }
        .modal {
            background: var(--surface); width: 100%; max-width: 400px;
            padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border);
        }
        .modal input, .modal select {
            width: 100%; padding: 10px; margin: 10px 0;
            border: 1px solid var(--border); border-radius: 6px;
            background: var(--surface-sub); color: var(--text);
        }

        /* Hide Scrollbars */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 10px; }
    </style>
</head>
<body data-theme="light">

    <aside id="sidebar">
        <div class="sb-header">
            <div class="logo">Scanner<span>Planner</span></div>
            <button class="icon-btn" onclick="ui.toggleSidebar()">✕</button>
        </div>
        <button class="btn-add" onclick="ui.openModal()">+ НОВИЙ ПРОЄКТ</button>
        <div id="backlog-container">
            <div class="section-label">Backlog <span id="count-back">0</span></div>
            <div id="backlog-list" style="min-height: 100px;" ondragover="logic.allowDrop(event)" ondrop="logic.handleDrop(event, 'backlog')"></div>
        </div>
        <div style="padding: 1.25rem; border-top: 1px solid var(--border); display: flex; gap: 8px;">
            <button class="icon-btn" onclick="ui.toggleTheme()" style="flex:1">◐ Тема</button>
            <button class="icon-btn" onclick="logic.logout()" style="flex:1">⏻</button>
        </div>
    </aside>

    <main>
        <nav class="top-nav">
            <button class="icon-btn" onclick="ui.toggleSidebar()">☰</button>
            <div style="font-weight: 600;">Time Horizon</div>
            <button class="icon-btn" style="margin-left: auto;" onclick="ui.scrollToToday()">◎</button>
        </nav>

        <div class="filter-bar" id="filter-bar"></div>

        <div id="viewport"></div>
    </main>

    <div id="modal-overlay" class="overlay" onclick="if(event.target===this) ui.closeModal()">
        <div class="modal">
            <h3 id="modal-title">Нова ідея</h3>
            <input type="text" id="m-title" placeholder="Назва проєкту...">
            <select id="m-cat"></select>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 1rem;">
                <button class="btn-add" style="margin:0" onclick="logic.save()">Зберегти</button>
                <button id="m-del" class="btn-add" style="margin:0; background: #e03131; display:none" onclick="logic.remove()">Видалити</button>
                <button onclick="ui.closeModal()" style="background:none; border:none; cursor:pointer; font-size:12px; color:var(--text-dim)">Скасувати</button>
            </div>
        </div>
    </div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let state = {
        projects: [],
        cats: [{n:'Творчість', c:'#7048e8'}, {n:'Технології', c:'#1098ad'}, {n:'Бізнес', c:'#37b24d'}, {n:'Особисте', c:'#f08c00'}],
        filter: null,
        editingId: null
    };

    const ui = {
        init() {
            this.renderCalendar();
            this.updateTheme();
        },
        toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); },
        toggleTheme() {
            const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', t);
        },
        renderCalendar() {
            const vp = document.getElementById('viewport');
            const now = new Date();
            const months = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
            
            for(let y=0; y<2; y++) {
                const year = now.getFullYear() + y;
                const section = document.createElement('div');
                section.className = 'year-section';
                section.id = `y-${year}`;
                section.innerHTML = `<div class="year-label">${year}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                
                months.forEach((m, i) => {
                    const key = `${year}-${String(i+1).padStart(2,'0')}`;
                    const box = document.createElement('div');
                    box.className = `month-card ${key === now.toISOString().slice(0,7) ? 'today' : ''}`;
                    box.dataset.date = key;
                    box.innerHTML = `<div class="month-name">${m}</div>`;
                    box.ondragover = logic.allowDrop;
                    box.ondragleave = e => e.currentTarget.classList.remove('drag-over');
                    box.ondrop = e => logic.handleDrop(e, key);
                    grid.appendChild(box);
                });
                section.appendChild(grid);
                vp.appendChild(section);
            }
        },
        renderData() {
            document.querySelectorAll('.card').forEach(c => c.remove());
            const filtered = state.filter ? state.projects.filter(p => p.cat === state.filter) : state.projects;
            
            filtered.forEach(p => {
                const card = this.createCard(p);
                const target = p.date ? document.querySelector(`[data-date="${p.date}"]`) : document.getElementById('backlog-list');
                if(target) target.appendChild(card);
            });

            document.getElementById('count-back').textContent = state.projects.filter(p => !p.date).length;
            this.renderFilters();
        },
        createCard(p) {
            const el = document.createElement('div');
            el.className = 'card';
            el.draggable = true;
            el.innerHTML = `${p.title} <span class="card-cat">${p.cat || ''}</span>`;
            el.onclick = () => this.openModal(p);
            el.ondragstart = e => { e.dataTransfer.setData('text', p.id); el.classList.add('dragging'); };
            el.ondragend = () => el.classList.remove('dragging');
            return el;
        },
        renderFilters() {
            const bar = document.getElementById('filter-bar');
            bar.innerHTML = `<div class="pill ${!state.filter?'active':''}" onclick="logic.setFilter(null)">Всі</div>`;
            state.cats.forEach(c => {
                bar.innerHTML += `<div class="pill ${state.filter===c.n?'active':''}" onclick="logic.setFilter('${c.n}')">${c.n}</div>`;
            });
        },
        openModal(p = null) {
            state.editingId = p ? p.id : null;
            document.getElementById('m-title').value = p ? p.title : '';
            const sel = document.getElementById('m-cat');
            sel.innerHTML = state.cats.map(c => `<option value="${c.n}" ${p && p.cat===c.n?'selected':''}>${c.n}</option>`).join('');
            document.getElementById('m-del').style.display = p ? 'block' : 'none';
            document.getElementById('modal-overlay').classList.add('active');
        },
        closeModal() { document.getElementById('modal-overlay').classList.remove('active'); },
        scrollToToday() { document.querySelector('.today').scrollIntoView({behavior:'smooth', block:'center'}); },
        updateTheme() {}
    };

    const logic = {
        async sync() {
            const { data } = await sb.from('projects').select('*');
            state.projects = data || [];
            ui.renderData();
        },
        allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); },
        async handleDrop(e, date) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const id = e.dataTransfer.getData('text');
            const newDate = date === 'backlog' ? null : date;
            
            const p = state.projects.find(x => x.id == id);
            if(p) p.date = newDate;
            ui.renderData();
            await sb.from('projects').update({ date: newDate }).eq('id', id);
        },
        async save() {
            const title = document.getElementById('m-title').value;
            const cat = document.getElementById('m-cat').value;
            if(!title) return;
            if(state.editingId) await sb.from('projects').update({title, cat}).eq('id', state.editingId);
            else await sb.from('projects').insert([{title, cat, date: null}]);
            ui.closeModal();
            this.sync();
        },
        async remove() {
            if(confirm('Видалити?')) {
                await sb.from('projects').delete().eq('id', state.editingId);
                ui.closeModal();
                this.sync();
            }
        },
        setFilter(c) { state.filter = c; ui.renderData(); },
        logout() { sb.auth.signOut(); location.reload(); }
    };

    ui.init();
    logic.sync();
</script>
</body>
</html>
