<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - 6Y Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0c0c0e; --surface: #161619; --border: #262629; --text: #f4f4f5;
            --muted: #828288; --accent: #10b981; --error: #ef4444;
        }
        :root[data-theme="light"] {
            --bg: #ffffff; --surface: #f4f4f5; --border: #e4e4e7; --text: #18181b;
            --muted: #71717a; --accent: #10b981; --error: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; border: none; outline: none; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; }

        /* Auth */
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .box { background: var(--surface); padding: 30px; border-radius: 24px; box-shadow: 0 0 0 1px var(--border); width: 90%; max-width: 360px; }

        /* Layout */
        #sidebar { 
            width: 280px; background: var(--bg); flex-shrink: 0; box-shadow: 1px 0 0 0 var(--border);
            display: flex; flex-direction: column; transition: transform 0.3s; z-index: 2000;
        }
        .sidebar-hide #sidebar { transform: translateX(-280px); margin-right: -280px; }
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

        /* Components */
        .bar { height: 64px; display: flex; align-items: center; padding: 0 20px; box-shadow: 0 1px 0 0 var(--border); flex-shrink: 0; gap: 12px; }
        .btn { 
            width: 40px; height: 40px; border-radius: 12px; background: var(--surface); 
            box-shadow: 0 0 0 1px var(--border); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center; 
        }
        .btn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }

        /* Categories Bar */
        .cat-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 0 20px; height: 50px; align-items: center; box-shadow: 0 1px 0 0 var(--border); }
        .chip { 
            padding: 6px 12px; border-radius: 8px; background: var(--surface); font-size: 13px; 
            font-weight: 600; box-shadow: 0 0 0 1px var(--border); white-space: nowrap; cursor: pointer;
        }

        /* Calendar Grid 4x3 */
        #viewport { flex: 1; overflow-y: auto; padding: 20px; }
        .year-block { margin-bottom: 20px; }
        .year-header { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; background: var(--surface); border-radius: 14px; 
            cursor: pointer; box-shadow: 0 0 0 1px var(--border); margin-bottom: 10px;
        }
        .year-header h2 { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        
        .grid-4x3 { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            transition: max-height 0.3s ease-out; overflow: hidden;
        }
        .collapsed .grid-4x3 { display: none; }

        .month { 
            background: var(--surface); border-radius: 12px; padding: 30px 8px 8px;
            box-shadow: 0 0 0 1px var(--border); position: relative; min-height: 100px;
        }
        .month::before { 
            content: attr(data-m); position: absolute; top: 8px; left: 10px; 
            font-size: 10px; font-weight: 900; color: var(--muted);
        }

        .task { 
            padding: 6px; border-radius: 6px; font-size: 10px; font-weight: 700; 
            color: #fff; margin-bottom: 4px; border-left: 3px solid rgba(0,0,0,0.2);
        }

        /* Forms */
        .inp { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: var(--bg); color: var(--text); box-shadow: 0 0 0 1px var(--border); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5000; }
        
        @media (max-width: 600px) {
            .grid-4x3 { grid-template-columns: repeat(3, 1fr); } /* Планшетний/мобільний вигляд 4х3 */
        }
    </style>
</head>
<body class="sidebar-hide">

<div id="auth-gate">
    <div class="box">
        <h2 style="margin-bottom:20px; text-align:center;">ScannerPlanner</h2>
        <input type="email" id="email" class="inp" placeholder="Email">
        <input type="password" id="pass" class="inp" placeholder="Пароль">
        <button onclick="login()" style="width:100%; height:44px; background:var(--accent); border-radius:10px; color:#fff; font-weight:800; cursor:pointer;">УВІЙТИ</button>
        <p id="err" style="color:var(--error); font-size:12px; margin-top:10px; text-align:center;"></p>
    </div>
</div>

<aside id="sidebar">
    <div class="bar" style="justify-content:space-between;">
        <span style="font-weight:900; color:var(--muted); font-size:12px;">BACKLOG</span>
        <button class="btn" onclick="toggleSidebar()" style="box-shadow:none;">✕</button>
    </div>
    <div style="padding:15px;"><button onclick="openModal('proj')" style="width:100%; height:40px; background:var(--accent); border-radius:10px; color:#fff; font-weight:800; cursor:pointer;">+ ПРОЄКТ</button></div>
    <div id="backlog" style="flex:1; overflow-y:auto; padding:0 15px;"></div>
</aside>

<main>
    <header class="bar">
        <button class="btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
        <h1 style="flex:1; font-weight:900; font-size:1.2rem;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        <button class="btn" onclick="toggleTheme()" id="theme-icon">
            <svg viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.02 0l-.707-.707M6.343 6.343l-.707-.707"/></svg>
        </button>
        <button class="btn" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
    </header>
    <div class="cat-scroll" id="cat-nav"></div>
    <div id="viewport"></div>
</main>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="box" id="modal-content"></div>
</div>

<script>
    const URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
    const sb = supabase.createClient(URL, KEY);

    let projs = [], cats = [], yearStart = 2026;

    function toggleSidebar() { document.body.classList.toggle('sidebar-hide'); }
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }

    async function login() {
        const { error } = await sb.auth.signInWithPassword({ email: email.value, password: pass.value });
        if (error) document.getElementById('err').innerText = error.message;
    }
    function logout() { sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, sess) => {
        if (sess) { document.getElementById('auth-gate').style.display='none'; load(); }
    });

    async function load() {
        const [p, c] = await Promise.all([sb.from('projects').select('*'), sb.from('categories').select('*')]);
        projs = p.data || []; cats = c.data || [];
        render();
    }

    function render() {
        const nav = document.getElementById('cat-nav'); nav.innerHTML = '';
        cats.forEach(c => {
            const el = document.createElement('div'); el.className = 'chip';
            el.innerHTML = `<span style="color:${c.color}">●</span> ${c.name}`;
            el.onclick = () => editCat(c);
            nav.appendChild(el);
        });
        nav.innerHTML += `<div class="chip" onclick="editCat()">+ Нова</div>`;

        const view = document.getElementById('viewport'); view.innerHTML = '';
        const mNames = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];

        for(let i=0; i<6; i++) {
            const y = yearStart + i;
            const block = document.createElement('div'); block.className = 'year-block';
            block.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('collapsed')"><h2>${y}</h2><span>▼</span></div>`;
            const grid = document.createElement('div'); grid.className = 'grid-4x3';
            
            for(let m=1; m<=12; m++) {
                const code = `${y}-${String(m).padStart(2,'0')}`;
                const mDiv = document.createElement('div'); mDiv.className = 'month';
                mDiv.setAttribute('data-m', mNames[m-1]);
                mDiv.onclick = (e) => { if(e.target == mDiv) openModal('proj', code); };
                
                projs.filter(p => p.date === code).forEach(p => {
                    const c = cats.find(ct => ct.name === p.cat);
                    mDiv.innerHTML += `<div class="task" style="background:${c?.color || '#555'}">${p.title}</div>`;
                });
                grid.appendChild(mDiv);
            }
            block.appendChild(grid); view.appendChild(block);
        }
    }

    function openModal(type, date) {
        const content = document.getElementById('modal-content');
        document.getElementById('modal').style.display = 'flex';
        if(type === 'proj') {
            content.innerHTML = `<h3>Новий проєкт</h3><input id="pT" class="inp" placeholder="Назва"><select id="pC" class="inp">${cats.map(c=>`<option>${c.name}</option>`).join('')}</select><button onclick="saveProj('${date}')" class="inp" style="background:var(--accent);font-weight:800;color:#fff">Зберегти</button>`;
        }
    }

    async function saveProj(date) {
        const user = (await sb.auth.getUser()).data.user;
        await sb.from('projects').insert([{ title: pT.value, cat: pC.value, date, user_id: user.id }]);
        closeModal(); load();
    }

    function editCat(cat) {
        const content = document.getElementById('modal-content');
        document.getElementById('modal').style.display = 'flex';
        content.innerHTML = `<h3>${cat?'Редагувати':'Нова'} категорія</h3>
            <input id="cN" class="inp" value="${cat?.name||''}" placeholder="Назва">
            <input id="cC" class="inp" type="color" value="${cat?.color||'#10b981'}">
            <button onclick="saveCat(${cat?.id||null})" class="inp" style="background:var(--accent);font-weight:800;color:#fff">Зберегти</button>`;
    }

    async function saveCat(id) {
        const user = (await sb.auth.getUser()).data.user;
        const payload = { name: cN.value, color: cC.value, user_id: user.id };
        if(id) await sb.from('categories').update(payload).eq('id', id);
        else await sb.from('categories').insert([payload]);
        closeModal(); load();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
