<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Cloud Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    <style>
        /* Стилі залишаємо ті самі, що були в попередній версії */
        :root[data-theme="dark"] { --bg: #121214; --surface: #1e1e21; --border: #2e2e32; --text: #f4f4f5; --muted: #a1a1aa; --accent: #10b981; --sidebar: #121214; }
        :root[data-theme="light"] { --bg: #fafafa; --surface: #ffffff; --border: #e4e4e7; --text: #18181b; --muted: #71717a; --accent: #10b981; --sidebar: #fafafa; }
        * { box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif !important; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; }
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .app-layout { display: none; width: 100vw; height: 100vh; overflow: hidden; }
        .logged-in .app-layout { display: flex; }
        .logged-in #auth-screen { display: none; }
        header, .sidebar-header { height: 64px; display: flex; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; padding: 0 20px; }
        #sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: margin-left 0.3s; z-index: 2000; }
        .sidebar-hidden #sidebar { margin-left: -260px; }
        main { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-header { justify-content: space-between; display: flex; align-items: center; }
        .header-controls { display: flex; align-items: center; gap: 8px; }
        .btn-icon, .input-year { background: var(--surface); border: 1px solid var(--border); color: var(--text); height: 38px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-icon { width: 38px; }
        .btn-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
        #cat-list { display: flex; gap: 8px; padding: 0 20px; height: 56px; align-items: center; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; padding: 6px 14px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); transition: 0.2s; }
        .cat-item.active { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .cat-dot { width: 10px; height: 10px; border-radius: 50%; }
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .year-section { margin-bottom: 25px; }
        .year-header { color: var(--accent); font-size: 1.7rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .year-row { display: flex; gap: 8px; }
        .month-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px 8px 8px; position: relative; min-height: 115px; flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
        .month-label { font-size: 0.7rem; color: var(--muted); position: absolute; top: 12px; left: 12px; font-weight: 800; }
        .card { color: #fff; padding: 8px; border-radius: 8px; font-size: 0.75rem; cursor: grab; font-weight: 600; border-left: 3px solid rgba(255,255,255,0.4); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 3000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--surface); padding: 28px; border-radius: 24px; width: 90%; max-width: 360px; border: 1px solid var(--border); }
        .modern-input { width: 100%; padding: 14px; margin-bottom: 14px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
        @media (max-width: 768px) { .year-row { display: grid; grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-weight:800; font-size:1.8rem;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        <p style="color:var(--muted); margin-bottom:24px;">Хмарна синхронізація увімкнена</p>
        <input type="email" id="auth-email" class="modern-input" placeholder="Email">
        <input type="password" id="auth-password" class="modern-input" placeholder="Пароль">
        <button onclick="handleAuth('login')" class="btn-primary" style="margin-bottom:12px;">Увійти</button>
        <button onclick="handleAuth('signup')" style="background:none; border:none; color:var(--muted); cursor:pointer;">Створити акаунт</button>
    </div>
</div>

<div class="app-layout">
    <div class="overlay" onclick="toggleMenu()"></div>
    <aside id="sidebar" ondragover="event.preventDefault()" ondrop="handleDrop(event, null)">
        <div class="sidebar-header">
            <span style="font-weight:800; font-size:0.7rem; color:var(--muted);">БЕКЛОГ</span>
            <button onclick="toggleMenu()" class="btn-icon" style="border:none; background:none;"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
        </div>
        <div style="padding: 20px;"><button onclick="openModal(null, null)" class="btn-primary">+ ДОДАТИ</button></div>
        <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 20px; display:flex; flex-direction:column; gap:10px;"></div>
    </aside>

    <main>
        <header class="top-header">
            <div class="header-controls">
                <button class="btn-icon" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
                <h1 style="font-size:1.2rem; margin-left:10px; font-weight:800;">Scanner<span style="color:var(--accent)">Planner</span></h1>
            </div>
            <div class="header-controls">
                <input type="number" id="yearInput" class="input-year" onchange="updateStartYear(this.value)">
                <button class="btn-icon" onclick="toggleTheme()" id="themeBtn"></button>
                <button class="btn-icon" style="color:#ef4444;" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </header>
        <div id="cat-list"></div>
        <div id="calendar-scroll"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 id="modal-title">Проєкт</h3>
        <input type="text" id="mTitle" class="modern-input" placeholder="Назва">
        <select id="mCat" class="modern-input"></select>
        <p id="mDateDisplay" style="font-size:0.8rem; color:var(--muted);"></p>
        <button onclick="saveProject()" class="btn-primary">Зберегти</button>
        <button id="deleteBtn" onclick="deleteProject()" style="background:none; color:#ef4444; border:none; margin-top:15px; width:100%; cursor:pointer;">Видалити</button>
    </div>
</div>

<div id="catModal" class="modal" onclick="if(event.target==this)closeCatModal()">
    <div class="modal-box">
        <h3>Категорія</h3>
        <input type="text" id="catTitle" class="modern-input" placeholder="Назва">
        <input type="color" id="catColor" style="width:100%; height:50px; border-radius:10px; border:1px solid var(--border); background:none; margin-bottom:15px;">
        <button onclick="saveCategory()" class="btn-primary">Оновити</button>
        <button onclick="addCategory()" style="background:none; color:var(--accent); border:none; margin-top:15px; width:100%; cursor:pointer;">+ Створити нову</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], categories = [], catColors = {}, fullCats = [];
    let startYear = parseInt(localStorage.getItem('sc-start-year')) || 2026;
    let collapsedYears = JSON.parse(localStorage.getItem('sc-collapsed-years')) || [];
    let activeFilter = null, editingId = null, selectedDate = null, editingCatName = null;

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value, password = document.getElementById('auth-password').value;
        const { error } = (type === 'login') ? await sb.auth.signInWithPassword({ email, password }) : await sb.auth.signUp({ email, password });
        if (error) alert(error.message);
    }

    async function logout() { await sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => {
        if (session) { document.body.classList.add('logged-in'); loadAllData(); }
        else document.body.classList.remove('logged-in');
    });

    async function loadAllData() {
        const { data: cData } = await sb.from('categories').select('*');
        if (!cData || cData.length === 0) { await setupDefaults(); return loadAllData(); }
        
        fullCats = cData;
        categories = cData.map(c => c.name);
        catColors = cData.reduce((acc, c) => ({...acc, [c.name]: c.color}), {});
        
        const { data: pData } = await sb.from('projects').select('*');
        projects = pData || [];
        render();
    }

    async function setupDefaults() {
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('categories').insert([
            { name: 'Творчість', color: '#a855f7', user_id: user.id },
            { name: 'Технології', color: '#3b82f6', user_id: user.id }
        ]);
    }

    function render() {
        document.getElementById('yearInput').value = startYear;
        const clist = document.getElementById('cat-list'), mcat = document.getElementById('mCat');
        clist.innerHTML = ''; mcat.innerHTML = '';
        
        categories.forEach(c => {
            const item = document.createElement('div');
            item.className = 'cat-item' + (activeFilter === c ? ' active' : '');
            if (activeFilter && activeFilter !== c) item.style.opacity = '0.4';
            item.innerHTML = `<div class="cat-dot" style="background:${catColors[c]}" onclick="event.stopPropagation(); openCatModal('${c}')"></div><span onclick="toggleFilter('${c}')">${c}</span>`;
            clist.appendChild(item);
            mcat.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const scroll = document.getElementById('calendar-scroll'); scroll.innerHTML = '';
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        const pToDisplay = activeFilter ? projects.filter(p => p.cat === activeFilter) : projects;

        for (let y = 0; y < 6; y++) {
            const year = startYear + y;
            const isCol = collapsedYears.includes(year);
            const sec = document.createElement('div'); sec.className = 'year-section' + (isCol ? ' year-collapsed' : '');
            const h = document.createElement('div'); h.className = 'year-header';
            h.innerHTML = `<span>${year}</span><span style="font-size:0.8rem; opacity:0.5">${isCol ? '▶' : '▼'}</span>`;
            h.onclick = () => { collapsedYears = isCol ? collapsedYears.filter(i=>i!==year) : [...collapsedYears, year]; localStorage.setItem('sc-collapsed-years', JSON.stringify(collapsedYears)); render(); };
            sec.appendChild(h);

            if (!isCol) {
                const row = document.createElement('div'); row.className = 'year-row';
                for (let m = 1; m <= 12; m++) {
                    const dk = `${year}-${String(m).padStart(2,'0')}`;
                    const cell = document.createElement('div'); cell.className = 'month-cell';
                    cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                    cell.onclick = (e) => { if(e.target === cell) openModal(null, dk); };
                    cell.addEventListener('dragover', e => e.preventDefault());
                    cell.addEventListener('drop', e => handleDrop(e, dk));
                    pToDisplay.filter(p => p.date === dk).forEach(p => cell.appendChild(createCard(p)));
                    row.appendChild(cell);
                }
                sec.appendChild(row);
            }
            scroll.appendChild(sec);
        }
        const blog = document.getElementById('backlog'); blog.innerHTML = '';
        pToDisplay.filter(p => !p.date).forEach(p => blog.appendChild(createCard(p)));
        updateThemeIcon();
    }

    function createCard(p) {
        const c = document.createElement('div'); c.className = 'card'; c.draggable = true;
        c.style.backgroundColor = catColors[p.cat] || '#888'; c.innerText = p.title;
        c.onclick = e => { e.stopPropagation(); openModal(p); };
        c.ondragstart = e => e.dataTransfer.setData('pid', p.id);
        return c;
    }

    async function handleDrop(e, date) {
        const id = e.dataTransfer.getData('pid');
        if (id) { await sb.from('projects').update({ date }).eq('id', id); loadAllData(); }
    }

    function openModal(p, d) {
        editingId = p?p.id:null; selectedDate = p?p.date:d;
        document.getElementById('mTitle').value = p?p.title:'';
        document.getElementById('mCat').value = p?p.cat:categories[0];
        document.getElementById('mDateDisplay').innerText = selectedDate || 'Беклог';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function saveProject() {
        const title = document.getElementById('mTitle').value, cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if (editingId) await sb.from('projects').update({ title, cat }).eq('id', editingId);
        else await sb.from('projects').insert([{ title, cat, date: selectedDate, user_id: user.id }]);
        closeModal(); loadAllData();
    }
    async function deleteProject() { if(confirm("Видалити?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadAllData(); } }

    function openCatModal(name) {
        editingCatName = name; document.getElementById('catTitle').value = name;
        document.getElementById('catColor').value = catColors[name];
        document.getElementById('catModal').style.display = 'flex';
    }
    function closeCatModal() { document.getElementById('catModal').style.display = 'none'; }
    async function saveCategory() {
        const name = document.getElementById('catTitle').value, color = document.getElementById('catColor').value;
        const cat = fullCats.find(c => c.name === editingCatName);
        await sb.from('categories').update({ name, color }).eq('id', cat.id);
        if (name !== editingCatName) await sb.from('projects').update({ cat: name }).eq('cat', editingCatName);
        closeCatModal(); loadAllData();
    }
    async function addCategory() {
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('categories').insert([{ name: 'Нова', color: '#10b981', user_id: user.id }]);
        loadAllData();
    }

    function toggleFilter(c) { activeFilter = activeFilter === c ? null : c; render(); }
    function toggleMenu() { document.body.classList.toggle('sidebar-hidden'); }
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('sc-theme', t); updateThemeIcon();
    }
    function updateThemeIcon() {
        const t = document.documentElement.getAttribute('data-theme');
        document.getElementById('themeBtn').innerHTML = t === 'dark' ? '🌙' : '☀️';
    }
    function updateStartYear(v) { startYear = parseInt(v); localStorage.setItem('sc-start-year', v); render(); }

    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
