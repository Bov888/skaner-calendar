<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Stable Build</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0f0f11; --surface: #1a1a1d; --border: #2d2d32; --text: #f4f4f5;
            --muted: #8d8d95; --accent: #10b981; --sidebar: #0f0f11;
        }
        :root[data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0; --text: #0f172a;
            --muted: #64748b; --accent: #10b981; --sidebar: #ffffff;
        }

        * { box-sizing: border-box; outline: none; font-family: 'Outfit', sans-serif !important; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: grid; place-items: center; }
        .auth-box { background: var(--surface); padding: 40px; border-radius: 28px; border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center; }

        .app-layout { display: none; width: 100%; height: 100%; position: relative; }
        .logged-in .app-layout { display: flex; }
        .logged-in #auth-screen { display: none; }

        /* SIDEBAR FIX */
        #sidebar { 
            width: 280px; min-width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; transition: 0.3s ease; position: relative; z-index: 100;
        }
        .sidebar-hidden #sidebar { margin-left: -280px; }

        /* MAIN CONTENT */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
        header { height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); }
        .header-controls { display: flex; align-items: center; gap: 12px; }

        /* CATEGORIES */
        #cat-list { display: flex; gap: 10px; padding: 15px 24px; overflow-x: auto; border-bottom: 1px solid var(--border); scrollbar-width: none; }
        #cat-list::-webkit-scrollbar { display: none; }
        .cat-item { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; padding: 8px 16px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); white-space: nowrap; }
        .cat-item.active { border-color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .cat-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* CALENDAR GRID FIX (12 in row) */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 24px; }
        .year-section { margin-bottom: 40px; }
        .year-header { color: var(--accent); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        .year-row { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); /* Повертаємо чітку сітку 12 місяців */
            gap: 10px; 
        }

        .month-cell { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
            padding: 35px 8px 8px; position: relative; min-height: 120px;
            display: flex; flex-direction: column; gap: 6px; transition: 0.2s;
        }
        .month-label { position: absolute; top: 12px; left: 0; right: 0; text-align: center; font-size: 0.65rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }

        /* CARDS */
        .card { padding: 8px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; color: #fff; cursor: grab; border-left: 3px solid rgba(255,255,255,0.3); }

        /* MODALS (CENTERED) */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; z-index: 2000; place-items: center; padding: 20px; }
        .modal-box { background: var(--surface); padding: 30px; border-radius: 28px; border: 1px solid var(--border); width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* INPUTS */
        .modern-input { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
        .btn-icon { width: 42px; height: 42px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-icon svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* MOBILE FIX */
        @media (max-width: 1200px) { .year-row { grid-template-columns: repeat(6, 1fr); } }
        @media (max-width: 768px) { 
            .year-row { grid-template-columns: repeat(3, 1fr); } 
            #sidebar { position: fixed; height: 100%; left: 0; }
        }
        @media (max-width: 480px) { .year-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h1 style="font-weight:800; margin-bottom:10px;">Scanner<span style="color:var(--accent)">Planner</span></h1>
        <input type="email" id="auth-email" class="modern-input" placeholder="Email">
        <input type="password" id="auth-password" class="modern-input" placeholder="Пароль">
        <button onclick="handleAuth('login')" class="btn-primary">Увійти</button>
        <button onclick="handleAuth('signup')" style="background:none; border:none; color:var(--muted); margin-top:15px; cursor:pointer;">Створити акаунт</button>
    </div>
</div>

<div class="app-layout">
    <aside id="sidebar">
        <div class="sidebar-header">
            <span style="font-weight:800; font-size:0.75rem; color:var(--muted); letter-spacing:1px;">ВХІДНІ (INBOX)</span>
            <button onclick="toggleMenu()" class="btn-icon" style="border:none; background:none;">✕</button>
        </div>
        <div style="padding: 20px;"><button onclick="openModal(null, null)" class="btn-primary">+ ДОДАТИ</button></div>
        <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 20px 20px; display:flex; flex-direction:column; gap:10px;"></div>
    </aside>

    <main>
        <header>
            <div class="header-controls">
                <button class="btn-icon" onclick="toggleMenu()">☰</button>
                <h2 style="margin:0; font-weight:800; font-size:1.3rem;">Scanner<span style="color:var(--accent)">Planner</span></h2>
            </div>
            <div class="header-controls">
                <input type="number" id="yearInput" style="width:75px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:8px; border-radius:10px; text-align:center; font-weight:800;" onchange="updateStartYear(this.value)">
                <button class="btn-icon" onclick="toggleTheme()" id="themeBtn"></button>
                <button class="btn-icon" onclick="logout()" style="color:#ef4444;">🚪</button>
            </div>
        </header>
        <div id="cat-list"></div>
        <div id="calendar-scroll"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-box">
        <h3 style="margin-top:0; font-weight:800;">Редагування проєкту</h3>
        <input type="text" id="mTitle" class="modern-input" placeholder="Назва проєкту">
        <select id="mCat" class="modern-input"></select>
        <p id="mDateDisplay" style="text-align:center; font-weight:800; color:var(--muted); font-size:0.8rem;"></p>
        <button onclick="saveProject()" class="btn-primary">Зберегти</button>
        <button onclick="deleteProject()" style="background:none; border:none; color:#ef4444; width:100%; margin-top:10px; cursor:pointer; font-weight:600;">Видалити</button>
    </div>
</div>

<div id="catModal" class="modal" onclick="if(event.target==this)closeCatModal()">
    <div class="modal-box">
        <h3 style="margin-top:0; font-weight:800;">Категорія</h3>
        <input type="text" id="catTitle" class="modern-input" placeholder="Назва">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
            <span>Колір:</span>
            <input type="color" id="catColor" style="flex:1; height:40px; border-radius:8px; border:none; cursor:pointer;">
        </div>
        <button onclick="saveCategory()" class="btn-primary">Оновити</button>
        <button onclick="addCategory()" style="background:none; border:none; color:var(--accent); width:100%; margin-top:10px; cursor:pointer; font-weight:600;">+ Додати нову</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc"; 
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], categories = [], catColors = {}, fullCats = [];
    let startYear = parseInt(localStorage.getItem('sc-start-year')) || 2026;
    let collapsedYears = JSON.parse(localStorage.getItem('sc-collapsed-years')) || [];
    let activeFilter = null, editingId = null, selectedDate = null, editingCatName = null;

    async function handleAuth(type) {
        const email = document.getElementById('auth-email').value, password = document.getElementById('auth-password').value;
        const { error } = (type === 'login') ? await sb.auth.signInWithPassword({ email, password }) : await sb.auth.signUp({ email, password });
        if (error) alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); window.location.reload(); }
    sb.auth.onAuthStateChange((ev, session) => {
        if (session) { document.body.classList.add('logged-in'); loadAllData(); }
        else document.body.classList.remove('logged-in');
    });

    async function loadAllData() {
        const { data: cData } = await sb.from('categories').select('*');
        if (!cData || cData.length === 0) { await setupDefaults(); return loadAllData(); }
        fullCats = cData; categories = cData.map(c => c.name); catColors = cData.reduce((acc, c) => ({...acc, [c.name]: c.color}), {});
        const { data: pData } = await sb.from('projects').select('*');
        projects = pData || [];
        render();
    }

    async function setupDefaults() {
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('categories').insert([{ name: 'Творчість', color: '#a855f7', user_id: user.id }, { name: 'Бізнес', color: '#10b981', user_id: user.id }]);
    }

    function render() {
        document.getElementById('yearInput').value = startYear;
        const clist = document.getElementById('cat-list'), mcat = document.getElementById('mCat');
        clist.innerHTML = ''; mcat.innerHTML = '';
        categories.forEach(c => {
            clist.innerHTML += `<div class="cat-item ${activeFilter===c?'active':''}" onclick="activeFilter=activeFilter==='${c}'?null:'${c}';render()"><div class="cat-dot" style="background:${catColors[c]}" onclick="event.stopPropagation();openCatModal('${c}')"></div>${c}</div>`;
            mcat.innerHTML += `<option value="${c}">${c}</option>`;
        });

        const scroll = document.getElementById('calendar-scroll'); scroll.innerHTML = '';
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        const filtered = activeFilter ? projects.filter(p => p.cat === activeFilter) : projects;

        for (let y = 0; y < 6; y++) {
            const year = startYear + y;
            const isCol = collapsedYears.includes(year);
            const sec = document.createElement('div'); sec.className = 'year-section';
            sec.innerHTML = `<div class="year-header" onclick="toggleYear(${year})">${year} <span style="font-size:0.8rem;opacity:0.3">${isCol?'▶':'▼'}</span></div>`;
            if (!isCol) {
                const row = document.createElement('div'); row.className = 'year-row';
                for (let m = 1; m <= 12; m++) {
                    const dk = `${year}-${String(m).padStart(2,'0')}`;
                    const cell = document.createElement('div'); cell.className = 'month-cell';
                    cell.innerHTML = `<div class="month-label">${months[m-1]}</div>`;
                    cell.onclick = (e) => { if(e.target===cell) openModal(null, dk); };
                    cell.addEventListener('dragover', e => e.preventDefault());
                    cell.addEventListener('drop', e => handleDrop(e, dk));
                    filtered.filter(p => p.date === dk).forEach(p => {
                        const card = document.createElement('div'); card.className = 'card';
                        card.style.backgroundColor = catColors[p.cat]; card.innerText = p.title;
                        card.draggable = true; card.onclick = (e) => { e.stopPropagation(); openModal(p); };
                        card.ondragstart = e => e.dataTransfer.setData('pid', p.id);
                        cell.appendChild(card);
                    });
                    row.appendChild(cell);
                }
                sec.appendChild(row);
            }
            scroll.appendChild(sec);
        }
        const blog = document.getElementById('backlog'); blog.innerHTML = '';
        filtered.filter(p => !p.date).forEach(p => {
            const card = document.createElement('div'); card.className = 'card';
            card.style.backgroundColor = catColors[p.cat]; card.innerText = p.title;
            card.draggable = true; card.onclick = () => openModal(p);
            card.ondragstart = e => e.dataTransfer.setData('pid', p.id);
            blog.appendChild(card);
        });
        updateThemeIcon();
    }

    async function handleDrop(e, date) {
        const id = e.dataTransfer.getData('pid');
        if (id) { await sb.from('projects').update({ date }).eq('id', id); loadAllData(); }
    }
    function toggleYear(y) { collapsedYears = collapsedYears.includes(y) ? collapsedYears.filter(i=>i!==y) : [...collapsedYears, y]; localStorage.setItem('sc-collapsed-years', JSON.stringify(collapsedYears)); render(); }
    function openModal(p, d) { editingId = p?p.id:null; selectedDate = p?p.date:d; document.getElementById('mTitle').value = p?p.title:''; document.getElementById('mCat').value = p?p.cat:categories[0]; document.getElementById('mDateDisplay').innerText = selectedDate || 'В БЕКЛОЗІ'; document.getElementById('modal').style.display = 'grid'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    async function saveProject() {
        const title = document.getElementById('mTitle').value, cat = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if (editingId) await sb.from('projects').update({ title, cat }).eq('id', editingId);
        else await sb.from('projects').insert([{ title, cat, date: selectedDate, user_id: user.id }]);
        closeModal(); loadAllData();
    }
    async function deleteProject() { if(confirm("Видалити проєкт?")) { await sb.from('projects').delete().eq('id', editingId); closeModal(); loadAllData(); } }
    function openCatModal(name) { editingCatName = name; document.getElementById('catTitle').value = name; document.getElementById('catColor').value = catColors[name]; document.getElementById('catModal').style.display = 'grid'; }
    function closeCatModal() { document.getElementById('catModal').style.display = 'none'; }
    async function saveCategory() {
        const name = document.getElementById('catTitle').value, color = document.getElementById('catColor').value;
        const cat = fullCats.find(c => c.name === editingCatName);
        await sb.from('categories').update({ name, color }).eq('id', cat.id);
        if (name !== editingCatName) await sb.from('projects').update({ cat: name }).eq('cat', editingCatName);
        closeCatModal(); loadAllData();
    }
    async function addCategory() {
        const { data: { user } } = await sb.auth.getUser();
        await sb.from('categories').insert([{ name: 'Нова', color: '#10b981', user_id: user.id }]);
        loadAllData();
    }
    function toggleMenu() { document.body.classList.toggle('sidebar-hidden'); }
    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t); localStorage.setItem('sc-theme', t); updateThemeIcon();
    }
    function updateThemeIcon() {
        const t = document.documentElement.getAttribute('data-theme');
        const btn = document.getElementById('themeBtn');
        btn.innerHTML = t === 'dark' ? '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>' : '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"></line></svg>';
    }
    function updateStartYear(v) { startYear = parseInt(v); localStorage.setItem('sc-start-year', v); render(); }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
