<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Planner - Final Stability</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root[data-theme="dark"] {
            --bg: #0f0f11; --surface: #1a1a1d; --border: #2d2d31; --text: #f4f4f5;
            --muted: #8d8d92; --accent: #10b981;
        }
        :root[data-theme="light"] {
            --bg: #ffffff; --surface: #f4f4f5; --border: #e4e4e7; --text: #18181b;
            --muted: #71717a; --accent: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif !important; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; margin: 0; }

        /* Sidebar - No borders, only shadows for 1px precision */
        #sidebar { 
            width: 280px; background: var(--bg); flex-shrink: 0;
            box-shadow: 1px 0 0 0 var(--border);
            display: flex; flex-direction: column; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }

        @media (max-width: 800px) {
            #sidebar { position: fixed; height: 100%; left: 0; transform: translateX(-100%); }
            .sidebar-open #sidebar { transform: translateX(0); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1500; backdrop-filter: blur(4px); }
            .sidebar-open .overlay { display: block; }
        }

        main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }

        /* Unified Header & Nav */
        header, .nav-bar { 
            height: 64px; display: flex; align-items: center; 
            padding: 0 20px; box-shadow: 0 1px 0 0 var(--border); flex-shrink: 0;
        }

        .header-group { display: flex; align-items: center; gap: 12px; }
        
        /* Fixed Size Buttons */
        .btn {
            width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text); cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn svg { width: 20px; height: 20px; stroke-width: 2.5; }

        .btn-main { 
            width: 100%; height: 48px; background: var(--accent); color: white; 
            border: none; border-radius: 12px; font-weight: 800; font-size: 0.9rem;
            text-transform: uppercase; cursor: pointer;
        }

        /* Perfectly Center Category Items */
        .cat-bar { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; height: 64px; align-items: center; box-shadow: 0 1px 0 0 var(--border); scrollbar-width: none; }
        .cat-tag { 
            height: 38px; padding: 0 16px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--surface); display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer;
        }
        .cat-tag.active { border-color: var(--accent); color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        /* Calendar */
        #calendar-scroll { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        .year-label { font-size: 1.8rem; font-weight: 800; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .year-label::after { content: 'PLANNER'; font-size: 0.7rem; opacity: 0.2; letter-spacing: 2px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 40px; }
        .month { 
            background: var(--surface); border-radius: 18px; padding: 40px 10px 10px; 
            position: relative; min-height: 120px; border: 1px solid var(--border);
        }
        .m-name { position: absolute; top: 12px; left: 12px; font-size: 0.7rem; font-weight: 800; color: var(--muted); text-transform: uppercase; }

        .card { padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600; color: white; margin-bottom: 6px; cursor: pointer; }

        /* Auth & Modals */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 5000; backdrop-filter: blur(8px); }
        .modal-inner { background: var(--surface); padding: 30px; border-radius: 24px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        
        .field { width: 100%; padding: 14px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 1rem; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="modal-inner" style="text-align: center;">
        <h2 style="margin-bottom: 20px; font-weight: 800;">Scanner<span style="color:var(--accent)">Planner</span></h2>
        <input type="email" id="auth-email" class="field" placeholder="Email">
        <input type="password" id="auth-password" class="field" placeholder="Пароль">
        <button onclick="handleAuth()" class="btn-main">Увійти</button>
    </div>
</div>

<div class="app-layout" id="app">
    <div class="overlay" onclick="toggleSidebar(false)"></div>
    
    <aside id="sidebar">
        <div class="nav-bar" style="justify-content: space-between;">
            <span style="font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; color: var(--muted);">INBOX</span>
            <button class="btn" style="border:none;" onclick="toggleSidebar(false)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div style="padding: 20px;"><button onclick="openModal()" class="btn-main">+ Новий проєкт</button></div>
        <div id="backlog" style="flex:1; overflow-y:auto; padding: 0 20px;"></div>
    </aside>

    <main>
        <header>
            <div class="header-group">
                <button class="btn" onclick="toggleSidebar(true)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <h1 style="font-size: 1.2rem; font-weight: 800;">Scanner<span style="color:var(--accent)">Planner</span></h1>
            </div>
            <div class="header-group">
                <input type="number" id="yearInp" class="field" style="width: 80px; margin: 0; height: 40px; text-align: center;" onchange="updateYear(this.value)">
                <button class="btn" onclick="toggleTheme()">🌓</button>
                <button class="btn" style="color:#ef4444" onclick="logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                </button>
            </div>
        </header>
        <div class="cat-bar" id="cat-list"></div>
        <div id="calendar-scroll"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-inner">
        <h3 id="mTitleLabel" style="margin-bottom: 20px;">Проєкт</h3>
        <input type="text" id="mTitle" class="field" placeholder="Назва...">
        <select id="mCat" class="field"></select>
        <button onclick="saveProject()" class="btn-main">Зберегти</button>
    </div>
</div>

<script>
    const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let projects = [], cats = [], year = parseInt(localStorage.getItem('sc-yr')) || 2026;
    let filter = null, editId = null, selDate = null;

    // Sidebar Logic - Forceful
    function toggleSidebar(open) {
        document.getElementById('app').classList.toggle('sidebar-open', open);
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-password').value;
        const { error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) alert(error.message);
    }
    async function logout() { await sb.auth.signOut(); window.location.reload(); }

    sb.auth.onAuthStateChange((ev, session) => {
        if (session) { document.body.classList.add('logged-in'); loadData(); }
        else document.body.classList.remove('logged-in');
    });

    async function loadData() {
        const { data: c } = await sb.from('categories').select('*').order('created_at');
        const { data: p } = await sb.from('projects').select('*');
        cats = c || []; projects = p || [];
        render();
    }

    function render() {
        document.getElementById('yearInp').value = year;
        const cl = document.getElementById('cat-list'), mc = document.getElementById('mCat');
        cl.innerHTML = '<div class="cat-tag" onclick="addCat()"><b>+</b></div>';
        mc.innerHTML = '';
        
        cats.forEach(c => {
            const t = document.createElement('div');
            t.className = `cat-tag ${filter === c.name ? 'active' : ''}`;
            t.innerHTML = `<div class="dot" style="background:${c.color}"></div>${c.name}`;
            t.onclick = () => { filter = filter === c.name ? null : c.name; render(); };
            cl.appendChild(t);
            mc.innerHTML += `<option value="${c.name}">${c.name}</option>`;
        });

        const cs = document.getElementById('calendar-scroll'); cs.innerHTML = '';
        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        const flt = filter ? projects.filter(p => p.cat === filter) : projects;

        for (let y = 0; y < 3; y++) {
            const curY = year + y;
            const sec = document.createElement('div');
            sec.innerHTML = `<div class="year-label">${curY}</div>`;
            const grid = document.createElement('div'); grid.className = 'grid';
            
            for (let m = 1; m <= 12; m++) {
                const dk = `${curY}-${String(m).padStart(2,'0')}`;
                const div = document.createElement('div'); div.className = 'month';
                div.innerHTML = `<div class="m-name">${months[m-1]}</div>`;
                div.onclick = (e) => { if(e.target === div) openModal(null, dk); };
                
                flt.filter(p => p.date === dk).forEach(p => {
                    const card = document.createElement('div'); card.className = 'card';
                    card.style.backgroundColor = (cats.find(c => c.name === p.cat) || {}).color || '#888';
                    card.innerText = p.title; card.onclick = (e) => { e.stopPropagation(); openModal(p); };
                    div.appendChild(card);
                });
                grid.appendChild(div);
            }
            sec.appendChild(grid); cs.appendChild(sec);
        }
        
        const bl = document.getElementById('backlog'); bl.innerHTML = '';
        flt.filter(p => !p.date).forEach(p => {
            const c = document.createElement('div'); c.className = 'card';
            c.style.backgroundColor = (cats.find(cat => cat.name === p.cat) || {}).color || '#888';
            c.innerText = p.title; c.onclick = () => openModal(p);
            bl.appendChild(c);
        });
    }

    function openModal(p, d) {
        editId = p ? p.id : null; selDate = p ? p.date : d;
        document.getElementById('mTitle').value = p ? p.title : '';
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function saveProject() {
        const t = document.getElementById('mTitle').value, c = document.getElementById('mCat').value;
        const { data: { user } } = await sb.auth.getUser();
        if (editId) await sb.from('projects').update({ title: t, cat: c }).eq('id', editId);
        else await sb.from('projects').insert([{ title: t, cat: c, date: selDate, user_id: user.id }]);
        closeModal(); loadData();
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        localStorage.setItem('sc-theme', t);
    }
    function updateYear(v) { year = parseInt(v); localStorage.setItem('sc-yr', v); render(); }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('sc-theme') || 'dark');
</script>
</body>
</html>
