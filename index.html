<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScannerPlaner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafaf8; --surface: #f4f3ef; --surface2: #eceae4;
            --border: #e2e1db; --text: #1a1917; --muted: #6b6963;
            --accent: #2d5a27; --accent-light: #e8f0e6; --accent-mid: #4a8a42;
            --error: #8b2010;
            --sidebar-w: 240px;
        }
        [data-theme="dark"] {
            --bg: #141412; --surface: #1e1d1b; --surface2: #262522;
            --border: #2e2d2a; --text: #e8e6e0; --muted: #8a8880;
            --accent: #6ab05f; --accent-light: #1e2e1c; --accent-mid: #4a8a42;
            --error: #e05040;
        }

        * { margin:0; padding:0; box-sizing:border-box; border:none; outline:none; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Literata', Georgia, serif; font-weight: 300;
            height: 100vh; height: 100dvh;
            overflow: hidden; display: flex; flex-direction: column;
            transition: background 0.3s, color 0.3s;
        }

        /* ── TOP BAR ── */
        .top-bar {
            height:52px; display:flex; align-items:center;
            padding:0 1.5rem; border-bottom:1px solid var(--border);
            gap:1rem; flex-shrink:0; background:var(--bg); z-index:200;
        }
        .site-title {
            font-family:'Literata',serif; font-size:1.1rem; font-weight:400;
            display:flex; align-items:center; gap:0.5rem; flex:1; cursor:pointer; background:none; color:var(--text);
        }
        .site-title span { color:var(--accent); font-style:italic; }

        .icon-btn {
            background:none; border:1px solid var(--border); color:var(--muted);
            cursor:pointer; display:flex; align-items:center; justify-content:center;
            width:32px; height:32px; border-radius:2px;
        }
        .icon-btn svg { width:16px; height:16px; }

        /* ── LAYOUT & SIDEBAR ── */
        .app-body { flex:1; display:flex; overflow:hidden; position:relative; }

        #sidebar {
            width: var(--sidebar-w); min-width: 180px; max-width: 420px;
            background:var(--surface); border-right:1px solid var(--border);
            display:flex; flex-direction:column; flex-shrink:0;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s ease;
            overflow:hidden; position:relative;
        }

        /* Виправлення пустого місця при згортанні */
        @media (min-width:1025px) {
            .sidebar-closed #sidebar { 
                width: 0 !important; 
                min-width: 0 !important; 
                border-right: none;
                transform: translateX(-100%); 
            }
        }

        @media (max-width:1024px) {
            #sidebar { position:absolute; top:0; bottom:0; left:0; z-index:500; width:280px!important; transform:translateX(-100%); }
            .sidebar-open #sidebar { transform:translateX(0); }
            #sidebar-overlay { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.4); z-index:499; backdrop-filter:blur(2px); }
            .sidebar-open #sidebar-overlay { display:block; }
        }

        #sidebar-resizer { position:absolute; top:0; right:-4px; width:8px; height:100%; cursor:col-resize; z-index:10; }

        .sidebar-section { padding:1.2rem 1rem; border-bottom:1px solid var(--border); flex-shrink:0; }
        .sidebar-label { font-family:'JetBrains Mono',monospace; font-size:0.58rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:0.6rem; display:block; }
        
        .year-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--accent); font-family:'JetBrains Mono',monospace; padding:0.5rem; text-align:center; }

        .primary-btn { width:100%; padding:0.7rem; background:var(--accent); color:#fff; font-family:'JetBrains Mono',monospace; font-size:0.65rem; text-transform:uppercase; cursor:pointer; border-radius:2px; }
        .secondary-btn { width:100%; padding:0.7rem; border:1px solid var(--border); color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:0.65rem; text-transform:uppercase; cursor:pointer; background:none; }

        /* ── BACKLOG ── */
        #backlog-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        #backlog { flex:1; overflow-y:auto; padding:1rem; min-height:100px; }
        .backlog-hint { font-size:0.55rem; color:var(--muted); text-align:center; padding:1rem; border:1px dashed var(--border); }

        /* ── MAIN AREA ── */
        #main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
        #cat-strip { display:flex; gap:0.5rem; padding:0.5rem 1.5rem; border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; }
        .cat-chip { font-family:'JetBrains Mono',monospace; font-size:0.58rem; border:1px solid var(--border); padding:0.3rem 0.6rem; border-radius:2px; cursor:pointer; white-space:nowrap; }
        .cat-chip.active { background:var(--accent-light); border-color:var(--accent); color:var(--accent); }

        #view { flex:1; overflow-y:auto; padding:1.5rem; }
        .year-sec { margin-bottom:2rem; }
        .year-title { font-size:1.6rem; color:var(--accent); margin-bottom:1rem; }
        .calendar-grid { display:grid; grid-template-columns:repeat(12,1fr); gap:6px; }
        @media (max-width:1100px) { .calendar-grid { grid-template-columns:repeat(6,1fr); } }
        @media (max-width:700px)  { .calendar-grid { grid-template-columns:repeat(3,1fr); } }

        .month-cell { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:24px 6px 6px; min-height:100px; position:relative; }
        .month-cell::before { content:attr(data-label); position:absolute; top:6px; left:7px; font-size:0.55rem; color:var(--muted); font-family:'JetBrains Mono'; }

        /* ── PROJECT PILLS ── */
        .proj { padding:4px 6px; border-radius:2px; font-family:'JetBrains Mono',monospace; font-size:0.58rem; margin-bottom:3px; cursor:pointer; line-height:1.2; display:flex; align-items:flex-start; gap:4px; }
        .proj.done { opacity:0.4; text-decoration:line-through; }

        /* ── MODAL ── */
        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        .modal-card { background:var(--bg); border:1px solid var(--border); padding:2rem; width:100%; max-width:400px; border-radius:3px; }
        .inp { width:100%; padding:0.7rem; margin-bottom:1rem; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono'; font-size:0.8rem; }
        
        /* AUTH GATE */
        #auth-gate { position:fixed; inset:0; background:var(--bg); z-index:20000; display:none; align-items:center; justify-content:center; }

    </style>
</head>
<body class="sidebar-closed">

<div id="auth-gate">
    <div class="modal-card">
        <h2 style="margin-bottom:1.5rem; text-align:center">Scanner<span>Planer</span></h2>
        <input type="email" id="email" class="inp" placeholder="Email">
        <input type="password" id="pass" class="inp" placeholder="Пароль">
        <button onclick="login()" class="primary-btn">Увійти</button>
        <p id="auth-err" style="color:var(--error); font-size:0.7rem; margin-top:1rem; text-align:center"></p>
    </div>
</div>

<header class="top-bar">
    <button class="icon-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
    <div class="site-title" onclick="location.reload()">Scanner<span>Planer</span></div>
    <button class="icon-btn" onclick="logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
</header>

<div class="app-body">
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <aside id="sidebar">
        <div id="sidebar-resizer"></div>
        <div class="sidebar-section">
            <span class="sidebar-label">Рік початку</span>
            <input type="number" id="start-year" class="year-input" value="2026" onchange="render()">
        </div>
        <div class="sidebar-section" style="display:flex; flex-direction:column; gap:0.5rem">
            <button onclick="openModal('proj')" class="primary-btn">+ Новий проєкт</button>
            <button onclick="openModal('cat')" class="secondary-btn">+ Категорія</button>
        </div>
        <div id="backlog-wrap">
            <div class="sidebar-section"><span class="sidebar-label">Беклог</span></div>
            <div id="backlog"></div>
        </div>
    </aside>

    <main id="main-area">
        <div id="cat-strip"></div>
        <div id="view"></div>
    </main>
</div>

<div id="modal" class="modal" onclick="if(event.target==this)closeModal()">
    <div class="modal-card" id="m-body"></div>
</div>

<script>
const S_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(S_URL, S_KEY);

let projects = [], categories = [];
let activeFilters = new Set();

/* AUTH */
async function login(){
    const {error} = await sb.auth.signInWithPassword({email:email.value, password:pass.value});
    if(error) document.getElementById('auth-err').textContent = error.message;
}
async function logout(){ await sb.auth.signOut(); location.reload(); }

sb.auth.onAuthStateChange((ev, sess) => {
    document.getElementById('auth-gate').style.display = sess ? 'none' : 'flex';
    if(sess) sync();
});

/* DATA */
async function sync() {
    const [p, c] = await Promise.all([
        sb.from('projects').select('*'),
        sb.from('categories').select('*')
    ]);
    projects = p.data || [];
    categories = c.data || [];
    render();
    renderCats();
}

/* MODALS Logic - ТУТ ВИПРАВЛЕННЯ */
function openModal(type, data = null) {
    const body = document.getElementById('m-body');
    if (type === 'proj') {
        const catOptions = categories.map(c => `<option value="${c.name}" ${data?.cat === c.name ? 'selected' : ''}>${c.name}</option>`).join('');
        body.innerHTML = `
            <h3 class="sidebar-label" style="font-size:1rem; margin-bottom:1rem">${data ? 'Редагувати' : 'Новий проект'}</h3>
            <input id="p-title" class="inp" placeholder="Назва проекту" value="${data?.title || ''}">
            <select id="p-cat" class="inp">${catOptions}</select>
            <select id="p-kind" class="inp">
                <option value="project">🎯 Проєкт</option>
                <option value="interest">✦ Інтерес</option>
                <option value="zone">◎ Зона</option>
            </select>
            <button onclick="saveProj(${data?.id || null})" class="primary-btn">Зберегти</button>
            ${data ? `<button onclick="deleteProj(${data.id})" class="secondary-btn" style="margin-top:0.5rem; color:var(--error)">Видалити</button>` : ''}
        `;
    } else if (type === 'cat') {
        body.innerHTML = `
            <h3 class="sidebar-label" style="font-size:1rem; margin-bottom:1rem">Нова категорія</h3>
            <input id="c-name" class="inp" placeholder="Назва">
            <input id="c-color" type="color" class="inp" style="height:50px" value="#4a8a42">
            <button onclick="saveCat()" class="primary-btn">Створити</button>
        `;
    }
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

async function saveProj(id) {
    const title = document.getElementById('p-title').value;
    const cat = document.getElementById('p-cat').value;
    const kind = document.getElementById('p-kind').value;
    if(!title) return;

    const payload = { title, cat, kind, user_id: (await sb.auth.getUser()).data.user.id };
    
    if(id) {
        await sb.from('projects').update(payload).eq('id', id);
    } else {
        await sb.from('projects').insert([payload]);
    }
    closeModal();
    sync();
}

async function saveCat() {
    const name = document.getElementById('c-name').value;
    const color = document.getElementById('c-color').value;
    if(!name) return;

    await sb.from('categories').insert([{ name, color, user_id: (await sb.auth.getUser()).data.user.id }]);
    closeModal();
    sync();
}

async function deleteProj(id) {
    if(confirm('Видалити цей проект?')) {
        await sb.from('projects').delete().eq('id', id);
        closeModal();
        sync();
    }
}

/* RENDER FUNCTIONS */
function renderCats() {
    const strip = document.getElementById('cat-strip');
    strip.innerHTML = categories.map(c => `
        <div class="cat-chip" style="border-color:${c.color}; color:${c.color}" onclick="toggleFilter('${c.name}')">
            ● ${c.name}
        </div>
    `).join('');
}

function render() {
    const view = document.getElementById('view');
    const backlog = document.getElementById('backlog');
    const startYear = parseInt(document.getElementById('start-year').value);
    
    view.innerHTML = '';
    backlog.innerHTML = '';

    // Render 3 years
    for (let y = startYear; y < startYear + 3; y++) {
        const sec = document.createElement('div');
        sec.className = 'year-sec';
        sec.innerHTML = `<div class="year-title">${y}</div>`;
        const grid = document.createElement('div');
        grid.className = 'calendar-grid';

        const months = ['Січ','Лют','Бер','Кві','Тра','Чер','Лип','Сер','Вер','Жов','Лис','Гру'];
        months.forEach((m, i) => {
            const code = `${y}-${(i+1).toString().padStart(2,'0')}`;
            const cell = document.createElement('div');
            cell.className = 'month-cell';
            cell.dataset.label = m;
            cell.dataset.code = code;
            
            projects.filter(p => p.date === code).forEach(p => {
                cell.appendChild(createProjPill(p));
            });
            grid.appendChild(cell);
        });
        sec.appendChild(grid);
        view.appendChild(sec);
    }

    // Render Backlog
    projects.filter(p => !p.date).forEach(p => {
        backlog.appendChild(createProjPill(p));
    });
}

function createProjPill(p) {
    const cat = categories.find(c => c.name === p.cat);
    const pill = document.createElement('div');
    pill.className = `proj ${p.done ? 'done' : ''}`;
    pill.style.background = cat ? cat.color : '#666';
    pill.style.color = '#fff';
    pill.textContent = p.title;
    pill.onclick = (e) => { e.stopPropagation(); openModal('proj', p); };
    return pill;
}

function toggleSidebar() { 
    if(window.innerWidth <= 1024) document.body.classList.toggle('sidebar-open');
    else document.body.classList.toggle('sidebar-closed'); 
}
function closeSidebar() { document.body.classList.remove('sidebar-open'); }
</script>
</body>
</html>
