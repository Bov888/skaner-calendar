<!DOCTYPE html>
<html lang="uk" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ScannerPlanner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --bg:        #0c0d0c;
  --surface:   #131513;
  --surface2:  #191b19;
  --border:    #222422;
  --border2:   #2c2f2c;
  --text:      #e6ebe5;
  --dim:       #6b736a;
  --faint:     #303530;
  --accent:    #39853a;
  --accent-hi: #4faf50;
  --accent-gl: rgba(79,175,80,.10);
  --danger:    #a03232;
  --danger-hi: #c94040;
  --sw: 268px; /* sidebar width */
  --hh: 52px;  /* header height */
}
[data-theme="light"] {
  --bg:        #f5f6f4;
  --surface:   #ffffff;
  --surface2:  #f0f1ef;
  --border:    #dfe1dd;
  --border2:   #cdd0cb;
  --text:      #1a1f1a;
  --dim:       #6b736a;
  --faint:     #d5d8d3;
  --accent:    #2e7230;
  --accent-hi: #3a9c3c;
  --accent-gl: rgba(58,156,60,.09);
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  display: flex;
  -webkit-font-smoothing: antialiased;
}
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
::-webkit-scrollbar-track { background: transparent; }

/* ══════════════════════════════════════════
   AUTH SCREEN
══════════════════════════════════════════ */
#auth-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9000;
  display: flex; align-items: center; justify-content: center;
}
.auth-wrap {
  width: 100%; max-width: 380px;
  padding: 20px;
}
.auth-logo {
  font-size: 2rem; font-weight: 800;
  letter-spacing: -.03em;
  margin-bottom: 6px;
  text-align: center;
}
.auth-logo em { color: var(--accent-hi); font-style: normal; }
.auth-sub {
  font-size: 0.75rem; color: var(--dim);
  text-align: center;
  letter-spacing: .06em;
  margin-bottom: 2rem;
  font-family: 'JetBrains Mono', monospace;
}
.auth-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 2rem;
}
.auth-err {
  font-size: 0.72rem;
  color: var(--danger-hi);
  background: rgba(160,50,50,.1);
  border: 1px solid var(--danger);
  border-radius: 6px;
  padding: 8px 12px;
  margin-bottom: 14px;
  display: none;
  font-family: 'JetBrains Mono', monospace;
}
.auth-err.show { display: block; }
.f-label {
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: block;
}
.f-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 7px;
  font-size: 0.88rem;
  margin-bottom: 14px;
  outline: none;
  transition: border-color .15s;
}
.f-input:focus { border-color: var(--accent-hi); }
.btn-prim {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 12px;
  border-radius: 7px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: .05em;
  margin-bottom: 10px;
  transition: background .15s;
}
.btn-prim:hover { background: var(--accent-hi); }
.btn-ghost-sm {
  width: 100%;
  background: none;
  border: none;
  color: var(--dim);
  font-size: 0.75rem;
  padding: 6px;
  transition: color .15s;
}
.btn-ghost-sm:hover { color: var(--text); }

/* ══════════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════════ */
#app {
  display: none;
  width: 100vw; height: 100vh;
  overflow: hidden;
}
body.logged-in #auth-screen { display: none; }
body.logged-in #app { display: flex; }

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
#sidebar {
  width: var(--sw);
  min-width: var(--sw);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: margin-left .28s cubic-bezier(.4,0,.2,1);
  z-index: 200;
  overflow: hidden;
}
body.sb-hidden #sidebar { margin-left: calc(-1 * var(--sw)); }

@media (max-width: 760px) {
  #sidebar {
    position: fixed; top: 0; bottom: 0; left: 0;
    margin-left: calc(-1 * var(--sw)) !important;
    transition: margin-left .28s cubic-bezier(.4,0,.2,1), box-shadow .28s;
  }
  body.sb-open #sidebar {
    margin-left: 0 !important;
    box-shadow: 20px 0 60px rgba(0,0,0,.7);
  }
}

.sb-head {
  height: var(--hh);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sb-logo {
  font-size: 1.1rem; font-weight: 800;
  letter-spacing: -.02em;
}
.sb-logo em { color: var(--accent-hi); font-style: normal; }

.sb-add {
  margin: 14px 14px 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 10px 14px;
  border-radius: 7px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: .05em;
  width: calc(100% - 28px);
  text-align: left;
  transition: background .15s;
}
.sb-add:hover { background: var(--accent-hi); }

.sb-sec {
  font-size: 0.57rem;
  color: var(--faint);
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 0 16px 6px;
}

#backlog {
  flex: 1;
  overflow-y: auto;
  padding: 0 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
#backlog.drag-over { background: var(--accent-gl); }

.backlog-hint {
  font-size: 0.65rem;
  color: var(--faint);
  text-align: center;
  padding: 24px 12px;
  line-height: 1.7;
  font-family: 'JetBrains Mono', monospace;
}

/* ══════════════════════════════════════════
   OVERLAY (mobile)
══════════════════════════════════════════ */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(3px);
  z-index: 150;
}
body.sb-open #overlay { display: block; }

/* ══════════════════════════════════════════
   MAIN
══════════════════════════════════════════ */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ── TOP BAR ── */
.top-bar {
  height: var(--hh);
  display: flex; align-items: center;
  padding: 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  gap: 10px;
  flex-shrink: 0;
}
.wordmark {
  font-size: 1.05rem; font-weight: 800;
  letter-spacing: -.02em;
}
.wordmark em { color: var(--accent-hi); font-style: normal; }
.top-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

.year-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--text);
  height: 32px;
  width: 72px;
  text-align: center;
  border-radius: 6px;
  font-size: 0.82rem;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  -moz-appearance: textfield;
}
.year-input::-webkit-inner-spin-button,
.year-input::-webkit-outer-spin-button { -webkit-appearance: none; }
.year-input:focus { border-color: var(--accent-hi); }

.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border2);
  color: var(--dim);
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s, border-color .15s;
  flex-shrink: 0;
}
.icon-btn:hover { color: var(--text); border-color: var(--dim); }
.icon-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── CATS BAR ── */
#cats-bar {
  display: flex; align-items: center; gap: 6px;
  padding: 0 14px;
  height: 48px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
#cats-bar::-webkit-scrollbar { display: none; }

.cat-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--dim);
  font-size: 0.7rem;
  font-weight: 600;
  white-space: nowrap;
  transition: all .12s;
  letter-spacing: .03em;
  user-select: none;
  flex-shrink: 0;
}
.cat-chip:hover { color: var(--text); border-color: var(--dim); }
.cat-chip.active { color: var(--text); border-color: var(--accent-hi); background: var(--accent-gl); }
.cat-chip .cdot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0; pointer-events: none;
}
/* Edit dot — clickable separately */
.cat-edit-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
  cursor: pointer;
  position: relative;
  transition: transform .12s, box-shadow .12s;
}
.cat-edit-dot:hover { transform: scale(1.5); box-shadow: 0 0 0 2px rgba(255,255,255,.25); }

.cats-add {
  padding: 5px 10px;
  border-radius: 5px;
  border: 1px dashed var(--border2);
  background: none;
  color: var(--faint);
  font-size: 0.65rem;
  font-family: 'JetBrains Mono', monospace;
  transition: color .12s, border-color .12s;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: auto;
}
.cats-add:hover { color: var(--dim); border-color: var(--dim); }

.cats-reset {
  padding: 5px 8px;
  border: none; background: none;
  color: var(--faint);
  font-size: 0.65rem;
  font-family: 'JetBrains Mono', monospace;
  transition: color .12s;
  flex-shrink: 0;
}
.cats-reset:hover { color: var(--dim); }

/* ══════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════ */
#cal-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 80px;
  -webkit-overflow-scrolling: touch;
}

.year-block {
  margin-bottom: 20px;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.year-block:nth-child(1){animation-delay:.03s}
.year-block:nth-child(2){animation-delay:.07s}
.year-block:nth-child(3){animation-delay:.11s}
.year-block:nth-child(4){animation-delay:.15s}
.year-block:nth-child(5){animation-delay:.19s}
.year-block:nth-child(6){animation-delay:.23s}

.yr-toggle {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  margin-bottom: 8px;
  user-select: none;
  width: max-content;
}
.yr-toggle .arr {
  font-size: 0.55rem;
  color: var(--accent-hi);
  transition: transform .2s;
  display: inline-block;
}
.year-block.closed .arr { transform: rotate(-90deg); }
.yr-num {
  font-size: 1.4rem; font-weight: 800;
  color: var(--text);
  line-height: 1;
  letter-spacing: -.02em;
}
.yr-num.cur { color: var(--accent-hi); }

.yr-mnames {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 5px;
  margin-bottom: 3px;
}
.yr-mnames span {
  font-size: 0.5rem;
  color: var(--faint);
  text-align: center;
  letter-spacing: .06em;
  font-family: 'JetBrains Mono', monospace;
}

.yr-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 5px;
}

.year-block.closed .yr-grid,
.year-block.closed .yr-mnames { display: none; }

/* responsive grid */
@media (max-width: 980px) {
  .yr-mnames, .yr-grid { grid-template-columns: repeat(6,1fr); }
}
@media (max-width: 520px) {
  .yr-mnames, .yr-grid { grid-template-columns: repeat(4,1fr); }
}

/* ── MONTH CELL ── */
.month-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  min-height: 68px;
  padding: 22px 5px 5px;
  position: relative;
  display: flex; flex-direction: column; gap: 3px;
  transition: border-color .12s;
}
.month-cell:hover { border-color: var(--border2); }
.month-cell.drag-over { border-color: var(--accent-hi) !important; background: var(--accent-gl); }
.month-cell.past { opacity: .35; }
.month-cell.cur {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px var(--accent), inset 0 0 12px var(--accent-gl);
}
.m-lbl {
  position: absolute;
  top: 4px; right: 6px;
  font-size: 0.48rem;
  color: var(--faint);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: .06em;
  pointer-events: none;
}
.month-cell.cur .m-lbl { color: var(--accent-hi); }

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card {
  border-radius: 4px;
  padding: 5px 7px;
  font-size: 0.62rem;
  font-weight: 600;
  line-height: 1.3;
  cursor: grab;
  border: 1px solid rgba(255,255,255,.07);
  box-shadow: 0 2px 5px rgba(0,0,0,.3);
  transition: transform .1s, box-shadow .1s, opacity .1s;
  touch-action: none;
  user-select: none;
  word-break: break-word;
  color: #fff;
}
.card:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,.4); }
.card.dragging { opacity: .4; transform: scale(.95); }
.card-sub {
  font-size: 0.48rem;
  opacity: .65;
  font-family: 'JetBrains Mono', monospace;
  margin-top: 2px;
  letter-spacing: .04em;
  pointer-events: none;
}

/* ══════════════════════════════════════════
   STATS BAR
══════════════════════════════════════════ */
.stats-bar {
  padding: 6px 16px;
  border-top: 1px solid var(--border);
  display: flex; gap: 1.5rem;
  font-size: 0.58rem;
  color: var(--faint);
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  flex-shrink: 0;
}
.stats-bar b { color: var(--dim); }

/* ══════════════════════════════════════════
   MODALS — base
══════════════════════════════════════════ */
.modal-wrap {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  align-items: center; justify-content: center;
  z-index: 4000;
  padding: 20px;
  backdrop-filter: blur(6px);
}
.modal-wrap.open { display: flex; }

.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 1.6rem;
  width: 100%; max-width: 340px;
  box-shadow: 0 30px 80px rgba(0,0,0,.65);
  animation: mIn .2s ease;
}
@keyframes mIn {
  from { opacity:0; transform:translateY(10px) scale(.98); }
  to   { opacity:1; transform:none; }
}
.modal-title {
  font-size: 1.05rem; font-weight: 800;
  letter-spacing: -.01em;
  margin-bottom: 1.2rem;
}
.m-actions { display: flex; flex-direction: column; gap: 7px; margin-top: 6px; }

.btn-save {
  background: var(--accent); color: #fff;
  border: none; padding: 11px;
  border-radius: 7px; font-size: 0.75rem;
  font-weight: 700; letter-spacing: .05em;
  transition: background .15s;
}
.btn-save:hover { background: var(--accent-hi); }

.btn-danger {
  background: none;
  border: 1px solid var(--danger);
  color: var(--danger-hi);
  padding: 9px; border-radius: 7px;
  font-size: 0.7rem; font-weight: 600;
  letter-spacing: .04em;
  transition: background .15s;
}
.btn-danger:hover { background: rgba(160,50,50,.14); }

.btn-cancel {
  background: none;
  border: 1px solid var(--border2);
  color: var(--dim);
  padding: 9px; border-radius: 7px;
  font-size: 0.7rem; font-weight: 600;
  transition: color .15s;
}
.btn-cancel:hover { color: var(--text); }

/* ── Category color picker ── */
.swatches {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin: 6px 0 14px;
}
.sw {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent;
  transition: transform .12s, border-color .12s;
}
.sw:hover { transform: scale(1.2); }
.sw.on { border-color: #fff; transform: scale(1.15); }

/* custom color input wrapper */
.color-custom {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.color-custom label { font-size: 0.62rem; color: var(--dim); letter-spacing: .08em; }
.color-custom input[type=color] {
  width: 32px; height: 32px;
  border: 1px solid var(--border2);
  border-radius: 6px;
  background: none;
  padding: 2px;
  cursor: pointer;
}

/* ── Delete confirm ── */
#confirm-modal .modal-box { max-width: 300px; text-align: center; }
#confirm-modal .conf-msg {
  font-size: 0.78rem; color: var(--dim);
  line-height: 1.6; margin-bottom: 1.2rem;
}
#confirm-modal .conf-name {
  font-weight: 800; color: var(--text);
  display: block; margin-top: 4px;
  font-size: 0.9rem;
}
#confirm-modal .m-actions { flex-direction: row; }
#confirm-modal .m-actions button { flex: 1; }

/* ══════════════════════════════════════════
   SPINNER
══════════════════════════════════════════ */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent-hi);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ══ AUTH ══════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">Scanner<em>Planner</em></div>
    <div class="auth-sub">планування для сканерів</div>
    <div class="auth-box">
      <div class="auth-err" id="auth-err"></div>
      <label class="f-label">Email</label>
      <input type="email" id="a-email" class="f-input" placeholder="you@example.com" autocomplete="email">
      <label class="f-label">Пароль</label>
      <input type="password" id="a-pass" class="f-input" placeholder="••••••••" autocomplete="current-password">
      <button class="btn-prim" id="a-login-btn" onclick="doAuth('login')">Увійти</button>
      <button class="btn-ghost-sm" onclick="doAuth('signup')">Створити акаунт</button>
    </div>
  </div>
</div>

<!-- ══ APP ═══════════════════════════════ -->
<div id="app">
  <div id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">Scanner<em>Planner</em></div>
      <button class="icon-btn" onclick="closeSidebar()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <button class="sb-add" onclick="openProjectModal(null, null)">+ нова ідея</button>
    <div class="sb-sec">Backlog</div>
    <div id="backlog"
      ondragover="onDragOver(event,'backlog')"
      ondragleave="onDragLeave(event)"
      ondrop="onDrop(event,null)">
      <div class="backlog-hint" id="bl-hint">Ідеї без дати.<br>Перетягни на місяць<br>або місяць — сюди.</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="top-bar">
      <button class="icon-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
      </button>
      <div class="wordmark">Scanner<em>Planner</em></div>
      <div class="top-right">
        <input type="number" id="year-input" class="year-input" title="Початковий рік">
        <button class="icon-btn" onclick="scrollToNow()" title="Сьогодні">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="15" y2="14"/></svg>
        </button>

          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

<div class="modal-wrap" id="proj-modal">

<!-- ══ CATEGORY MODAL ════════════════════ -->
<div class="modal-wrap" id="cat-modal">

    </div>

      <button class="btn-save" onclick="saveCat()">Зберегти</button>
      <button class="btn-danger" id="cm-del-btn" onclick="confirmDeleteCat()">Видалити категорію</button>
      <button class="btn-cancel" onclick="closeCatModal()">Скасувати</button>

<!-- ══ CONFIRM MODAL ═════════════════════ -->
<div class="modal-wrap" id="confirm-modal">
  <div class="modal-box">
    <div class="modal-title">Підтвердження</div>
    <div class="conf-msg" id="conf-msg">Ви впевнені?<span class="conf-name" id="conf-name"></span></div>
    <div class="m-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Ні, скасувати</button>
      <button class="btn-danger" id="conf-ok-btn" onclick="doConfirmAction()">Так, видалити</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const SB_URL = "https://mlkdphygsdfcanztbtez.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1sa2RwaHlnc2RmY2FuenRidGV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyODAwNTAsImV4cCI6MjA5MTg1NjA1MH0.PfjkZXua-9tp2lxVsBD3YBUNpx_USmMha5BQBZcGLFc";
const sb = supabase.createClient(SB_URL, SB_KEY);

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let projects  = [];
// cats: [{id, name, color}]  — id-based, not name-based!
let cats      = [];
let startYear = parseInt(localStorage.getItem('sp-year')) || new Date().getFullYear();
let collapsed = JSON.parse(localStorage.getItem('sp-collapsed') || '[]');
let filterCat = null;   // cat id or null
let dragId    = null;

// modal state
let editingProjId  = null;
let editingProjDate = null;
let editingCatId   = null;
let pickedColor    = '#39853a';
let confirmCb      = null;

const NOW = new Date();
const THIS_YEAR  = NOW.getFullYear();
const THIS_MONTH = NOW.getMonth(); // 0-based

const MONTHS = ['СІЧ','ЛЮТ','БЕР','КВІ','ТРА','ЧЕР','ЛИП','СЕР','ВЕР','ЖОВ','ЛИС','ГРУ'];
const MONTHS_FULL = ['Січень','Лютий','Березень','Квітень','Травень','Червень','Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];

const SWATCHES = [
  '#39853a','#4faf50','#e07b39','#e0c03a',
  '#3a6fe0','#7b3ae0','#c43a7b','#3abbe0',
  '#e03a3a','#6b8f71','#8f6b6b','#6b7a8f'
];

// ═══════════════════════════════════════════════════
// PERSISTENCE — cats in localStorage (like before)
// ═══════════════════════════════════════════════════
function loadCats() {
  const raw = localStorage.getItem('sp-cats-v2');
  if (raw) { cats = JSON.parse(raw); return; }
  // Migrate from old format if exists
  const oldList   = JSON.parse(localStorage.getItem('sc-cats-list') || 'null');
  const oldColors = JSON.parse(localStorage.getItem('sc-cats-colors') || 'null');
  if (oldList && oldColors) {
    cats = oldList.map(name => ({ id: uid(), name, color: oldColors[name] || '#39853a' }));
  } else {
    cats = [
      { id: uid(), name: 'Творчість',  color: '#7b3ae0' },
      { id: uid(), name: 'Технології', color: '#3a6fe0' },
      { id: uid(), name: 'Бізнес',     color: '#39853a' },
      { id: uid(), name: 'Особисте',   color: '#e07b39' },
    ];
  }
  saveCatsLocal();
}

function saveCatsLocal() {
  localStorage.setItem('sp-cats-v2', JSON.stringify(cats));
}

function catById(id)  { return cats.find(c => c.id === id); }
function catByName(n) { return cats.find(c => c.name === n); }
function uid()        { return Math.random().toString(36).slice(2,10); }

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
async function doAuth(type) {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  const errEl = document.getElementById('auth-err');
  const btn   = document.getElementById('a-login-btn');

  errEl.classList.remove('show');
  if (!email || !pass) { showAuthErr('Введіть email та пароль'); return; }

  btn.innerHTML = '<span class="spin"></span>';
  btn.disabled = true;

  const fn = type === 'login'
    ? sb.auth.signInWithPassword({ email, password: pass })
    : sb.auth.signUp({ email, password: pass });

  const { error } = await fn;
  btn.innerHTML = 'Увійти';
  btn.disabled = false;

  if (error) showAuthErr(error.message);
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg;
  el.classList.add('show');
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    document.body.classList.add('logged-in');
    loadCats();
    await loadData();
  } else {
    document.body.classList.remove('logged-in');
  }
});

// ═══════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════
async function loadData() {
  const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });
  if (error) { console.error('loadData:', error); return; }
  projects = data || [];
  render();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render() {
  renderCatsBar();
  renderCalendar();
  renderBacklog();
  renderStats();
  renderProjSelect();
  document.getElementById('year-input').value = startYear;
}

function renderCatsBar() {
  const bar = document.getElementById('cats-bar');
  bar.innerHTML = '';

  cats.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'cat-chip' + (filterCat === cat.id ? ' active' : '');

    // color dot — click to edit category
    const dot = document.createElement('span');
    dot.className = 'cat-edit-dot';
    dot.style.background = cat.color;
    dot.title = 'Редагувати категорію';
    dot.addEventListener('click', e => {
      e.stopPropagation();
      openCatModal(cat.id);
    });

    const lbl = document.createElement('span');
    lbl.textContent = cat.name;

    chip.appendChild(dot);
    chip.appendChild(lbl);
    chip.addEventListener('click', () => {
      filterCat = filterCat === cat.id ? null : cat.id;
      render();
    });
    bar.appendChild(chip);
  });

  if (filterCat) {
    const rst = document.createElement('button');
    rst.className = 'cats-reset';
    rst.textContent = '✕ скинути';
    rst.addEventListener('click', () => { filterCat = null; render(); });
    bar.appendChild(rst);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'cats-add';
  addBtn.textContent = '+ категорія';
  addBtn.addEventListener('click', () => openCatModal(null));
  bar.appendChild(addBtn);
}

function renderCalendar() {
  const scroll = document.getElementById('cal-scroll');
  scroll.innerHTML = '';

  const visibleProjects = filterCat
    ? projects.filter(p => p.cat_id === filterCat)
    : projects;

  for (let y = 0; y < 6; y++) {
    const year = startYear + y;
    const isCollapsed = collapsed.includes(year);

    const block = document.createElement('div');
    block.className = 'year-block' + (isCollapsed ? ' closed' : '');
    block.id = `yr-${year}`;

    // Toggle
    const toggle = document.createElement('div');
    toggle.className = 'yr-toggle';
    const arr = document.createElement('span');
    arr.className = 'arr';
    arr.textContent = '▼';
    const num = document.createElement('span');
    num.className = 'yr-num' + (year === THIS_YEAR ? ' cur' : '');
    num.textContent = year;
    toggle.appendChild(arr);
    toggle.appendChild(num);
    toggle.addEventListener('click', () => {
      block.classList.toggle('closed');
      if (collapsed.includes(year)) collapsed = collapsed.filter(y => y !== year);
      else collapsed.push(year);
      localStorage.setItem('sp-collapsed', JSON.stringify(collapsed));
    });
    block.appendChild(toggle);

    // Month names row
    const mnames = document.createElement('div');
    mnames.className = 'yr-mnames';
    MONTHS.forEach(m => {
      const s = document.createElement('span');
      s.textContent = m;
      mnames.appendChild(s);
    });
    block.appendChild(mnames);

    // Month cells grid
    const grid = document.createElement('div');
    grid.className = 'yr-grid';

    for (let m = 0; m < 12; m++) {
      const dKey = `${year}-${String(m+1).padStart(2,'0')}`;
      const isPast = year < THIS_YEAR || (year === THIS_YEAR && m < THIS_MONTH);
      const isNow  = year === THIS_YEAR && m === THIS_MONTH;

      const cell = document.createElement('div');
      cell.className = 'month-cell'
        + (isPast ? ' past' : '')
        + (isNow  ? ' cur'  : '');
      cell.dataset.key = dKey;

      const lbl = document.createElement('div');
      lbl.className = 'm-lbl';
      lbl.textContent = MONTHS[m];
      cell.appendChild(lbl);

      // Click empty area → new project in this month
      cell.addEventListener('click', e => {
        if (e.target === cell || e.target === lbl) openProjectModal(null, dKey);
      });
      cell.addEventListener('dragover',  e => onDragOver(e, dKey));
      cell.addEventListener('dragleave', onDragLeave);
      cell.addEventListener('drop',      e => onDrop(e, dKey));

      visibleProjects
        .filter(p => p.date === dKey)
        .forEach(p => cell.appendChild(makeCard(p)));

      grid.appendChild(cell);
    }

    block.appendChild(grid);
    scroll.appendChild(block);
  }
}

function renderBacklog() {
  const zone = document.getElementById('backlog');
  zone.querySelectorAll('.card').forEach(c => c.remove());

  const visibleProjects = filterCat
    ? projects.filter(p => p.cat_id === filterCat)
    : projects;

  const items = visibleProjects.filter(p => !p.date);
  document.getElementById('bl-hint').style.display = items.length ? 'none' : '';
  items.forEach(p => zone.appendChild(makeCard(p)));
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const total  = projects.length;
  const placed = projects.filter(p => p.date).length;
  bar.innerHTML = '';

  [
    ['всього', total],
    ['заплановано', placed],
    ['backlog', total - placed],
  ].forEach(([k, v]) => {
    const d = document.createElement('div');
    d.innerHTML = `${k}: <b>${v}</b>`;
    bar.appendChild(d);
  });
}

function renderProjSelect() {
  const sel = document.getElementById('pm-cat');
  const prev = sel.value;
  sel.innerHTML = '';
  cats.forEach(cat => {
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = cat.name;
    sel.appendChild(opt);
  });
  // Restore selection if still valid
  if (cats.find(c => c.id === prev)) sel.value = prev;
}

// ═══════════════════════════════════════════════════
// CARD
// ═══════════════════════════════════════════════════
function makeCard(p) {
  const cat = catById(p.cat_id);
  const el  = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.id = p.id;
  el.style.background = cat ? cat.color : '#555';

  const t = document.createElement('div');
  t.textContent = p.title;

  const s = document.createElement('div');
  s.className = 'card-sub';
  s.textContent = cat ? cat.name : '—';

  el.appendChild(t);
  el.appendChild(s);

  el.addEventListener('dragstart', e => {
    dragId = p.id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', p.id);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragId = null;
    document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
  });
  el.addEventListener('click', e => {
    e.stopPropagation();
    openProjectModal(p, null);
  });

  return el;
}

// ═══════════════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════════════
function onDragOver(e, key) {
  e.preventDefault(); e.stopPropagation();
  const el = e.currentTarget;
  if (!el.classList.contains('drag-over')) {
    document.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    el.classList.add('drag-over');
  }
}
function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
async function onDrop(e, dateKey) {
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain') || dragId;
  if (!id) return;
  const { error } = await sb.from('projects').update({ date: dateKey }).eq('id', id);
  if (error) { console.error('drop:', error); return; }
  await loadData();
}

// ═══════════════════════════════════════════════════
// PROJECT MODAL
// ═══════════════════════════════════════════════════
function openProjectModal(p, date) {
  editingProjId   = p ? p.id : null;
  editingProjDate = p ? p.date : date;

  document.getElementById('proj-modal-title').textContent = p ? 'Редагувати' : 'Нова ідея';
  document.getElementById('pm-title').value = p ? p.title : '';

  renderProjSelect();
  if (p && p.cat_id) document.getElementById('pm-cat').value = p.cat_id;

  // Date display
  const dateLbl = document.getElementById('pm-date-lbl');
  if (editingProjDate) {
    const [y, m] = editingProjDate.split('-');
    dateLbl.textContent = `${MONTHS_FULL[parseInt(m)-1]} ${y}`;
  } else {
    dateLbl.textContent = 'Backlog (без дати)';
  }

  document.getElementById('pm-del-btn').style.display = p ? '' : 'none';
  document.getElementById('proj-modal').classList.add('open');
  setTimeout(() => document.getElementById('pm-title').focus(), 80);
}

function closeProjectModal() {
  document.getElementById('proj-modal').classList.remove('open');
  editingProjId = null;
}

async function saveProject() {
  const title  = document.getElementById('pm-title').value.trim();
  const cat_id = document.getElementById('pm-cat').value;
  if (!title) { document.getElementById('pm-title').focus(); return; }

  const payload = { title, cat_id, date: editingProjDate || null };

  if (editingProjId) {
    const { error } = await sb.from('projects').update(payload).eq('id', editingProjId);
    if (error) { console.error('update:', error); return; }
  } else {
    const { data: { user } } = await sb.auth.getUser();
    const { error } = await sb.from('projects').insert([{ ...payload, user_id: user.id }]);
    if (error) { console.error('insert:', error); return; }
  }
  closeProjectModal();
  await loadData();
}

function confirmDeleteProject() {
  const p = projects.find(x => x.id === editingProjId);
  if (!p) return;
  openConfirm(
    `Видалити проєкт?`,
    p.title,
    async () => {
      await sb.from('projects').delete().eq('id', editingProjId);
      closeProjectModal();
      await loadData();
    }
  );
}

// ═══════════════════════════════════════════════════
// CATEGORY MODAL
// ═══════════════════════════════════════════════════
function openCatModal(catId) {
  editingCatId = catId;
  const cat = catId ? catById(catId) : null;

  document.getElementById('cat-modal-title').textContent = cat ? 'Редагувати категорію' : 'Нова категорія';
  document.getElementById('cm-name').value = cat ? cat.name : '';
  pickedColor = cat ? cat.color : SWATCHES[0];
  document.getElementById('cm-color-pick').value = pickedColor;

  buildSwatches();

  // Show/hide delete button
  const delBtn = document.getElementById('cm-del-btn');
  delBtn.style.display = cat ? '' : 'none';

  document.getElementById('cat-modal').classList.add('open');
  setTimeout(() => document.getElementById('cm-name').focus(), 80);
}

function closeCatModal() {
  document.getElementById('cat-modal').classList.remove('open');
  editingCatId = null;
}

function buildSwatches() {
  const cont = document.getElementById('cm-swatches');
  cont.innerHTML = '';
  SWATCHES.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'sw' + (col === pickedColor ? ' on' : '');
    sw.style.background = col;
    sw.addEventListener('click', () => {
      pickedColor = col;
      document.getElementById('cm-color-pick').value = col;
      cont.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
      sw.classList.add('on');
    });
    cont.appendChild(sw);
  });

  // Sync custom picker → pickedColor
  document.getElementById('cm-color-pick').oninput = e => {
    pickedColor = e.target.value;
    cont.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
  };
}

async function saveCat() {
  const name = document.getElementById('cm-name').value.trim();
  // Sync color from picker in case user typed in hex
  pickedColor = document.getElementById('cm-color-pick').value;

  if (!name) { document.getElementById('cm-name').focus(); return; }

  if (editingCatId) {
    // Edit existing
    const cat = catById(editingCatId);
    if (!cat) return;
    const oldName = cat.name;
    cat.name  = name;
    cat.color = pickedColor;
    saveCatsLocal();
    // If name changed → update projects in Supabase that reference old cat name
    // (projects store cat_id now, so name change is transparent — no DB update needed)
    if (filterCat === editingCatId && oldName !== name) {
      // filter stays by id, fine
    }
  } else {
    // New category
    cats.push({ id: uid(), name, color: pickedColor });
    saveCatsLocal();
  }

  closeCatModal();
  render();
}

function confirmDeleteCat() {
  if (cats.length <= 1) {
    openConfirm('Помилка', 'Не можна видалити єдину категорію.', null);
    return;
  }
  const cat = catById(editingCatId);
  if (!cat) return;

  const count = projects.filter(p => p.cat_id === editingCatId).length;
  const fallback = cats.find(c => c.id !== editingCatId);

  openConfirm(
    `Видалити категорію "${cat.name}"?`,
    count > 0
      ? `${count} проєкт(ів) перейдуть до "${fallback.name}"`
      : 'Проєктів у категорії немає.',
    async () => {
      // Move projects to fallback category
      if (count > 0) {
        await sb.from('projects')
          .update({ cat_id: fallback.id })
          .eq('cat_id', editingCatId);
      }
      cats = cats.filter(c => c.id !== editingCatId);
      saveCatsLocal();
      if (filterCat === editingCatId) filterCat = null;
      closeCatModal();
      await loadData();
    }
  );
}

// ═══════════════════════════════════════════════════
// CONFIRM MODAL
// ═══════════════════════════════════════════════════
function openConfirm(msg, name, cb) {
  confirmCb = cb;
  document.getElementById('conf-msg').textContent = msg;
  document.getElementById('conf-name').textContent = name ? `"${name}"` : '';
  const okBtn = document.getElementById('conf-ok-btn');
  okBtn.style.display = cb ? '' : 'none';
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('open');
  confirmCb = null;
}
async function doConfirmAction() {
  if (confirmCb) await confirmCb();
  closeConfirm();
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function toggleSidebar() {
  if (window.innerWidth <= 760) {
    document.body.classList.toggle('sb-open');
  } else {
    document.body.classList.toggle('sb-hidden');
  }
}
function closeSidebar() {
  document.body.classList.remove('sb-open');
  if (window.innerWidth > 760) document.body.classList.add('sb-hidden');
}

// ═══════════════════════════════════════════════════
// YEAR INPUT
// ═══════════════════════════════════════════════════
document.getElementById('year-input').addEventListener('change', e => {
  const v = parseInt(e.target.value);
  if (v >= 2000 && v <= 2100) {
    startYear = v;
    localStorage.setItem('sp-year', v);
    render();
  }
});

// ═══════════════════════════════════════════════════
// SCROLL TO NOW
// ═══════════════════════════════════════════════════
function scrollToNow() {
  const el = document.getElementById(`yr-${THIS_YEAR}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ═══════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.innerHTML = t === 'dark'
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>`;
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('sp-theme', next);
  applyTheme(next);
}
applyTheme(localStorage.getItem('sp-theme') || 'dark');

// ═══════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeConfirm();
    closeProjectModal();
    closeCatModal();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('proj-modal').classList.contains('open')) saveProject();
    else if (document.getElementById('cat-modal').classList.contains('open')) saveCat();
  }
});

// ═══════════════════════════════════════════════════
// MOBILE INIT
// ═══════════════════════════════════════════════════
if (window.innerWidth <= 760) {
  document.body.classList.remove('sb-hidden');
}
</script>
</body>
</html>
